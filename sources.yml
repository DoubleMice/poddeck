# PodDeck 订阅源配置
# 每个 source 是一个播客频道/节目主体
# filter_keywords: 可选。plan.ts 不启用 use_keywords_in_plan 时仅用于 discover 不做过滤
# min_duration: 最小时长秒数（plan.ts 用这个过滤）。默认 3600 = 60 分钟
# min_date: 最早发布日期 YYYYMMDD。默认 20260101
# cache_limit: refresh-cache.ts 扫描的最大视频数。默认 350
# use_keywords_in_plan: plan.ts 是否同时用 filter_keywords 做二次过滤。默认 false（只按时长/日期过滤）
# color: 用于 landing page 中区分视觉

sources:
  - id: tbpn
    name: TBPN
    channel: https://youtube.com/@TBPNLive
    filter_keywords: [tech, startup, AI, venture, investing]
    min_duration: 3600
    min_date: "20260101"
    cache_limit: 200
    color: "#ea580c"
    description: 科技创投直播播客，工作日 3 小时深度对谈

  - id: unchained
    name: Unchained
    channel: https://youtube.com/c/UnchainedPodcast
    filter_keywords: [crypto, bitcoin, ethereum, defi, web3]
    min_duration: 1800
    min_date: "20260101"
    cache_limit: 150
    color: "#f59e0b"
    description: 加密/Web3 深度访谈与每周新闻

  - id: risky-business
