    image: https://img.transistorcdn.com/gx6fhYO1SXMFGcVkU0FWykOtdtd5kMbwLFJMSN3_WZ4/rs:fill:0:0:1/w:1400/h:1400/q:60/mb:500000/aHR0cHM6Ly9pbWct/dXBsb2FkLXByb2R1/Y3Rpb24udHJhbnNp/c3Rvci5mbS8zMWQ4/NjUxMmJkYTUxMzRh/Mzk4ZWYwM2UwYWNk/M2Q2Ny5wbmc.jpg
    summary: >-
      Rolex is a series of paradoxes. They sell obsolete and objectively inferior mechanical devices for 10-1000x the
      price of their superior digital successors… and demand is stronger than ever in history! Their products are
      comparable to a Hermès Birkin bag in price, luxury status and waitlist times… yet they produce over 1m units /
      year (roughly 10x annual Birkin production). They make the most universally recognized and desired Swiss watches…
      yet their founder wasn’t Swiss and didn’t start the company in Switzerland! If Rolex were publicly traded, they’d
      almost certainly be among the top 50 market cap companies in the world… yet they’re 100% owned by a charitable
      foundation in Geneva that (among other things) literally just gives away money to local people in the city.


      Tune in for one of the most fascinating and admirable companies we’ve ever covered on Acquired. We had an absolute
      blast making the episode, and hope you enjoy it as much as we did!


      This episode was released on February 23, 2025.


