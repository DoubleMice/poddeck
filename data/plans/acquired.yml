    summary: >-
      Ferrari is the pinnacle of luxury scarcity — across its entire 79-year history, the company has sold just 330,000
      cars at an average price today of $500,000. For context, Hermès sells that many Birkins and Kellys roughly every 2
      years, and Rolex moves that many watches every 3 months. And yet this ultimate luxury product also lives under the
      same roof with a widely beloved professional sports team… one with 400 million rabid fans from all walks of life
      who live and die by the Scuderia’s performance every F1 race weekend! How is it possible that these two seemingly
      contradictory customer bases can coexist within the same company? And far from destroying each other’s value, only
      reinforce it? The answer, it turns out, is a beautiful, bloody, tragic and romantic opera that spans two families
      and three generations — and just might be one of the best tales we’ve ever told on Acquired. Buckle up for the
      story of Ferrari. 


