    image: https://img.transistorcdn.com/ORaQ7w0zdqAScJ9YPCf3I4RKe_muT-If0IMRT5rIuE8/rs:fill:0:0:1/w:1400/h:1400/q:60/mb:500000/aHR0cHM6Ly9pbWct/dXBsb2FkLXByb2R1/Y3Rpb24udHJhbnNp/c3Rvci5mbS84MzRh/NWY0NDJlNzAzNDY1/OGY2NThlZDBkYmU1/NzdjMC5wbmc.jpg
    summary: >-
      Formula 1 is three competitions in one: a 200mph battle of the world's best race car drivers, the world cup of
      engineering where thousand-person teams spend hundreds of millions designing cars from scratch, and — as one of
      our listeners perfectly put it — the “Real Housewives of the Garage”, a soap opera of billionaire egos, team
      politics, and paddock drama that makes for incredible reality television. It's also the world's most popular
      annual sporting series with over 827 million fans globally — a fact that would shock most Americans, who until a
      recent viral Netflix series had barely heard of it.


      Today we tell the story of how a chaotic, deadly, and gloriously dysfunctional European racing series became one
      of the greatest business stories in sports. For decades, brilliant engineers and daredevil drivers dedicated their
      lives (and too often lost them) to a league controlled for 45 years by a single man: a former London car dealer
      named Bernie Ecclestone, who centralized power and extracted billions, while also undeniably single-handedly
      making the sport successful. Then, in a move no one saw coming, the American company Liberty Media bought the
      whole thing in 2017, installed a team of Fox Sports and ESPN veterans, and did what Bernie never would —
      professionalized it. All of a sudden famously money-losing F1 teams turned into real businesses, with the average
      team valuation today clocking in at an astounding $3.6 billion. Buckle up for one of our most-requested episodes:
      the wild story of Formula 1.


