    summary: >-
      The Walt Disney Company is the most successful enterprise ever created for monetizing human nostalgia. Today it’s
      the king of global entertainment, holding the intellectual property rights to the childhood memories of billions
      of people (including, likely, all of you) and is a reliable, predictable profitable business. But it didn’t start
      that way.


      During Walt’s era, Disney operated like an unhinged moonshot factory, blowing its finances on one seemingly crazy
      project after another, like the very first feature-length animated film or a theme park inspired by Walt's
      fascination with model trains (spoiler: Disneyland). Walt’s relentless ambition to bet the company over and over
      again not only created some of the most monumental artistic achievements of the 20th century (Snow White,
      Fantasia, Disney Imagineering), but also resulted in the accidental invention of the modern “flywheel” business
      model. In this episode, we tell the story of the ultimate marriage of art, commerce, and engineering — The Walt
      Disney Company: Walt's Era.


