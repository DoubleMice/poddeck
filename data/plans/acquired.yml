    image: https://img.transistorcdn.com/jFPz1nSL8JfyAmY8ab_xqfZWEVOQ1VqoHhJKdxvzTEY/rs:fill:0:0:1/w:1400/h:1400/q:60/mb:500000/aHR0cHM6Ly9pbWct/dXBsb2FkLXByb2R1/Y3Rpb24udHJhbnNp/c3Rvci5mbS9hMWI0/NTE4ZGMzNWQ2ODli/ZTExZDkwNjBmZjVl/ZmQ1OS5wbmc.jpg
    summary: >-
      Costco is not only Charlie Munger’s favorite company of all time (plus he’s on the board, natch), it’s an
      absolutely fascinating study in how seemingly opposite characteristics can combine to create incredible company
      value. For instance: Costco has the cheapest prices of any major retailer in America — and also the wealthiest
      customer base. They pay their hourly workers 30% above the industry norm (and give them excellent healthcare +
      401k benefits) — and are almost 3x more profitable on labor than Walmart. Speaking of Walmart, Costco stocks 40x
      fewer SKUs than their Bentonville-based rivals — yet sells an average of 15x more volume of each. And oh yeah,
      practically all of Costco’s C-Suite started their careers as baggers and checkout clerks! Tune in for a
      mind-bending exploration of one of the world’s most iconic — and iconically unique — companies.


      This episode was released on August 20, 2023.


