    image: https://img.transistorcdn.com/t9HAUiDj-XVUljR4EVNkTfDbMjUwo3P5Uc4FodEDNMs/rs:fill:0:0:1/w:1400/h:1400/q:60/mb:500000/aHR0cHM6Ly9pbWct/dXBsb2FkLXByb2R1/Y3Rpb24udHJhbnNp/c3Rvci5mbS9kYzZj/YzcyNDg2MjM3Yjdk/NzRlNjFhMGY1ZDk1/NWY0Ni5qcGc.jpg
    summary: >-
      The NFL is nearly synonymous with America today. Practically nothing is more quintessentially and universally
      American than tuning in every Sunday (and Monday, and Thursday… and sometimes Saturdays and holidays too) to watch
      the world’s most beautiful ballet of violence. It generates the most revenue of any sports league globally and
      sets new records for team valuations each year. But it wasn’t always this way.


      The history of the NFL mirrors America’s own development: scrappy small-town teams rode the successive growth
      waves of the automobile, TV, the Internet and social media to grow larger than the even the founders’ wildest
      dreams. Whether you watch football or not, the NFL is one incredible business story, and one that we’ve taken more
      lessons from over the years for Acquired itself than perhaps any other episode we’ve made.


      Note: This is a remastered release of our original January 2023 episode, updated to today's Acquired production
      standards. It also features a full hour+ followup section at the end covering the seismic shifts in the NFL’s
      business since the original episode’s release. Much has happened in those three years: Taylor Swift entered the
      league (via merger 🙂), streaming went mainstream (and took over Thanksgiving and Christmas), sports gambling
      exploded from 46 million to 76 million bettors, and — in perhaps the most surprising development — private equity
      finally stormed the gates of the NFL. Oh, and average franchise valuations grew by 60% from $4.5 billion to over
      $7 billion. Communist capitalism is alive and well!


      We're also releasing this episode in advance of Super Bowl LX here in San Francisco, where Acquired is hosting the
      NFL’s inaugural Super Bowl Innovation Summit!


