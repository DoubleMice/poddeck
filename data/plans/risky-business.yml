    summary: >-
      In this special documentary episode, Patrick Gray and Amberleigh Jack take a historical dive into hacking in the
      1980s. Through the words of those that were there, they discuss life on the ARPANET, the 414s hacking group, the
      Morris Worm, the vibe inside the NSA and a parallel hunt for German hackers happening at a similar time to Cliff
      Stoll’s famous Cuckoo’s Egg story.


      This podcast features the memories of:

        Jon Callas, former principal software engineer at Digital Equipment Corporation
        Mark Rasch, Morris Worm prosecutor
        Timothy Winslow, former 414 hacker
        Greg Chartrand, author of Cracking the Cuckoos Egg and
        Tony Sager, former NSA

      How the World Got Owned is produced in partnership with SentinelOne.
