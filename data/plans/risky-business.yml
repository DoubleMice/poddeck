  - id: soapbox104
    guid: https://risky.biz/soapbox104/
    title: "Risky Biz Soap Box: The lethal trifecta of AI risks"
    duration: 2253
    published: Fri, 20 Feb 2026 10:33:55 +1100
    published_sort: "20260219"
    first_seen_at: 2026-05-19T08:55:24.848Z
    url: https://risky.biz/soapbox104/
    audio_url: https://dts.podtrac.com/redirect.mp3/media3.risky.biz/soapbox104.mp3
    image: https://risky.biz/static/img/rb-feed-main.png
    summary: >-
      There’s a lethal trifecta of AI risks: access to private data, exposure to untrusted content, and external
      communication. In this conversation, Risky Business host Patrick Gray chats with Josh Devon, the co-founder of
      Sondera, about how to best address these risks.


      There is no magic solution to this problem. AI models mix code and data, are non-deterministic, and are crawling
      around all over your enterprise data and APIs as you read this.


      But in this sponsored interview, Josh outlines how we can start to wrap our hands around the problem.


      This episode is also available on Youtube.
