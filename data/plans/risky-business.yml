    summary: >-
      In this Soap Box edition of the Risky Business podcast Patrick Gray sits down with Airlock Digital co-founders
      Daniel Schell and David Cottingham to talk about the role AI models could play in managing enterprise allowlists.


      They also talk about the durability of allowlisting as a control. After 12 years in business, the Airlock product
      hasn’t really changed all that much. That’s a good thing! It also means the Airlock team have been able to spend
      some time doing deep engineering instead of chasing the latest attacker TTPs and writing detection rules for them.


