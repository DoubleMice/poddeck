    summary: >-
      In this wholly sponsored Soap Box edition of the podcast Patrick Gray chats with Damien Lewke, the CEO and founder
      of Nebulock, about the future of threat hunting and detection.


      Damien spent a decade in the EDR and MDR space before founding Nebulock in 2024. It started off as an AI-powered
      threat hunt platform but has evolved into a broader security data platform that can answer questions, drive hunts
      and drive detections.


      This product is engineered around the idea that a lot of security is a data problem. So, if we accept this
      premise, how do we solve security? And how much of that solution is about agents, vs building a good graph? And if
      you’re going to build a good graph, do you want to build it for a person to use, or an agent to use?


      This is truly a conversation for the security nerd’s nerd. Enjoy!


