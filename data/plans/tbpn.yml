      Canton. He outlines Blockworks' evolution from a media and events business to becoming the largest data company in
      crypto, emphasizing their strategy of building a strong audience base before developing data products. Yanowitz
      also addresses the current state of the crypto market, noting a dichotomy where institutional crypto adoption is
