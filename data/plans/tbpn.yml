    summary: "(01:26) - Meta Sells Compute?\r

      (28:17) - 𝕏 Timeline Reactions\r

      (32:14) - Mark Pincus, an American internet entrepreneur, is best known as the founder of Zynga, the pioneering
      social mobile gaming company behind hits like FarmVille and Words with Friends. In his recent conversation, Pincus
      discusses his new book, Life at the Speed of Play, which offers a hands-on guide to transforming ideas into
      products that resonate with users. He emphasizes the importance of rapid testing and learning in the AI era,
      sharing insights from his experiences to help entrepreneurs increase their chances of success.\r

      (01:08:42) - Shubh Sinha, co-founder and CEO of Integral, discusses the company's recent $18 million Series A
      funding and its mission to sanitize proprietary real-world datasets—such as medical records and financial
      transactions—so AI developers can access valuable data while ensuring privacy and compliance. He highlights how
      Integral enables data holders to monetize sensitive information without compromising privacy, benefiting both data
      providers and AI builders. Sinha also emphasizes the importance of privacy engineering in maintaining data utility
      and regulatory adherence, particularly in sectors like healthcare.\r

      (01:14:40) - Wayne Ting, CEO of Lime, reflects on the company's journey to its IPO, emphasizing the challenges
      faced in the micromobility industry and Lime's success in building a scalable, sustainable, and profitable
      business. He highlights the importance of operational efficiency, noting that even small mistakes can
      significantly impact the business, and stresses the need for a clear focus on critical areas like hardware,
      software, operations, and government relations. Ting also discusses Lime's vertical integration in hardware and
      software, which has allowed the company to manage supply chain challenges effectively and maintain a competitive
      edge in the market.\r

      (01:27:05) - Jeffery Liu is the co-founder and co-CEO of Assort Health, a San Francisco-based company specializing
      in AI-driven solutions for healthcare providers. In the conversation, Liu discusses how Assort Health's agentic
      platform enhances the entire patient journey by automating tasks such as call center operations, document
      processing, patient intake, care gap activation, and payment collection. He highlights the platform's ability to
      personalize patient interactions, reduce administrative burdens, and improve access to care, addressing challenges
      like long hold times and inefficient scheduling.\r

      (01:34:20) - Eliot Pence, co-founder of Dominion Dynamics, discusses the company's recent $100 million funding
      round aimed at building a Canadian defense technology firm focused on autonomous systems and Arctic domain
      awareness. He highlights Canada's rich defense tech history and the current opportunity to establish a major
      defense brand, emphasizing the importance of developing solutions for the Arctic's harsh environment to create
      significant competitive advantages. Pence also notes the company's strategic approach to cap table construction,
      incorporating both Canadian pension funds and global investors to support their vision of building a globally
      impactful, Canadian-owned enterprise.\r

      (01:41:06) - Luca Ferrari, co-founder and CEO of Bending Spoons, an Italian digital business holding company, has
      led the firm to a successful $1.7 billion IPO, listing on the Nasdaq under the ticker \"BSP\" with an $18.4
      billion valuation. In a recent conversation, he discussed the company's broad acquisition strategy, emphasizing
      the importance of predictability and long-term improvement in potential targets, rather than focusing solely on
      industry or synergy alignment. Ferrari also highlighted the time-intensive nature of their transformative
      integration process and reflected on their journey from an initial $10,000 acquisition to their current position,
      underscoring that, despite their achievements, the company's journey is just beginning.\r

      (02:03:39) - Nick Grossman, a partner at Union Square Ventures, discusses the firm's investment approach,
      emphasizing their focus on expansive technological waves that open new opportunities, such as the Web 2.0 era and
      the rise of agentic AI. He introduces the \"Rebel Alliance\" thesis, highlighting the vast ecosystem emerging
      around powerful AI models and the potential for generational companies to be built across various components of
      the agentic stack. Grossman also addresses the challenges and opportunities of thesis-driven investing, noting the
      importance of timing, team selection, and the balance between capital intensity and strategic positioning in the
      evolving AI landscape.\r

      (02:22:48) - Julian Hoenig, co-founder and chief design officer of Amble, discusses the inception of the Amble
      One, a street-legal electric buggy designed for short-range mobility in resorts and urban areas. The idea
      originated from a conversation with his friend José António Uva, who sought an aesthetically pleasing mobility
      solution for his resort in Portugal. Recognizing a broader market need, Hoenig and his team developed the Amble
      One, emphasizing design, comfort, and performance, with plans to begin deliveries to hospitality clients in 2027
      and expand to consumer markets by 2028.


