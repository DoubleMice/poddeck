    summary: "(01:05) - SpaceX Rips\r

      (08:00) - Andrew Lee, co-founder of Firebase (acquired by Google in 2014), discusses his latest venture, Tasklet,
      an AI agent platform that integrates with various work tools to automate workflows. He highlights Tasklet's rapid
      growth, achieving a $7 million run rate, and its ability to dynamically generate integrations using AI, enabling
      connections to both public and internal APIs. Lee also mentions a recent $20 million funding round and emphasizes
      Tasklet's competitive positioning against major AI labs.\r

      (18:14) - Stamatis Floratos is the co-founder and CEO of Eden Robotics, a company developing autonomous robots for
      industrial and commercial applications. In the conversation, he discusses their semi-humanoid robot with a wheeled
      base and two human-like arms equipped with grippers capable of performing over 80% of industrial tasks. He
      highlights the robot's 20-hour battery life and their innovative \"labor as a service\" model, charging clients
      per hour of robot operation, which has been well-received by customers.\r

      (26:20) - Hugo Frisk, co-founder and CEO of Tenet Industries, discusses his company's focus on mass-producing
      low-cost defense systems by applying principles from electronics and automotive manufacturing. He highlights the
      challenges of extending drone range without GPS, emphasizing the need for improved navigation systems and autonomy
      to overcome jamming issues. Frisk also outlines their business model, starting with private company sales and
      scaling up to government contracts, while addressing counter-UAS technologies and the importance of efficient,
      scalable production methods.\r

      (36:01) - Dr. Efrain Torres, co-founder of Adelante, discusses their development of mobile whole-body MRI units
      for cancer screening, emphasizing the safety and cost-effectiveness of their technology. He highlights the
      system's lighter weight, reduced power consumption, and quieter operation, enabling scans at $250 each,
      significantly lower than competitors. Torres also outlines their strategy of deploying traditional MRIs in mobile
      units to build distribution channels ahead of their proprietary system's FDA approval, aiming for profitability
      upon its clearance.\r

      (42:13) - Russell Smith, an entrepreneur and founder of 9 Mothers, discusses his journey from participating in Y
      Combinator's Summer 2012 batch to developing AI-powered counter-drone systems for the Department of Defense. He
      highlights the challenges of detecting and neutralizing fast-moving drones using a combination of sensors and
      kinetic methods, emphasizing the importance of sensor fusion to address various environmental conditions. Smith
      also shares the company's progress, including delivering units to the DoD, plans for significant revenue growth,
      and the development of a belt-fed shotgun system to enhance their counter-drone capabilities.\r

      (49:41) - Payton Case, founder of Dispatch Space, discusses his company's focus on building reentry vehicles to
      transport advanced materials manufactured in microgravity back to Earth, emphasizing applications in the
      semiconductor industry. He highlights a pilot mission with a paying customer to grow semiconductor crystals in
      space, noting that microgravity conditions yield crystals with up to a thousand times fewer defects. Case also
      shares his entrepreneurial journey from working in a smoothie shop to leading a space technology company and
      mentions the positive progress of their fundraising efforts.\r

      (54:24) - Akshay Trikha, co-founder of Madrone, is developing hyper-efficient cooling systems for data centers,
      particularly in hot and dry climates where hyperscaling is prevalent. He highlights that data centers are
      currently constrained by power availability rather than chips or land, with cooling consuming up to 40% of power
      that could otherwise be allocated to computational tasks. Madrone's innovative thermodynamic process aims to
      reduce power and water usage by 30%, enabling data centers to install more GPUs within existing grid permits and
      significantly lowering operational costs.\r

      (01:00:56) - New Snap AR Glasses\r

      (01:07:09) - Diana Hu, a Managing Partner at Y Combinator, co-founded Escher Reality, an augmented reality backend
      company acquired by Niantic in 2018, where she subsequently led the AR platform team. In the conversation, she
      reflects on her entrepreneurial journey, noting the significant growth of Y Combinator since her participation in
      2017, and discusses the rapid revenue achievements of current startups, attributing this acceleration to
      advancements in agentic coding. She also emphasizes the importance of tailored advice for startups, recognizing
      that strategies should vary based on the company's focus, such as core infrastructure or defense applications.\r

      (01:20:51) - Harj Taggar, a Managing Partner at Y Combinator, co-founded Auctomatic in 2007 and Triplebyte in
      2015, and was the first non-founder partner at YC in 2010. He discusses the evolving educational backgrounds of YC
      founders, noting a decline in computer science degrees and a rise in physics and math backgrounds, suggesting a
      shift towards first-principles thinking. Taggar also observes that while initial concerns about large AI labs
      dominating the field have subsided, founders are now focusing on creating tools and infrastructure that these labs
      are unlikely to develop, emphasizing the importance of identifying opportunities beyond the labs' scope.\r

      (01:38:36) - Garry Tan, born in 1981, is a Canadian-American venture capitalist and entrepreneur, currently
      serving as the President and CEO of Y Combinator. In the transcript, Tan discusses the growing trend of hard tech
      startups, emphasizing the importance of innovation in defense technology and the structural challenges faced by
      large tech companies in delivering desired technologies. He also highlights the potential of AI in transforming
      various industries and the need for startups to focus on creating products that people genuinely want.\r

      (02:00:30) - Connor Hayes, a longtime Meta executive, was appointed head of Threads in mid-2025, transitioning
      from his role as Vice President of Product for Generative AI. In the conversation, Hayes discusses Threads' growth
      to 500 million monthly users, emphasizing the platform's focus on fostering diverse communities and enhancing user
      engagement through features like Live Chats for events such as F1 and the NBA Finals. He highlights the app's
      commitment to being a \"quiet\" space for public conversation, differentiating it from other platforms by avoiding
      features like vertical video feeds, and underscores the importance of balancing growth metrics with the goal of
      facilitating meaningful interactions.\r

      (02:21:04) - Luke Burgis is an entrepreneur, author, and educator known for his work on mimetic desire and social
      contagion. In his conversation, he discusses how desires are often unconsciously shaped by others, the impact of
      artificial intelligence on these dynamics, and the importance of developing a strong personal identity to navigate
      societal pressures.\r

      (02:37:35) - Anda Gansca is the co-founder and CEO of Notch, a leading digital intelligence and optimization
      platform for Fortune 500 brands. In a recent conversation, she introduced ACE, a new infrastructure designed to
      enhance website conversion rates for both human users and AI agents. Gansca emphasized the importance of creating
      personalized digital experiences that cater to the evolving landscape of web traffic, where AI agents are becoming
      increasingly prevalent.


