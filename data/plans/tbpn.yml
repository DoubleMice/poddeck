      advancements in AI voice models, noting that while they can now engage in conversations indistinguishable from
      humans for the first 30 seconds to a minute, there is still progress to be made for longer interactions.\r

      (01:53:59) - Bubble Boi, a semiconductor industry expert, discusses the advantages of maintaining a traditional
      job to stay connected with engineering challenges, the early stages of the AI investment cycle with significant
      capital expenditures expected over the next three years, and the impact of large language models on market
      dynamics, noting that financial institutions are rapidly adopting these technologies for research.


