    summary: "(00:32) - Fable Unbanned\r

      (02:57) - OpenAI/U.S. Stake\r

      (11:03) - Jersey Mike's IPO\r

      (14:11) - End of Paper-Based Retirement\r

      (19:27) - SpaceX Phone\r

      (29:11) - 𝕏 Timeline Reactions\r

      (35:17) - Andrew Collins, CEO of Flexjet, discusses his journey from joining the company in 2012 through an
      acquisition to leading its global expansion, including the significant impact of COVID-19 on private aviation
      demand. He highlights Flexjet's strategic growth, such as the acquisition of Halo Aviation in London and
      Associated Aircraft Group in New York to form a global helicopter division, and the introduction of large-cabin
      aircraft like the Gulfstream G700 to meet increasing transatlantic flight demand. Collins also emphasizes the
      company's focus on enhancing customer experiences through partnerships, including becoming the official private
      aviation partner of Formula 1, and investing in future aviation technologies like electric vertical take-off and
      landing (eVTOL) vehicles.\r

      (51:39) - Vipul Ved Prakash, co-founder and CEO of Together AI, discusses the rapid growth of open-source AI
      models, highlighting their increasing competitiveness with closed-source alternatives and their ability to handle
      complex enterprise tasks. He emphasizes the cost-effectiveness and scalability of open models, noting a
      significant shift as companies adopt them to optimize expenses and maintain control over sensitive data. Prakash
      also addresses the evolving regulatory landscape, advocating for transparent evaluation of AI models to balance
      innovation with safety concerns.\r

      (01:02:46) - Isaiah Taylor, founder and CEO of Valar Atomics, discusses the company's recent milestone of
      generating electricity for the first time with their Ward 250 reactor, marking them as the first nuclear startup
      to achieve this feat. He highlights the advantages of nuclear power over natural gas, emphasizing its scalability
      and reduced climate impact, particularly in meeting the growing energy demands of the AI industry. Taylor also
      underscores the importance of proactive community engagement, noting that Valar Atomics involves local leaders
      early in the process to address potential concerns and foster support for their projects.\r

      (01:11:42) - Dean Ball, a former Senior Policy Advisor for Artificial Intelligence and Emerging Technology at the
      White House Office of Science and Technology Policy, recently joined OpenAI as Head of Strategic Futures. In his
      conversation, he discusses the rapid evolution of AI policy, noting that the current pace of policy development
      may be outstripping technological advancements. He also highlights the personal dynamics influencing AI policy
      debates and expresses concerns about potential government overreach in AI governance, emphasizing the need for
      balanced approaches to ensure both innovation and safety.\r

      (01:45:11) - Rob Toews, a venture capitalist and AI columnist, discusses his firm's recent $100 million investment
      in 12 Labs, a company specializing in video intelligence and understanding. He also shares his process for making
      annual AI predictions, highlighting five forecasts for 2030, including Anthropic's emergence as a major life
      sciences company, the disruption of semiconductor monopolies, the advent of telepathic communication, significant
      reductions in AI energy consumption, and societal debates over AI rights. Throughout the conversation, Toews
      emphasizes the rapid advancements in AI and their profound implications for various industries and societal
      norms.\r

      (02:05:20) - Tuhin Srivastava, co-founder and CEO of Baseten, an AI inference infrastructure company, discusses
      the company's recent $1.5 billion Series F funding round, which values Baseten at up to $13 billion. He highlights
      the growing demand for AI inference solutions across various sectors and emphasizes the importance of open-source
      models and customized AI solutions for businesses to maintain control over their data and intelligence. Srivastava
      also addresses concerns about open-source AI, advocating for the development of open-source control to ensure
      companies can own their intelligence and data.\r

