    summary: "(00:57) - Freedom 250 Recap\r

      (04:43) - Bo Nickal, a former Penn State wrestling champion turned UFC middleweight fighter, recently secured a
      first-round knockout victory over Kyle Daukaus at UFC Freedom 250, held on the White House South Lawn. In the
      conversation, Nickal discusses his early awareness of the event, having known seven months prior that he would be
      on the card, which allowed him to prepare thoroughly. He reflects on the unique atmosphere of the fight, noting
      the supportive crowd reminiscent of his college wrestling days, and shares his plans to capitalize on the media
      attention post-fight, including a media tour and a trip to Japan.\r

      (14:11) - The Hand Anthropic Was Dealt\r

      (21:45) - Meta Tracks AI Usage\r

      (30:24) - Gavin Baker, Chief Investment Officer and Managing Partner at Atreides Management, is a seasoned
      investor with a background in technology and consumer sectors. In the transcript, he discusses the successful
      execution of SpaceX's IPO, highlighting the company's rapid ascent in the AI compute sector through strategic
      deals with Google and Anthropic, and emphasizes the importance of scaling terrestrial compute and the potential of
      orbital data centers to reduce infrastructure costs.\r

      (01:03:41) - Leif Abraham, co-CEO of Public.com, discusses the unprecedented retail investor interest in SpaceX's
      IPO, noting that nearly half of all stock purchases on their platform that day were for SpaceX, making it the most
      popular IPO they've ever seen. He highlights the challenges retail investors face in obtaining significant
      allocations during high-demand IPOs, as banks often prioritize their wealthier clients, resulting in limited
      shares for the general public. Abraham also addresses concerns about SpaceX's inclusion in major indices,
      emphasizing that Public.com offers direct indexing tools, allowing investors to customize their portfolios by
      excluding specific stocks like SpaceX if desired.\r

      (01:16:58) - Fox Buys Roku\r

      (01:28:31) - 𝕏 Timeline Reactions\r

      (01:46:44) - Aaron Ginn is the CEO and co-founder of Hydra Host, a company specializing in GPU management
      platforms for AI infrastructure. In the conversation, he discusses the challenges of regulating technology
      adoption, emphasizing the importance of empowering parents to educate their children on social media use rather
      than implementing total bans. He also highlights Hydra Host's recent $100 million Series A funding, which will be
      used to expand their software solutions for data centers, enabling them to become NEO clouds without owning
      physical GPUs. Additionally, Ginn addresses the global competition in AI, noting that China's rapid adoption of AI
      technologies may render U.S. export restrictions less effective.\r

      (02:00:19) - Rafael Vivas, General Manager of New Initiatives at AppLovin, discusses the company's evolution from
      struggling to raise venture capital to becoming a leading mobile ad platform valued at $180 billion. He highlights
      the vast and diverse mobile gaming market, emphasizing its significant growth and the increasing need for
      effective distribution strategies. Vivas also touches on the integration of AI in enhancing advertising algorithms
      and internal efficiencies, as well as the company's focus on expanding its e-commerce initiatives and maintaining
      customer retention through profitable advertising solutions.\r

      (02:16:13) - 𝕏 Timeline Reactions


