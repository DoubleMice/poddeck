      to step down. He emphasizes Ternus's decisive leadership style, likened to Steve Jobs, and his focus on product
      innovation, including the development of new AI-powered devices and a significant revamp of the iPhone lineup.
      Gurman also notes that Ternus's promotion is expected to bring a sharper focus to Apple's product development,
      aiming to reinvigorate the company's innovation pipeline.\r

      (01:08:28) - Image 2 Reactions\r

      (01:17:50) - Scott Stevenson, co-founder and CEO of Spellbook, discusses the company's significant growth,
      highlighting that they have onboarded over 4,400 customers across 80 countries, making Spellbook the most widely
      used AI contract review tool globally. He attributes this rapid international adoption to strong inbound interest
      and emphasizes the product's multilingual capabilities, facilitated by AI models adept at handling various
      languages and supplemented with jurisdiction-specific legislation and norms. Stevenson also critiques the use of
      Contracted Annual Recurring Revenue (CARR) as a metric, pointing out how some companies inflate their ARR figures
      by reporting future, non-guaranteed revenues, and advocates for more transparent and grounded revenue reporting
      practices.\r

      (01:33:42) - Alex Wiltschko, founder and CEO of Osmo, is pioneering the integration of artificial intelligence
