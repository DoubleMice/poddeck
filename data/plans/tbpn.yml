    summary: "(00:52) - Meta Releases Muse 1.1\r

      (02:01) - GPT-5.6 Sol Reactions\r

      (14:49) - Meta Prices AI to Win\r

      (29:24) - Eric Seufert, a prominent analyst and founder of Mobile Dev Memo, discusses Meta's strategic use of AI
      in advertising to enhance ad performance and address investor skepticism. He emphasizes the importance of Meta's
      proprietary data in training AI models to create ads that are uniquely effective, thereby demonstrating the
      tangible benefits of their AI investments. Seufert also highlights the potential for AI-generated creative to
      alleviate bottlenecks in ad production, ultimately driving significant revenue growth for Meta.\r

      (55:53) - Bernt Øivind Børnich, founder and CEO of 1X Technologies, has led the company since its inception in
      2014, focusing on developing humanoid robots like NEO for consumer use. In the conversation, he discusses the
      launch of NEO, emphasizing its advanced, human-like hand design achieved through in-house development of
      miniaturized motors and tendons, and highlights the importance of creating robots that safely and effectively
      interact with the world to enhance AI capabilities. He also touches on the company's commitment to vertical
      integration, enabling rapid iteration and production scaling, and expresses excitement about the imminent shipping
      of NEO to consumers.\r

      (01:08:39) - Josh Lindgren, Head of the Podcast Department at Creative Artists Agency (CAA), began his career as a
      music agent before transitioning to podcast representation in 2014. In the conversation, he discusses the
      exponential growth of the podcast industry, the increasing integration of video into podcasting, and the evolving
      definitions of media formats. He also highlights the importance of creators having a clear purpose for their
      podcasts and the potential benefits of live shows in strengthening audience relationships.\r

      (01:29:05) - Jeffrey Morgan, CEO and co-founder of Ollama, discusses how their open-source platform enables
      developers to run large language models locally, facilitating rapid adoption among Fortune 500 companies due to
      enhanced security and compliance. He highlights the $65 million Series B funding led by Tamash Tungas, emphasizing
      plans to expand the team and invest in secure, US- and Europe-based hosting solutions. Morgan also addresses the
      evolving landscape of open-source models, noting the narrowing gap between open and frontier models, and the
      importance of providing developers with the right tools to deploy and manage these models effectively.\r

      (01:39:32) - Thibault Sottiaux, OpenAI's Head of Core Products and Platform, discusses the recent launch of
      ChatGPT Work, highlighting its enhanced capabilities in coding, cybersecurity, and long-context understanding. He
      emphasizes the model's improved efficiency and its ability to comprehend human intent with shorter prompts, making
      it more accessible to users without technical expertise. Sottiaux also notes the development of multi-agent
      setups, introduced as Ultra mode, where multiple agents collaborate to complete tasks more efficiently.\r

      (01:54:03) - Sean Frank is the CEO of Ridge Wallet, a company specializing in minimalist wallets and accessories.
      In the conversation, he discusses Ridge's expansion into products like travel gear and men's wedding rings, the
      impact of AI on advertising and inventory management, and the evolving landscape of e-commerce, including the
      challenges faced by luxury brands and the rise of platforms like TikTok Shop.


