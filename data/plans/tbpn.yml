    summary: "(01:52) - HackingFace\r

      (17:48) - 𝕏 Timeline Reactions\r

      (29:02) - White House Puts $5B into AI Science\r

      (33:48) - 𝕏 Timeline Reactions\r

      (44:55) - Veeral Patel, Director of Software Engineering at Ramp, discusses the launch of Ramp Router, a tool
      developed internally over three years to optimize AI model selection and token cost management. He explains how
      Ramp Router allows enterprises to dynamically route tasks to the most efficient AI models, balancing factors like
      latency, cost, and performance. Patel emphasizes that this product aligns with Ramp's mission to help companies
      save time and money, extending their expertise from expense management to AI token spend optimization.\r

      (55:35) - Lin Qiao, co-founder and CEO of Fireworks AI, announced the company's recent $1.5 billion fundraising
      round, emphasizing their focus on building a specialized intelligence platform that enables enterprises to
      transform private data into customized AI models optimized for speed and cost. She highlighted the industry's
      shift from general to specialized AI solutions, stressing the importance of companies maintaining control over
      their proprietary data to develop durable businesses. Qiao also discussed the challenges of scaling AI
      applications efficiently, noting that without careful management, even successful products risk scaling into
      bankruptcy due to high operational costs.\r

      (01:05:36) - Jason Fried is the co-founder and CEO of 37signals, a Chicago-based software company known for
      creating project management and communication tools like Basecamp and HEY. In the conversation, Fried discusses
      his passion for classic cars, sharing experiences with his 1979 Porsche 928 and reflecting on past decisions
      regarding vehicle trades. He also touches on the challenges of purchasing vintage cars through auctions,
      emphasizing the importance of thorough inspections to avoid unforeseen issues.\r

      (01:31:41) - Travis Kalanick is the co-founder and former CEO of Uber, which he helped grow into a global
      ride-hailing giant. He now leads Atoms, an industrial robotics and “physical AI” company spanning food automation,
      mining, and transportation, built from the parent company behind CloudKitchens.\r

      (02:17:29) - Max Hodak, founder and CEO of Science Corporation, discusses the recent European marketing approval
      for their retinal prosthesis designed to restore vision in patients with age-related macular degeneration. He
      outlines the upcoming steps for commercialization in Europe, including country-specific registrations and surgeon
      training, and mentions the expedited approval pathway in the U.S. through the FDA's humanitarian device exemption.
      Hodak also highlights ongoing research and development efforts to enhance the implant's capabilities, aiming for
      higher resolution, expanded field of view, and color perception.


