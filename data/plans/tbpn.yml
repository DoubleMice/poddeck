    summary: "(04:13) - China Export Controls\r

      (12:49) - SK Hynix Sets to Raise $28B\r

      (15:51) - Meta Unveils Muse Image\r

      (20:41) - Jeremy Giffon Breaks Silence\r

      (22:42) - 𝕏 Timeline Reactions\r

      (28:35) - Alex Hormozi is an entrepreneur, investor, and author best known for founding Acquisition.com, where he
      invests in and advises growing businesses. He is the author of $100M Offers and $100M Leads, and is widely known
      for sharing practical frameworks on entrepreneurship, marketing, sales, and scaling companies.\r

      (01:29:29) - Josh Zoffer, an investor and head of research at CIV, formerly a White House National Economic
      Council and US Treasury adviser, discusses the strategic importance of data centers in the United States. He
      emphasizes that data centers are not merely collections of chips but also involve critical technologies like power
      electronics and industrial materials such as steel. Zoffer warns that if the U.S. hinders data center
      construction, it risks losing control over essential supply chains, potentially repeating past mistakes that led
      to reliance on foreign sources for critical materials.\r

      (01:41:52) - John McElhone, founder of American Turbines, discusses his company's development of compact,
      1-megawatt natural gas turbines designed for rapid deployment, capable of powering over a thousand homes and
      fitting in the back of a pickup truck. He emphasizes the advantage of utilizing the abundant and inexpensive
      natural gas supply in the United States, making this technology particularly suitable for the domestic market.
      McElhone also highlights the company's focus on scaling production through automation, aiming to revolutionize
      energy generation by simplifying turbine design and manufacturing processes.\r

      (01:47:32) - Deena Shakir, a General Partner at Lux Capital, invests in transformative technologies across sectors
      such as women's health, digital health infrastructure, health equity, foodtech, and fintech. In the conversation,
      she discusses Lux Capital's recent investment in 1001, an AI company based in the Gulf Cooperation Council (GCC)
      region, highlighting the potential for applied AI in the Gulf and the opportunity for rapid, large-scale
      deployments. She also emphasizes the importance of homegrown companies in the GCC and the unique opportunity to
      build sovereign AI companies focused on the region.\r

      (01:54:38) - Hussein Fazal, co-founder and CEO of Super.com, discusses the company's recent $65 million Series D
      funding led by TPG at a $1.2 billion valuation, and its evolution into a savings super app offering discounts on
      hotels, gas, insurance, and financial services tailored for everyday Americans. He highlights the integration of
      AI to expedite product development and the strategic partnership with NASCAR to enhance brand visibility among
      their target demographic.\r

      (02:07:01) - John Nay, founder and CEO of Norm AI, discusses the company's recent $120 million funding round at a
      $1.2 billion valuation, highlighting their shift from selling AI tools to in-house legal teams to establishing
      Norm Law LLP, a law firm powered by AI agents. He emphasizes the value of vertical integration, with AI engineers
      and lawyers collaborating closely to reinvent legal workflows, and advises law students to focus on legal
      engineering by applying AI to legal reasoning. Nay also notes that while international expansion is considered, it
      requires deliberate planning to ensure the necessary legal expertise in each jurisdiction.


