    summary: "(00:14) - In-Car Surveillance\r

      (12:22) - Goblin-Mode\r

      (14:48) - Jon Gray, President and COO of Blackstone, joined the firm in 1992 and has been instrumental in its
      growth to managing over $1.3 trillion in assets. In the conversation, he reflects on Blackstone's evolution from a
      small advisory business to a global investment powerhouse, emphasizing the firm's entrepreneurial spirit and
      commitment to delivering premium returns. Gray also discusses the impact of artificial intelligence on various
      industries, highlighting both the challenges and opportunities it presents for investors.\r

      (36:18) - Colleen Aubrey, Senior Vice President of Applied AI Solutions at AWS, has been with Amazon for over 20
      years, leading teams in advertising and now focusing on AI-driven applications. She discusses the launch of Amazon
      Connect Decisions and Amazon Connect Talent, emphasizing the transformative potential of AI agents as teammates
      that can fundamentally change business operations. Aubrey highlights the importance of trustworthiness and
      observability in AI agents, ensuring they can explain their actions and reasoning, thereby fostering confidence
      and enabling effective collaboration within organizations.\r

      (44:02) - Anthony Liguori discusses the evolution of AI models from simple token prediction to advanced agentic
      systems, emphasizing the integration of tools and memory to enhance capabilities. He introduces Amazon Bedrock
      Managed Agents, highlighting its three components: runtime definitions for agents, dedicated compute environments
      with unique identities for governance, and an inference API compatible with existing applications. Liguori also
      shares his personal experience, noting that these advancements have significantly increased his productivity and
      enjoyment in coding.\r

      (51:57) - Colin Zima, CEO of Omni Analytics, discusses his company's mission to build a comprehensive data
      platform that integrates AI, spreadsheets, and dashboards atop a semantic layer, ensuring reliable AI operations.
      He highlights the uniqueness of each business's semantic layer and the importance of bridging traditional data
      structures with modern AI capabilities. Zima also addresses the evolving landscape of data infrastructure,
      emphasizing the increased portability of data systems and the need for pragmatic, cost-effective solutions in
      analytics.\r

      (01:00:47) - Alex Epstein, author of *Fossil Future*, is a philosopher and energy expert who advocates for the
      continued use of fossil fuels to promote human flourishing. In the conversation, he discusses the critical
      importance of maintaining open access to the Strait of Hormuz for global energy stability, the role of OPEC and
      its member countries in regulating oil supply and prices, and the potential of solar energy innovations, such as
      space-based solar power, while emphasizing the current limitations and challenges associated with these
      technologies.\r

      (01:25:34) - Shira Lazar is a Canadian television personality, actress, writer, and video blogger, best known as
      the creator and host of \"What's Trending,\" a pioneering digital news brand. In the conversation, she discusses
      her extensive experience in the digital media and creator economy, highlighting the evolution of live streaming
      since launching \"What's Trending\" in 2011. She also explores the current landscape of the creator economy,
      noting opportunities for both large-scale influencers and niche creators, while emphasizing the challenges faced
      by mid-level creators in monetizing their content.\r

      (01:41:09) - Anshul Gupta, co-founder of Actively, discusses how their platform enhances revenue team productivity
      by deploying per-account agents that proactively guide and assist sales representatives throughout the customer
      lifecycle. These agents integrate data from various sources, including product analytics and communication tools,
      to provide comprehensive context and actionable insights, enabling more efficient and effective sales processes.
      Gupta also highlights the potential for organizational changes, such as adjusting management structures and team
      ratios, as companies realize efficiency gains from implementing these agents.\r

      (01:47:21) - Apurva Shrivastava, co-founder and CEO of Avoca, discusses how his company builds AI agents for
      physical service businesses, particularly home services, to handle tasks like answering calls and booking jobs. He
      explains that both he and his co-founder, Tyson, grew up assisting their mothers' service businesses, which
      inspired them to create solutions that address common industry challenges. Apurva highlights the significant
      advancements in AI voice models, noting that while they can now engage in conversations indistinguishable from
