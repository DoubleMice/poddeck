    summary: "(00:22) - Big Tech Earnings\r

      (15:28) - AI Jitters Return to Wall Street\r

      (19:23) - Red vs. Blue Button\r

      (36:51) - Jason Yanowitz, co-founder of Blockworks, a crypto-focused media and data company, discusses the
      company's recent $192 million valuation, highlighting investments from firms like Parafine Reciprocal and Coinbase
      Ventures, as well as participation from 20 customers, including founders and operators from Solana, Kraken, and
      Canton. He outlines Blockworks' evolution from a media and events business to becoming the largest data company in
      crypto, emphasizing their strategy of building a strong audience base before developing data products. Yanowitz
      also addresses the current state of the crypto market, noting a dichotomy where institutional crypto adoption is
      thriving while token markets are underperforming, and anticipates that upcoming regulatory clarity will mandate
      disclosures for all token projects, potentially benefiting Blockworks' disclosure platform.\r

      (49:31) - Even Rogers, CEO and Co-Founder of True Anomaly, discusses his transition from a 10-year tenure in the
      U.S. Air Force to establishing the company, aiming to address the weaponization of space by nations like China and
      Russia. He highlights the development of their space-to-space engagement platform, Jackal, designed for space
      superiority, and Mosaic, the software that operates it, emphasizing their rapid deployment and testing
      methodologies. Rogers also touches on the challenges of tracking objects in space, the importance of reducing
      coverage gaps, and the company's growth trajectory, including a recent $650 million fundraising round and plans to
      scale up manufacturing and personnel.\r

      (01:02:09) - Maria Spiropulu, an experimental particle physicist with over 30 years of experience at CERN and
      Fermilab, discusses her work in particle collisions, including the discovery of the Higgs boson, and the
      development of quantum networks for secure communication. She highlights the potential of quantum computing to
      revolutionize fields like quantum chemistry and materials science, while emphasizing the importance of addressing
      cybersecurity challenges posed by these advancements. Additionally, Spiropulu underscores the need for
      interdisciplinary collaboration to ensure that technological progress benefits society as a whole.\r

      (01:33:08) - Stepan Simkin, co-founder and CEO of Squads, discusses the development of stablecoin infrastructure
      to assist businesses in managing their financial operations. He highlights the challenges companies face in
      adopting stablecoins, such as the complexity of handling them post-transaction, and emphasizes the importance of
      integrating stablecoins with traditional banking systems to facilitate seamless financial operations. Simkin also
      notes the advancements in programmable blockchains and the growing maturity of the stablecoin market, which have
      enhanced confidence among regulators and the broader market.\r

      (01:45:03) - Kashish Gupta, co-founder and co-CEO of Hightouch, an AI platform for marketers, discusses the
      company's recent $150 million Series D funding at a $2.75 billion valuation, led by Goldman Sachs and Bain Capital
      Ventures. He highlights Hightouch's evolution since its 2020 inception, emphasizing their AI-driven approach to
      enabling marketers to generate on-brand content like ads and emails efficiently. Gupta also addresses the
      transformative role of AI in marketing, noting that Hightouch's platform allows marketers to rapidly launch and
      test numerous campaigns, leveraging AI to optimize media spend and content creation.\r

      (01:57:36) - Dan Magy, co-founder and CEO of Firestorm Labs, discusses the company's mission to revolutionize
      drone manufacturing through advanced, modular designs and on-demand production capabilities. He highlights the
      development of the xCell platform, a containerized manufacturing system that enables rapid production of unmanned
      systems directly at the tactical edge, addressing the challenges of contested logistics. Magy also announces
      Firestorm's recent $82 million Series B funding, led by Washington Harbour Partners, to accelerate the deployment
      of these expeditionary manufacturing solutions.\r

      (02:06:57) - Vlad Tenev, co-founder and CEO of Robinhood, discusses the company's strategic investments across
      various stages of the customer lifecycle, including the introduction of Trump accounts to engage younger users,
      the growth of Robinhood Banking and the Robinhood Gold Card, and the expansion into active trading. He highlights
      the company's focus on promoting beneficial products like retirement accounts with a 3% contribution match and the
      innovative Robinhood Strategies, a low-cost passive digital advisor with capped fees. Tenev also addresses
      customer feedback, noting the company's responsiveness in enhancing features such as paying dividends up to 17
      days early and considering the addition of international stocks to meet user demand.\r

      (02:29:44) - Parag Agrawal, former CEO of Twitter, discusses the rapid development of AI agents utilizing the web,
      highlighting the significant progress made in the past six months. He emphasizes the importance of aligning
      incentives between content owners and AI developers to ensure sustainable growth and open access to web content.
      Agrawal also addresses the challenges posed by varying web access policies and the need for efficient solutions to
      enable agents to interact seamlessly with diverse web infrastructures. Andrew Reed is a partner at Sequoia Capital
      focused on early-stage investments in software, AI, and developer tools. He works closely with founders on
      product, go-to-market, and scaling, with an emphasis on backing technically driven teams building foundational
      technology companies.\r

      (02:44:03) - Gabriel Stengel, founder and CEO of Rogo, discusses the company's recent $160 million Series D
      funding round, led by Kleiner Perkins, valuing Rogo at $2 billion. He highlights the rapid adoption of AI tools in
      the financial sector, emphasizing Rogo's role in enhancing productivity and investment decisions for institutions
      like investment banks and hedge funds. Stengel also addresses the importance of aligning AI applications with
      business objectives, managing token consumption, and adapting organizational structures to integrate evolving AI
      technologies effectively.


