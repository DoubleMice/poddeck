    summary: "(00:15) - Tim Cook Retires\r

      (19:43) - Howie Liu, co-founder and CEO of Airtable, discusses his journey from learning programming in high
      school to founding Etacts, which was acquired by Salesforce, and eventually establishing Airtable to democratize
      software creation. He emphasizes the importance of building a product that is significantly better than existing
      options, highlighting Airtable's evolution into a low-code platform that empowers users to create custom
      applications without coding. Liu also reflects on the company's growth, noting its valuation milestones and the
      strategic patience involved in developing Airtable over several years before its public launch.\r

      (47:50) - Mark Gurman, a prominent technology journalist known for his in-depth coverage of Apple, discusses the
      recent leadership transition at Apple, highlighting John Ternus's appointment as CEO following Tim Cook's decision
      to step down. He emphasizes Ternus's decisive leadership style, likened to Steve Jobs, and his focus on product
      innovation, including the development of new AI-powered devices and a significant revamp of the iPhone lineup.
      Gurman also notes that Ternus's promotion is expected to bring a sharper focus to Apple's product development,
      aiming to reinvigorate the company's innovation pipeline.\r

      (01:08:28) - Image 2 Reactions\r

      (01:17:50) - Scott Stevenson, co-founder and CEO of Spellbook, discusses the company's significant growth,
      highlighting that they have onboarded over 4,400 customers across 80 countries, making Spellbook the most widely
      used AI contract review tool globally. He attributes this rapid international adoption to strong inbound interest
      and emphasizes the product's multilingual capabilities, facilitated by AI models adept at handling various
      languages and supplemented with jurisdiction-specific legislation and norms. Stevenson also critiques the use of
      Contracted Annual Recurring Revenue (CARR) as a metric, pointing out how some companies inflate their ARR figures
      by reporting future, non-guaranteed revenues, and advocates for more transparent and grounded revenue reporting
      practices.\r

      (01:33:42) - Alex Wiltschko, founder and CEO of Osmo, is pioneering the integration of artificial intelligence
      with olfactory science to endow computers with a sense of smell. In the conversation, he discusses the
      complexities of digitizing scent, the development of Osmo's proprietary Olfactory Intelligence technology, and its
      applications in creating fragrances for brands. He also highlights the company's recent $70 million Series B
      funding aimed at scaling their AI-powered olfaction technology across various sectors.\r

      (01:47:04) - Spiros Xanthos, co-founder and CEO of Resolve AI, discusses how their AI agents assist in debugging
      and managing production systems, complementing coding agents that generate code. He highlights the importance of
      reliability for businesses like Coinbase, Salesforce, and MongoDB, emphasizing that Resolve AI serves as the first
      line of defense by detecting and resolving production issues to minimize customer impact. Xanthos also notes the
      company's rapid growth, attributing it to the significant demand for automating production operations and their
      focus on building a successful product.\r

      (01:54:11) - Carolina Aguilar, CEO and co-founder of Inbrain Neuroelectronics, discusses her company's development
      of graphene-based brain-computer interfaces aimed at restoring health by creating intelligent connections between
      the neural system and AI. She explains their focus on implantable systems to achieve precise neural interaction,
      highlighting three product verticals: a semi-chronic platform for tumor and epilepsy resection nearing
      commercialization, an implantable platform targeting Parkinson's disease, and a vagus nerve sensor for therapeutic
      applications across various organs. Aguilar also emphasizes the importance of integrating their technology into
      existing surgical workflows to facilitate adoption without the immediate need for advanced robotics.\r

      (01:59:22) - Jake Jurewicz, co-founder and CEO of Blue Energy, has over a decade of experience in the energy and
      construction sectors, holding degrees in Nuclear Science & Engineering and Physics from MIT. He discusses Blue
      Energy's recent $380 million funding aimed at building the world's first project-financeable nuclear power plant
      by prefabricating components in existing shipyards, thereby reducing construction costs and timelines. This
      approach leverages mature light water reactor technology and centralized manufacturing techniques from offshore
      industries to make nuclear power more economically competitive.


