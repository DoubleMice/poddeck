    summary: "(02:42) - Neural Computers\r

      (20:48) - GameStop Offers $55B for eBay\r

      (28:44) - Nat Eliason, an entrepreneur and writer, is the Head of Founder Development at Alpha School, where he is
      launching a high school program that promises students will earn $1 million by graduation or receive a full
      tuition refund. In the conversation, he discusses his journey from running an SEO-focused marketing agency to
      exploring personal knowledge management and AI, leading him to develop this innovative educational model that
      combines AI-driven academics with real-world entrepreneurial experience.\r

      (58:12) - Michael York, co-founder and CEO of Casa, discusses his journey from joining Uber at 18 to launching
      Casa, a subscription-based homeownership platform. He explains how Casa acts as a personal property manager,
      handling maintenance and services for homeowners by leveraging advanced technology to create detailed home
      profiles. York also highlights the company's recent $20 million Series A funding and plans for expansion beyond
      San Francisco and Los Angeles.\r

      (01:11:15) - Maddie Hall, CEO and co-founder of Living Carbon, discusses her company's mission to restore degraded
      U.S. lands by planting genetically enhanced trees that capture more carbon and produce sustainable forest
      products. She highlights a recent $500 million deal with Octopus Energy Generation to reforest up to 250,000
      acres, aiming to remove 50 million tons of CO₂ over 40 years. Hall also emphasizes the importance of active
      intervention in reforestation projects and the potential for these efforts to offset emissions from data centers
      and AI operations.\r

      (01:18:43) - Anjney Midha is a General Partner at Andreessen Horowitz, focusing on AI, infrastructure, and
      open-source technology, with prior roles including VP of Platform Ecosystem at Discord and co-founder of
      Ubiquity6. In the conversation, he discusses the strategic rationale behind GameStop's acquisition of eBay,
      emphasizing the potential to eliminate $2 billion in marketing inefficiencies and leverage GameStop's physical
      stores for verifying collectibles, thereby creating a competitive edge in the AI-driven e-commerce landscape.\r

      (01:44:23) - Ben Lamm, a serial technology entrepreneur and co-founder of Colossal Biosciences, discusses the
      company's recent advancements in de-extinction efforts, including the successful creation of woolly mice and dire
      wolf puppies, demonstrating their ability to revive extinct species through genetic engineering. He highlights the
      role of AI in accelerating these processes and mentions the company's expansion into projects like the bluebuck,
      emphasizing their commitment to biodiversity restoration. Lamm also touches on potential partnerships with
      ecotourism and governments to reintroduce these species into natural habitats, aiming to blend conservation with
      education and economic opportunities.\r

      (01:54:43) - Jake Stauch, founder and CEO of Serval, an AI platform for employee support, discusses the company's
      new program, Serval Start, designed to deploy AI in large enterprises and train future founders. He emphasizes the
      importance of talented individuals who can build relationships, sell products, and develop solutions to
      effectively implement AI in complex organizational environments. The program aims to provide participants with
      hands-on experience in deploying AI, accelerating their career paths toward entrepreneurship.\r

      (02:01:35) - Garth Sheldon, representing Pampalasa, discusses the company's recent $140 million fundraising
      success and the development of autonomous energy-capturing nodes designed for deployment in the Southern
      Hemisphere's power-dense oceans. These nodes, each generating approximately 500 kilowatts, aim to provide
      scalable, renewable energy solutions for data centers, with plans to manufacture them near the deployment sites to
      optimize logistics and costs.\r

      (02:09:38) - Katie Haun, a former federal prosecutor and venture capitalist, is the founder and CEO of Haun
      Ventures, a firm specializing in digital assets and blockchain technology. In the conversation, she discusses the
      firm's recent $1 billion fundraise aimed at supporting founders building the \"new economy,\" focusing on three
      structural shifts: new financial rails and infrastructure, new assets and markets, and the intersection of AI and
      crypto. Haun emphasizes the importance of stablecoins, the tokenization of financial products, and the potential
      of prediction markets, while also highlighting the need for platforms to address regulatory challenges such as
      insider trading and federal preemption.\r

      (02:25:18) - Nick Abouzeid is the co-founder and CEO of Rivet, an AI-enabled tax preparation firm that serves over
      500 fast-growing companies. In the conversation, he discusses the challenges of implementing AI models in tax
      workflows, highlighting their unreliability and the necessity of human oversight to ensure accuracy. He also
      introduces TaxBench, a benchmark developed to evaluate AI models' performance in tax-related tasks, revealing
      significant capability gaps in current models.


