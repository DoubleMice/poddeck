    summary: "(00:39) - Apple vs OpenAI\r

      (25:24) - Paramount Threatens to Leave CA\r

      (42:48) - 𝕏 Timeline Reactions\r

      (45:39) - Alexis Ohanian, co-founder of Reddit and venture capitalist, discusses the enduring value of live events
      in the age of AI, emphasizing that human experiences like sports and theater remain irreplaceable. He highlights
      his investments in women's sports, such as Angel City FC, and the track and field league Athlos, aiming to
      modernize and elevate these domains. Ohanian also touches on the growth of sports betting, expressing concerns
      about its societal impact and the need for thoughtful regulation.\r

      (01:10:19) - Morgan Housel is a partner at The Collaborative Fund and the New York Times bestselling author of
      \"The Psychology of Money,\" with his works translated into over 60 languages and selling over 12 million copies.
      In the conversation, Housel discusses the psychology behind the rise in sports betting, noting that when
      individuals perceive limited options in life, they become more risk-seeking, leading to increased gambling
      activities. He also highlights the impact of technological advancements, such as the accessibility of day trading
      platforms, which have made gambling more prevalent across generations.\r

      (01:47:34) - Mark Gurman, a renowned technology journalist specializing in Apple Inc., discusses the recent
      lawsuit Apple filed against OpenAI, alleging the theft of trade secrets and confidential information. He
      highlights that OpenAI has recruited over 400 former Apple employees, including key figures like Tang Tan,
      OpenAI's Chief Hardware Officer, who is accused of soliciting proprietary information during interviews and
      coaching departing Apple employees on evading security protocols. Gurman emphasizes the significant impact this
      legal battle could have on both companies, especially as OpenAI ventures into hardware development using alleged
      misappropriated Apple technologies.\r

      (02:12:25) - Nico Christie & Michael Jarman. Nico Christie, co-founder and chief product officer of Fundamental
      Research Labs, discusses the development of Shortcut, an AI-powered Excel agent designed to automate complex
      spreadsheet tasks for finance professionals. He highlights Shortcut's ability to build financial models in
      minutes, achieving over 90% formula accuracy through multi-agent verification, and its integration as a native
      Excel plugin that preserves existing macros and VBA code. Christie also emphasizes Shortcut's continuous
      improvement, noting a 20% performance gain since launch due to daily updates enhancing agentic performance, user
      experience, and accuracy. Michael Jarman is a financial modeling expert and the 2024 Microsoft Excel World
      Champion, winning the title at the Microsoft Excel World Championship in Las Vegas after defeating a field of the
      world's best spreadsheet competitors. A financial modeling director based in Toronto, he is known for his mastery
      of advanced Excel, financial modeling, and high-speed spreadsheet problem solving.\r

