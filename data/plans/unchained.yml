    summary: >-
      The Chopping Block breaks down the Kontigo Venezuela sanctions scandal, poly market insider trading drama around
      Maduro's capture, and the explosive Zcash governance crisis that has the entire Electric Coin Company team
      quitting to launch CashZ amid foundation versus for-profit wallet debate.
       Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert Leshner chop it up about the latest in crypto. This week, the crew dives deep into Venezuela's unexpected crypto connections following Maduro's capture, unpacking how the YC-backed fintech Kontigo allegedly used stablecoins to arbitrage sanctions and capital controls.
