      Google and Oratomic published quantum computing research on the same day, and together they redraw the timeline
      for when blockchains need to be post-quantum secure.


      Google's paper, co-authored by Ethereum Foundation researcher Justin Drake and Stanford cryptographer Dan Boneh,
      estimates 2029 for breaking the elliptic curve cryptography that protects Bitcoin and Ethereum.


      Oratomic's findings are sharper: utility-scale quantum computers may need only 10,000 qubits, not the millions
      previously assumed, and the company already has 6,000 in the lab.


      With 6.7 million BTC in vulnerable addresses and a newly identified 9-minute attack window on unspent Bitcoin
      transactions, the question is no longer whether blockchains need to migrate. It's whether they can do it fast
      enough.


