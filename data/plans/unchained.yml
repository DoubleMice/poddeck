      a16z crypto just closed its fifth crypto fund at $2.2 billion — smaller than its previous fund, but the firm says
      that's deliberate. 


      General Partner Ali Yahya argues we are entering a different phase of crypto's development: one where
      infrastructure is ready, regulatory clarity is arriving, and the competition for real users has begun in earnest. 


      Two themes sit at the center of a16z's thesis — the collision of crypto and FinTech, and the emergence of AI
      agents as economic actors. But Yahya's most striking claim may be about blockchains themselves: that performance
