    summary: >-
      Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. This episode opens with the Aave DAO civil war: a CoWSwap
      integration that allegedly routed swap fees to Aave Labs/Avara instead of the DAO, igniting “stealth
      privatization” claims, a “poison pill” push to seize Aave IP/brand, and a bigger fight over who really owns
      Aave.com and the protocol’s front door.


      Next, the crew unpacks the Flow hack (a $3.9M mint exploit) and the wild rollback talk that followed — plus why
      forks and bridges make rollbacks dangerous, turning bridges into accidental custodians and breaking old security
      assumptions.


      Finally, they break down Coinbase’s System Update and the “Everything Exchange” strategy — stocks, tokenization,
      perps, prediction markets, stablecoin rails — and whether this approach can win against Robinhood. DAO wars, chain
      chaos, and super-app ambition — let’s get into it.


      Show highlights


      🔹 Aave DAO civil war erupts — CoWSwap fees reportedly route to Aave Labs/Avara, not the DAO, fueling “stealth
      privatization” claims.


      🔹 “Poison pill” proposal — DAO demands Aave IP/brand and Aave.com control, turning governance into a DevCo vs DAO
      showdown.


      🔹 No foundation, messy ownership — Aave’s pre-foundation setup exposes off-chain IP risk, jurisdiction questions,
      and untested legal theory.


      🔹 Christmas vote drama — 41% abstain signals a redo; OG/Asia backlash pits “property rights” vs “commons”
      narratives.


      🔹 Flow hacked for $3.9M — chain pause + rollback idea sparks outrage (and wouldn’t even stop the attacker).


      🔹 Rollbacks meet bridges — forked history can wipe innocent bridgers; bridges become custodians when chains reorg
      or rewind.


      🔹 Interconnected chains break security — old models crumble, and small chains “die twice” when bridges/oracles
      unplug.


      🔹 Coinbase goes “Everything Exchange” — stocks/ETFs, tokenization, perps, prediction markets; can Coinbase beat
      Robinhood’s funnel?


