      finders.


      Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. This week we’re joined by Justin Drake, Ethereum Foundation
      researcher and the internet’s favorite quantum attack alarm bell ringer. Things get spicy immediately: the eternal
      guessing game “Who is Satoshi?” gets a new round of attention as John Carreyrou (yeah, Theranos guy) drops a
      supposed expose pointing his finger at none other than Blockstream’s Adam Back. 


      The crew debates whether this Satoshi story is tired PR, inside baseball, or a genuine existential turning point
      for Bitcoin culture. Then things escalate: Justin walks us through Google and Atomic’s quantum computing
      breakthrough—a real, validated step forward that potentially pulls the “Q-day” clock up to as soon as 2029. The
      implications? Bitcoin and Ethereum’s security models are suddenly under the gun, and community denial is in full
      effect. Who’s better poised to survive a quantum apocalypse… and is coin burning on the menu for Satoshi’s stash?


