    summary: >-
      Thank you to our sponsors!

        Figure

        Crypto Tax Girl

      Are bitcoiners underestimating the quantum threat to Bitcoin? That's the question Castle Island Ventures Partner
      Nic Carter has posed with some recent posts gauging the views of several leading Bitcoin developers on quantum
      computing.


      To help answer the question, Unchained reached out to Ethereum Foundation Researcher Justin Drake and Michigan
      University Professor Chris Peikert. In this episode, Justin and Chris, who is one of the foremost experts on
      lattice cryptography, break down the quantum computing threat to crypto and the potential timelines.


      Justin theorizes that Bitcoin developers may not be incentivized to talk about the quantum computing risk while
      still saying that a number of smart people are already taking it seriously and that may be enough.


      Conversely, Chris highlights the constraints that come with uncertainty around risks and timelines.


      Listen to find out what they conclude. Plus, could AI do crypto in before quantum computers?


