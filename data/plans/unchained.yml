    summary: >-
      Rebecca from Jito Labs joins Haseeb, Tom, and Tarun for a regulation deep-dive covering the CLARITY Act's
      stablecoin yield compromise and presidential ethics sticking points, CME and ICE's lobbying war against
      Hyperliquid's RWA perps, the prediction market legal battle heading to the Supreme Court, and whether the SEC's
      tokenized securities innovation exemption will actually matter.


      Welcome to The Chopping Block – where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. This week, joining us is Rebecca Rettig, Chief Legal Officer at
      Jito Labs, who's here to help the crew make sense of the absolute regulatory tornado tearing through the industry.


      First up: the CLARITY Act. It just got out of Senate Banking Committee, but the road to passage is anything but
      smooth. The stablecoin yield fight with banks ended in a "do stuff yield" compromise, but presidential ethics
      provisions remain the last polarizing hurdle. Rebecca breaks down what actually changes for token founders if it
      passes — spoiler: not much immediately, since rulemaking alone could take years.


      Then: CME and ICE have declared war on Hyperliquid, lobbying the Hill to force CFTC registration on the
      decentralized perps giant. The crew debates who actually wins US regulated perps, whether Hyperliquid's pre-IPO
      markets represent a genuine threat to investment banking, and Rebecca introduces "on-chain finance" — a
      distinction the panel immediately roasts her for.


      Finally: prediction markets are in a legal bloodbath across state courts with a Supreme Court showdown likely by
      2027, and the SEC's tokenized securities innovation exemption has Twitter buzzing but Rebecca skeptical. Let's get
      into it.


      Listen to the episode on Apple Podcasts, Spotify, Pods, Fountain, Podcast Addict, Pocket Casts, Amazon Music, or
      on your favorite podcast platform.


      Show highlights


      🔹 CLARITY Act Passes Senate Banking – Landmark crypto bill advances with bipartisan support, but presidential
      ethics provisions remain the final sticking point before a full Senate floor vote.


      🔹 Stablecoin Yield Compromise – Banks screamed bloody murder, but the "do stuff yield" deal means
      transaction-based rewards are in and bank deposit lookalikes are out.


      🔹 CME & ICE vs Hyperliquid – Traditional exchanges lobby Congress to force CFTC registration, KYC/AML, and trade
      surveillance on the decentralized perps giant.


      🔹 Hyperliquid Prices Cerebras Better Than Bankers – Pre-IPO market nails the opening price while investment banks
      undershoot by over 100%, raising questions about the future of book building.


      🔹 Rebecca Rettig Returns – Jito Labs CLO breaks down what CLARITY actually means for token founders (spoiler: not
      much changes immediately — rulemaking takes years).


      🔹 Prediction Markets Head to SCOTUS – Legal bloodbath across state courts likely culminates in a Supreme Court
      showdown by 2027 over CFTC vs state gaming jurisdiction.


      🔹 The Super Bowl Coin Toss Traded at 58/42 – Tarun surfaces the most absurd prediction market of the year, and
      the CFTC chair basically says it shouldn't exist.


      🔹 Who Wins US Regulated Perps? – Haseeb bets on Coinbase and Robinhood, Tarun argues there's an opening for a
      dark horse, and Rebecca flags HIP 4's unified margin as a game-changer.


      🔹 SEC Innovation Exemption Buzz – Twitter is hyped about tokenized securities guidance, but Rebecca is skeptical
      it drops before CLARITY is resolved.


      🔹 OnFi Is Not Going to Happen – Rebecca tries to coin "on-chain finance" as distinct from DeFi. The panel roasts
      her. Mean Girls memes are inevitable.


