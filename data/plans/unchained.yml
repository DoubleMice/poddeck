      agent—plus, a candid look at crypto's core and how AI turns software engineering existential.


      Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. This week, we’re joined by none other than Erik Voorhees, legendary
      crypto pioneer and founder of Venice, for a no-holds-barred discussion on the wild convergence of AI, crypto, and
      the meme coin casino. Erik unpacks his journey from anti-surveillance crusader to AI entrepreneur, why Venice is
      all-in on privacy and free speech for LLMs, and how “provable privacy” is a Sisyphean technical challenge.


      The crew breaks down OpenClaw’s agent drama, memecoin carpet-bombing of Moltbook, and Meta muscling in on AI
      social networks. We debate agentic payments (will your first paying customer soon be a bot?), the true game theory
      behind state surveillance, and why crypto’s greatest killer use case might actually be building tools for robots
      instead of humans. Plus: existential crises for software engineers, why “AI alignment” is a philosophical dead
      end, and the childlike glee (or open psychosis) of trading OpenClaw war stories at AI meetups.


