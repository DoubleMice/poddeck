      Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. Tarun's out this episode, but we're joined by Peter Van
      Valkenburgh, Principal of Policy at Coin Center and one of the sharpest legal minds in crypto.


