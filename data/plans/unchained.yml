    summary: >-
      Across Protocol wants to retire its token in exchange for equity. Is the DAO model structurally broken?


      Thank you to our sponsor!

        
      Adaptive Security


      With Across Protocol proposing to retire its ACX token in favor of equity, a long-simmering question in crypto
      governance is finally breaking into the open: do token holders actually have meaningful ownership, or just the
      illusion of it? 


      As the regulatory environment under the new U.S. administration shifts dramatically from the Gensler era, the
      structures that crypto teams were forced to build may now be working against the very communities they were meant
      to serve. 


      Ryan Yi, founder of Onchain Group, and Felipe Montealegre, co-founder and CIO of Theia, have studied these
      incentive structures closely, and what they have found is uncomfortable. From PumpFun's suppressed valuation to
