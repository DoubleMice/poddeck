    summary: >-
      The Chopping Block crew and Wintermute’s Evgeny Gaevoy debate whether Canton is truly permissionless, if Ethereum
      Foundation should double down on cypherpunk ideals or embrace institutions, and how AI-driven attacks are forcing
      everyone in crypto and open source to rethink security models.


      Welcome to The Chopping Block — where crypto insiders Haseeb Qureshi, Tom Schmidt, Tarun Chitra, and Robert
      Leshner chop it up about the latest in crypto. This week we’ve got Evgeny Gaevoy, Founder of Wintermute, known for
      sharp takes and sharper trades.


      First up, the group unpacks the Twitter war over enterprise chain Canton—does it deserve to be called
      “permissionless”, or is it just TradFi with extra steps? Cue the Solana–Ethereum truce, and a rare moment where
      every old-school degenerate finds a common enemy. Evgeny makes a strong case for why, despite years of jokes at
      the Ethereum Foundation’s expense, he thinks they’re finally ahead of the curve by doubling down on cypherpunk
      roots—even if it makes ETH a little more Linux and a little less Nasdaq.


      But does decentralization matter if stablecoins and institutions now control the fork-choice? Haseeb and Evgeny
      spar over whether Ethereum’s “world computer” vision means inviting in the corporate crowd or keeping the punk
      sanctuary alive.


      The mood shifts as the hosts dig into crypto’s unfolding security meltdown: AI-written hacks, NPM supply chain
      fiascos, and what that means for the future of open source in crypto. Plus, a fresh new hack (RIP Drift), and
      predictions on how defensive tech (or lack thereof) will shape the next cycle. Barstool banter, spicy takes, and
      zero investment advice as always—let’s get into it.


      Listen to the episode on Apple Podcasts, Spotify, Pods, Fountain, Podcast Addict, Pocket Casts, Amazon Music, or
      on your favorite podcast platform.


      Show highlights


      🔹 The Chopping Block crew and Evgeny Gaevoy debate whether Canton is a permissionless blockchain or just TradFi
      LARPing as crypto  


      🔹 Does Ethereum need to double down on cypherpunk “sanctuary” values—or let BlackRock and Circle join the
      party?  


      🔹 Haseeb dismantles the idea that all “tokenized RWAs” on “permissioned” blockchains are equivalent to Ethereum  


      🔹 Solana and Ethereum align—briefly!—with both camps skeptical of enterprise “default no” blockchains  


      🔹 Circle and Tether’s growing influence: can fork-choice governance still exist if stables dictate the canonical
      chain?  


      🔹 Linux, the open internet, and how crypto’s utopian dreams get co-opted by institutions  


      🔹 Drift’s $270M hack highlights the AI-enabled acceleration of exploits and the mounting risks for open-source
      software  


      🔹 AI in security: From North Korean supply chain attacks to open source’s existential crisis  


      🔹 Is the future of crypto code closed or open? Zero knowledge proofs vs. code visibility in the LLM era  


      🔹 Are we headed for a world where only org-backed, audit-heavy open source survives?


