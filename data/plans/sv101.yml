    image: https://media24.fireside.fm/file/fireside-images-2024/podcasts/images/f/f0f20376-8faf-4940-b920-84af6c734e2d/cover.jpg?v=6
    summary: |-
      2025年，中国餐饮品牌开启了声势浩大的出海美国。喜茶在纽约开出了更具辨识度的LAB店，霸王茶姬、瑞幸和蜜雪冰城也在这一年正式登陆美国。

      但要问目前在美国做得最好的中餐和茶饮品牌，答案可能会出乎你意料——中餐第一是一度退出中国华北市场的鼎泰丰，茶饮标杆则是早在内地销声匿迹的贡茶。

      究其原因，餐饮企业想顺利出海美国，不仅需要足够的“做时间的朋友”的耐心，需要对当地商业规则足够了解，更要吃透当地主流人群的生活习惯和饮食需求。想要更运筹帷幄，还得和本国的文化输出打好配合。

      这期播客，我们邀请到了北美吃货传媒的三位嘉宾，我们一起聊了聊，那些在媒体高频关注的企业之外的、餐食茶饮闯美国的好生意和坏生意。

      【主播】

      麻花，硅谷101特约研究员 

      【嘉宾】

      Amy Duan，北美吃货传媒公司创始人，专注中餐出海、北美餐饮孵化落地投资

