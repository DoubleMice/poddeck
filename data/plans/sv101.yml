      感谢细心听众的指正：星舰Starship的推进剂应为液态甲烷(LCH₄)，而非煤油(RP-1)。煤油是SpaceX猎鹰9号使用的燃料，星舰从设计之初就选择了甲烷路线，主要原因是甲烷燃烧几乎不积碳、支持快速复用、可在火星合成。从单价上来说，液态甲烷比航天精炼煤油更便宜。

      节目中2个月的能量回本时间假设基于500W/kg的太阳能板发电效率和约40%的火箭效率，不需要假设燃料类型。

