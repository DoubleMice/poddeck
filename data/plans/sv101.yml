      中国新茶饮品牌在美国的出海趋势与区域分布洞察

      熊猫快餐（Panda Express）：1983年创立于美国，主打美式中餐，总门店数2500+，门店覆盖全球12个国家及美国49个州，为全球规模最大的中式快餐连锁品牌。

      快可立（Quickly），珍珠奶茶品牌，1996年创立于中国台湾，门店遍布日本、韩国、泰国、菲律宾、新加坡、美国、加拿大等地。

      Chipotle：1993年创立，主打墨西哥卷饼、碗餐等，年营收约113亿美元，门店超3700家，现为全球市值第三的连锁餐饮品牌。

      快乐蜂（Jollibee）：1975年创立于菲律宾，主打炸鸡等西式快餐，全球门店超一万家，为菲律宾最大餐饮集团，旗下还拥有添好運、永和大王等19个品牌。

