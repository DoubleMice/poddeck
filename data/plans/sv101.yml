      【延伸阅读与相关名词】


      英超Big 6：包括阿森纳、切尔西、利物浦、曼联、曼城和托特纳姆热刺，其中前4支球队又被称为Big 4或者传统四大豪门，Big 4如今都被美资控股


      阿布卡拉莫维奇：俄罗斯富豪，2003年买下切尔西，斥超过20亿英镑引援，并先后聘请穆里尼奥、希丁克等名帅执教，让切尔西收获21个冠军奖杯。后因俄乌战争被迫出售切尔西，并免除了俱乐部对其个人约15亿英镑的债务。


      大卫·邓恩：英国商人&前阿森纳副主席，英超联赛创立的核心推手之一，1996年力排众议聘请温格执教，开启阿森纳辉煌时代，2007年因支持外部资本收购俱乐部，与董事会产生分歧而被迫离开。


      乌斯曼诺夫：乌兹别克裔俄罗斯寡头，通过投资钢铁、电信和Facebook、阿里巴巴等互联网企业积累巨额财富，曾是阿森纳第二大股东，后因俄乌战争被制裁资产遭冻结，也通过DST投资过京东、小米和滴滴。


      法哈德·莫希里：英籍伊朗裔富商，因结识乌斯曼诺夫而发迹，曾任埃弗顿足球俱乐部大股东。他在埃弗顿投入巨资但管理混乱，球队战绩下滑并屡次违反财务规则，最终于2024年将俱乐部出售。


      霍斯特·达斯勒：阿迪达斯创始人之子，现代体育营销先驱，不仅帮助阿迪达斯实现了国际化，更参与并主导了世界杯、奥运会等大型国际体育赛事的商业化模式制定。


      CAA Eleven：是国际顶尖经纪公司CAA在瑞士成立的子公司，主要负责独家管理欧足联旗下国家队赛事的商业版权，包括欧洲杯、欧洲杯预选赛、欧国联及女足欧洲杯等赛事的转播与赞助权。


      TEAM Marketing：瑞士体育营销公司，是欧冠联赛从1992年改制至今的“幕后缔造者”，为欧足联创造了超过500亿欧元的收入，但双方合作将在2027年结束。


      Relevent Sports：美国体育传媒与赛事推广公司，由NFL迈阿密海豚队老板斯蒂芬·罗斯创立，以创办国际冠军杯（ICC）闻名，将欧洲豪门季前赛引入北美，还代理西甲、德甲等联赛在美洲的媒体版权。2027年起接替TEAM
      Marketing，负责欧足联旗下男子俱乐部赛事的全球商业版权。


      ECA：European Club Association，欧洲俱乐部协会，代表欧洲职业俱乐部利益的官方组织，拥有超过200家会员俱乐部。


      DAZN：英国全球体育流媒体平台，被誉为“体育界Netflix”，由乌克兰裔美国亿万富翁Len Blavatnik通过其美国投资集团Access Industries拥有。


      ISL：由霍斯特·达斯勒成立，是上世纪足球商业化的关键推手，曾长期独家代理FIFA世界杯的电视转播权和商业赞助权，后因过度扩张陷入债务危机最终破产，并引发了国际足联历史上最大的腐败丑闻。


