<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>PodDeck — 跳转中...</title>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #fafaf9;
      color: #44403c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: #78716c; font-size: 0.9rem; line-height: 1.5; }
    a { color: #2563eb; }
  </style>
  <script>
    // SPA fallback for GitHub Pages.
    // GH Pages serves this file for any unknown path. We detect if the path
    // is /episodes/<id>/<rest> and redirect to the hash-routed Slidev SPA.
    // For pure /<unknown> paths, fall through to the visible "lost" page.
    (function () {
      // Pattern matches both /episodes/<id>/<rest> (local) and /poddeck/episodes/<id>/<rest> (GH Pages)
      var path = window.location.pathname
      var match = path.match(/^(.*?\/episodes\/([^\/]+)\/)(.*)$/)
      if (match) {
        var spaRoot = match[1]
        var episodeId = match[2]
        var rest = match[3] || ''
        // Static episode assets, including generated articles, should stay as
        // real 404s when missing instead of being rewritten into the Slidev SPA.
        if (/\.[^\/]+$/.test(rest)) return

        // Recover URLs produced by Slidev 52.16.0, which duplicated the base.
        var duplicateMarker = 'episodes/' + episodeId + '/'
        var duplicateIndex = rest.lastIndexOf(duplicateMarker)
        if (duplicateIndex !== -1) {
          rest = rest.slice(duplicateIndex + duplicateMarker.length)
        }

        var route = rest.replace(/^\/+|\/+$/g, '')
        if (!route) return

        window.location.replace(spaRoot + '#/' + route + window.location.search)
        return
      }
      // Unknown non-episode path — will show the fallback UI below
    })()
  </script>
</head>
<body>
  <div class="box">
    <h1>404 · 找不到这个页面</h1>
    <p>这个 URL 不在 PodDeck 上。<br />如果你点的是某集的深度链接，正在跳转到该集首页。</p>
    <p><a href="./">← 回到 PodDeck 首页</a></p>
  </div>
</body>
</html>
