name: Discover

# 每天 UTC 3:00 自动扫描频道 → 生成 plan 文件
# plan:run（字幕下载 + slides 生成）在本地执行
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Refresh cache (scan channels)
        run: pnpm run cache:refresh

      - name: Generate plans
        run: pnpm run plan

      - name: Commit plan files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/plans/
          if git diff --staged --quiet; then
            echo "No new plans"
          else
            git commit -m "auto: refresh discover plans"
            git push
          fi
