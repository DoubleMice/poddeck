name: Generate and Deploy

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source id to generate; empty means all sources'
        required: false
        default: ''
      limit:
        description: 'Maximum episodes to generate'
        required: true
        default: '4'
      transcribe_limit:
        description: 'Maximum missing-transcript episodes to submit for ASR'
        required: true
        default: '3'
      transcribe_wait_minutes:
        description: 'Minutes to wait for ASR completion before continuing'
        required: true
        default: '2'
      category:
        description: 'Optional category filter'
        required: false
        default: ''

env:
  PODDECK_BASE: /poddeck/
  PODDECK_SITE: https://doublemice.github.io
  ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
  ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
  ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
  ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
  ANTHROPIC_MODEL: deepseek-v4-pro
  ENABLE_TOOL_SEARCH: 'true'

concurrency:
  group: generate-and-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install playwright-chromium browser binaries
        run: pnpm exec playwright install --with-deps chromium

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify Anthropic auth token
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          if [ -z "${ANTHROPIC_AUTH_TOKEN}" ]; then
            echo "ANTHROPIC_AUTH_TOKEN secret is required"
            exit 1
          fi

      - name: Refresh RSS cache
        run: pnpm run cache:refresh

      - name: Generate plans
        run: pnpm run plan

      - name: Generate episodes
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          TRANSCRIPT_PROVIDER: ${{ vars.TRANSCRIPT_PROVIDER }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ vars.MIMO_BASE_URL }}
          MIMO_MODEL: ${{ vars.MIMO_MODEL }}
          MIMO_MAX_COMPLETION_TOKENS: ${{ vars.MIMO_MAX_COMPLETION_TOKENS }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          set -euo pipefail
          limit="${{ inputs.limit || '4' }}"
          transcribe_limit="${{ inputs.transcribe_limit || '3' }}"
          transcribe_wait_minutes="${{ inputs.transcribe_wait_minutes || '2' }}"
          source="${{ inputs.source || '' }}"
          category="${{ inputs.category || '' }}"
          export TRANSCRIPT_PROVIDER="${TRANSCRIPT_PROVIDER:-mimo}"
          export MIMO_BASE_URL="${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}"
          export MIMO_MODEL="${MIMO_MODEL:-mimo-v2.5}"
          export MIMO_MAX_COMPLETION_TOKENS="${MIMO_MAX_COMPLETION_TOKENS:-32768}"
          args=(--limit=${limit})
          if [ "${TRANSCRIPT_PROVIDER}" = "mimo" ] && [ -n "${MIMO_API_KEY}" ]; then
            args+=(--auto-transcribe --transcribe-limit=${transcribe_limit} --transcribe-wait-minutes=${transcribe_wait_minutes})
          elif [ "${TRANSCRIPT_PROVIDER}" = "dashscope" ] && [ -n "${DASHSCOPE_API_KEY}" ]; then
            args+=(--auto-transcribe --transcribe-limit=${transcribe_limit} --transcribe-wait-minutes=${transcribe_wait_minutes})
          else
            echo "Transcript provider ${TRANSCRIPT_PROVIDER} is not configured; skipping auto transcription"
          fi
          if [ -n "${source}" ]; then
            args+=(--id=${source})
          fi
          if [ -n "${category}" ]; then
            args+=(--category=${category})
          fi
          pnpm run plan:run -- "${args[@]}"

      - name: Normalize generated metadata
        run: pnpm run normalize:meta -- --fix

      - name: Update lockfile for generated workspaces
        run: pnpm install --lockfile-only

      - name: Link generated workspaces
        run: pnpm install --no-frozen-lockfile

      - name: Build all
        run: pnpm run build

      - name: Inject 404.html into root dist
        run: |
          if [ -f landing/public/404.html ]; then
            cp landing/public/404.html dist/404.html
          fi

      - name: Verify slide routing
        run: pnpm run verify:routing

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/plans data/transcripts data/transcription-jobs.yml episodes README.md sources.yml package.json pnpm-lock.yaml .github/workflows
          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "auto: generate rss episode"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
