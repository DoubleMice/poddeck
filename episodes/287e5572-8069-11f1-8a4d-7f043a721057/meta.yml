summary: |
  Laura Shin 与 Cheetah Foundation 治理负责人 Nick Almond 及 MetaDAO 联合创始人 ProfIt 深入讨论了 DAO 治理的现状与未来。从 ENS DAO 的创始人夺权、BonkDAO $20M 被抽干，到 VVV 代币引发的「代币 vs 股权」争论，三位嘉宾剖析了投票冷漠、治理捕获和基础设施停滞等 DAO 1.0 的系统性问题，并探讨了决策市场、精选委托和代币优先声明等 DAO 2.0 的新方向。
core_ideas:
  - DAO 1.0 的投票模型已系统性失败——投票冷漠导致少数代币持有者可以捕获整个国库，ENS 和 BonkDAO 是典型案例。
  - 决策市场（MetaDAO）提供了根本性的替代方案：用交易替代投票，让经济激励直接与正确决策对齐，而非依赖参与意愿。
  - '精选委托制（Jito 模型）是当前最务实的折中：由基金会筛选合格代表，代币持有者保留撤销权，兼顾效率与去中心化。'
  - '「代币 vs 股权」争论的核心是价值归属：同时拥有股权（有受信义务）和代币（无受信义务）会产生双重使命困境，推动 Morpho、Grass、Jito 等项目走向代币优先声明。'
  - 链上通知系统和更长的时间锁是防止「冷漠攻击」的最低防线——BonkDAO $20M 被盗完全可以避免。
  - 我们可能正处于 DAO 底部——所有失败模式已被充分暴露，下一个实验时代可以开始。
