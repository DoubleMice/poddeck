summary: |
  Lyn Alden 在 Unchained 播客中详解了她与团队共同创立的 Orange Juice——一家永久资本控股公司，通过收购抗 AI 的实体企业获取稳定现金流，并在母公司层面用留存收益持续积累比特币。她对比了 Orange Juice 与传统 PE 和纯比特币 DAT 的根本差异，阐述了反周期配置策略和保守杠杆设计，同时以 Strategy 长期股东的身份对其近期储备金波动和 STRC 事件做了坦诚分析，并分享了她对 BIP 110 和量子威胁的看法。
core_ideas:
  - Orange Juice 收购成熟实体企业（非 VC 创业公司），用运营现金流支撑比特币 treasury，形成"做多比特币 + 做多抗 AI 企业 + 做空法币"的三层策略
  - 与传统 PE 的根本区别：永久持有 vs 3-7 年退出；保守杠杆（利息仅占现金流 1/3）vs 高杠杆；保持企业完整 vs 掏空后转售
  - 反周期策略提供可选性：牛市收购企业扩大现金流基础，熊市低价增持比特币——解决纯 DAT 的顺周期困境
  - 'Berkshire Hathaway 用保险浮存金作为低成本杠杆，OJ 用比特币作为"rocket fuel"实现类似的增值引擎'
  - 对 Strategy 的批评：偏离了维持 2-3 年美元储备的指引，导致市场信任受损——核心问题不是资金，而是沟通与一致性
  - 对 BIP 110 和量子威胁的判断：认为 inscriptions 本质上是垃圾信息，但 BIP 110 技术上有局限；量子威胁需要认真研究但不应急于仓促部署不成熟方案
