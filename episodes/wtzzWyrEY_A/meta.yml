summary: |
  Jesse Vincent —— Perl projects lead 出身、K-9 Mail 的原作者、25 年老兵 ——
  把过去九个月驯服 Claude Code 的方法摊开来讲. 110k stars 的 superpowers 不是 vibe coding,
  而是一套 orchestrator 架构 + 单使命 subagent 分工 + skill 系统的 agentic engineering 方法论.
  这期还覆盖 Claude 删测试事件如何用一行 prompt 修好、为什么 swarm 是 2002 年的 Facebook、
  以及 2028 年 GitHub 可能不存代码只存 specs 的预言.
