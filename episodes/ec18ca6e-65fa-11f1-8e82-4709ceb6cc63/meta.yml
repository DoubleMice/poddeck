summary: |
  Unchained 的三位主持人讨论了 Anthropic Fable 5 模型发布带来的连锁反应。
  Fable 5 采用了基于话题检测而非意图判断的全新安全范式，导致安全研究人员完全无法使用它进行智能合约审计。
  Kain Warwick 用实验揭示了一个惊人的事实：$200/月的 AI 订阅实际上可以消耗高达 $20,000 的 API 等价额度——100 倍的补贴不可持续。
  节目还涵盖了朝鲜黑客窃取 AI API Key 的新趋势、Fable 5 令人恐惧的推理能力突破，以及 Pump.fun 赏金市场引发的伦理争议。
core_ideas:
  - Fable 5 用话题检测替代意图检测，这是 AI 安全范式的根本转变——但也让白帽防御者无法使用前沿模型保护自己
  - AI 订阅是 100 倍补贴的——Kain 的实验证明 $200/月的 Max 计划可以无限制消耗价值 $20,000 的 API token
  - 补贴悬崖即将到来——Fable 5 从 6 月 22 日起仅限 API 访问，这是首个不享受订阅补贴的前沿模型
  - 朝鲜威胁行为者已经在系统性窃取开发者的 AI API 密钥——持续了六个月以上
  - Fable 5 在处理包含上百份混乱文档的规划问题时，展现了接近人类高级工程师的推理能力
  - 定价模型不仅仅是价格问题——从订阅制切换到计量制会完全改变用户使用 AI 的行为模式和心理
