summary: |
  Risky Business Media 的历史纪录片系列第一集，聚焦 1980 年代黑客文化的起源。从 ARPANET 的 @ 派对策展文化、密尔沃基 414 小组的 war-dial 探索及其无意中推动 CFAA 立法，到 Morris 蠕虫作为首起计算机犯罪公诉、NSA 对软件黑客的轻视与情报界最终被商品化浪潮拖入现实，再到 Cliff Stoll 与 Greg Charter 两条并行追踪线揭露的德国黑客间谍网络——本期捕捉了计算机安全从一个"没有锁就没有窃贼"的开放时代，走向全面立法与对抗的十年。
core_ideas:
  - 'ARPANET 是一个没有文件权限、没有密码的乌托邦俱乐部——商业活动被严格排斥，系统管理员通过互相"告状"来维持秩序'
  - '414 小组以 war-dial 随机探索网络，因没有相关法律仅被以跨国电话线路非法使用起诉——事件直接推动了 1986 年 CFAA 的诞生'
  - 'Morris 蠕虫感染了当时互联网约 10% 的计算机（6,000 台），是 CFAA 首起公诉——检察官 Mark Rasch 在重罪与轻罪之间经历了一场深刻的道德权衡'
  - 'NSA 在 80 年代将软件黑客视为"业余爱好者的活"——直到经济学不可阻挡地让商品化计算渗透进最机密的领域'
  - 'Cliff Stoll 的布谷鸟蛋追踪与 Greg Charter 对 Hagbard 的并行追踪揭示了一个被忽视的事实：计算机间谍活动在互联网早期就已经在发生'
  - 'Hagbard（Karl Koch）的悲剧结局——1989 年被发现死亡，被裁定为自杀——展现了早期黑客亚文化中黑暗而复杂的人性面向'
