summary: |
  TBPN 三小时夏日圆桌涵盖多条重磅话题：Xbox 新任 CEO Ashish Sharma 宣布 3,200 人裁员并公开承认业务不健康——近十年最诚实的科技裁员信；Ferrari 推出 12 Cilindri Manuale，用电控系统在 DCT 变速箱上模拟三踏板手动挡体验。Robinhood 联合创始人 Baiju Bhatt 详解 Cowboy Space 为何必须自己造火箭：垂直整合发射、空间数据中心和太空架构，才能在成本上让轨道计算与地面竞争。Daniel English 从数据中心投资角度揭示 AI 时代基础设施的巨变——单栋建筑从 5MW 到 50MW、从"没人懂"到"人人抢"。Replit 总裁 Michele Catasta 宣告后 Prompting 时代到来：Agent 不再需要精确指令，你只需告诉它目标。
core_ideas:
  - Xbox 裁员 3,200 人却不提 AI——游戏社区的反 AI 情绪让科技公司的裁员叙事出现罕见分化
  - Baiju Bhatt 的太空战略：造"Honda Civic 级别"的火箭，用第一方商业载荷取代第三方发射，控制整条经济链
  - Daniel English 指出数据中心是人类史上第一种不为人类设计的建筑——机器的需求决定选址逻辑
  - Michele Catasta 预言“后 Prompting 时代”：从给模型精确指令到只告诉模型目标，Agent 将替代大量 App
  - Ferrari 的 manual by wire 证明"好玩"比"纯粹"更重要——无论是 V12 法拉利还是 Hyundai 电动掀背
  - 'Circle K $1,300 万彩票三方争夺战：原顾客、店面经理、公司总部——谁能赢取决于员工手册怎么写'
