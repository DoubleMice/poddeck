summary: |
  TBPN's 3-hour panel covering Apple's WWDC 2026 "All Systems Glow" keynote and the reinvention of Siri with AI; the May jobs report showing 172K new jobs amid rising inflation pushing the Fed toward rate hike territory; VC horror stories that went viral and what they reveal about startup fundraising; and in-depth interviews with Planet Labs CEO Will Marshall on satellite Earth imaging, Baroness Dambisa Moyo on board governance and the global economy, Samuel Hume on the pancreatic cancer RAS breakthrough, Helion CEO David Kirtley on commercial fusion, Generalist CEO Pete Florence on robotics scaling laws, and Antares CEO Jordan Bramble on turning on America's first private micro nuclear reactor ahead of schedule.
core_ideas:
  - 'Apple WWDC 2026: "All people are asking for is implement the best practices from ChatGPT, Gemini, Claude" — Siri reboot with three-tier AI stack (on-device, private cloud, third-party), but big cultural shift from deterministic to stochastic outputs'
  - '172K jobs added in May, unemployment at 4.3%, Nasdaq -4.2% on Friday — "the AI job apocalypse is cancelled at least for the month of May"'
  - VC horror stories: sleeping partners, structured "Sequoia scam" deals, parking-lot pitches — but "venture is arguably the most pleasant form of deal making in the world"
  - 'Planet Labs: 200+ satellites imaging entire Earth landmass daily, methane detection via 400-band hyperspectral camera, 60% deforestation reduction in Brazil'
  - "Dambisa Moyo: \"Anything can happen\" — 300-year-old companies survived pandemics and depressions. The three board roles: strategic oversight, hire/fire CEO, partner with society"
  - 'Pancreatic cancer breakthrough: daraxoraciclib uses molecular glue to drug the "undruggable" RAS protein, doubling median survival from 7 to 13 months'
  - 'Helion: direct electricity from fusion at 95% efficiency, modular 50MW truck-deliverable generators, Microsoft PPA by 2028, $465M Series G'
  - 'Antares: first private micro reactor turned on ahead of schedule, liquid metal heat pipes, military as best first customer — "neutrons 26, electrons 27, dollars 28"'
  - "Generalist: first demonstrated robotics scaling laws (GenZero→GenOne), dexterity as the holy grail — \"lived experience of the physical world is S tier\""
