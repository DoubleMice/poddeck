summary: |
  2026年第一个现象级AI产品Clawdbot（原Claude Bot）在GitHub几天内突破10万星标，刷新AI项目增长纪录。本期硅谷101邀请三位嘉宾——产品经理之现（用户侧）、EverMind技术生态负责人正浩（软件算法侧）、Pamir创始人天琪（硬件侧）——从三重视角深度拆解Clawdbot的底层逻辑。话题覆盖：IM界面带来的"活人感"如何重新定义人机交互、文本化记忆系统的三层架构与混合检索机制、心跳系统如何实现按需激活的主动性、Anthropic律师函背后的模型厂商管道化焦虑、Agent电脑作为新硬件品类的诞生、以及一人公司与AI数字分身的未来。
core_ideas:
  - Clawdbot爆火的关键不在技术创新，而在于用IM界面+主动性的组合让普通人真正"感知"到了Agent的能力
  - '记忆系统采用MD文件+SQLite向量库+混合检索(70%语义+30%关键词)，全部文本化、用户可见可编辑'
  - 心跳机制用守护进程定时唤醒AI判断是否需要主动联系用户——既有主动性又不烦人，是活人感的核心
  - Anthropic的律师函反映出大模型公司对"管道化"的深层焦虑——害怕只做API被打到生态底层
  - Agent电脑将成为新硬件品类：RAM决定agent数量，存储决定知识资产积累，前后端工作正在分离
  - '一人公司已经可行，但前提是"你必须是将军"——拥有评判AI输出质量的know-how'
