summary: |
  The Chopping Block 邀请两位 Ethereum 「背教者」——Bankless 联合创始人 David Hoffman 和前 ConsenSys 技术专家 Max Resnick——深度剖析 ETH 的身份危机。David 解释为何在 2026 年卖掉所有 ETH，Max 从技术角度剖析 EF 为何停滞不前，Haseeb 提出「ETH = 加密世界的微软」类比。节目涵盖 EF 出走潮、价值捕获结构性问题、500 万亿证券上链的机会之争、以及 Solana 作为替代方案的崛起。
core_ideas:
  - 'David Hoffman 卖掉所有 ETH 的核心原因：机会成本而非看空——「ETH 即货币」thesis 在 2019-2020 年建立，到 2026 年已经充分兑现，ETH 难以再次获得独立的重新定价'
  - '以太坊的价值捕获结构性问题：L2 利润率 98%，胖应用取代胖协议，Ethereum 像非营利组织一样以成本价提供安全与结算'
  - 'EF 大规模出走潮：Tomasz、Barnabe、Tim Beiko 等核心成员相继离开——全部是 EF 内部的「激进派」，即推动快速开发、让协议产生收入的阵营'
  - 'Vitalik 的回应与困境：EF 不是「数字上涨」机构，EF 将缩小到仅占 16 个基点的 ETH 供应量；但即使 Vitalik 声称「不再负责」，社区仍然以他的每一句话为方向——「当耶稣很难停下来」'
  - 'Haseeb 的「ETH = 微软」类比：Ethereum 正处 Ballmer 时代——缓慢、混乱、但根基深厚不会消失；问题是：下一个 Satya Nadella 在哪里？目前没有人才管道'
  - '500 万亿美元证券上链的机遇：监管趋明确，但 Ethereum 扩容速度不够——「按目前的 gas limit 增速，要等到 2100 年」；Solana 正在争夺这个市场'
