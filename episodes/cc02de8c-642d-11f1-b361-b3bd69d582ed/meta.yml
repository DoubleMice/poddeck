summary: |
  Glen Cameron, CFA and Global Head of Institutional at Onramp Bitcoin, delivers a rigorous risk analysis of Strategy's (MicroStrategy) financial engineering — from Michael Saylor's 32 BTC sale as an "inoculation" signal, to the structural risks in STRC perpetual preferred stock, to the 83% retail holders who may not understand what they bought.
core_ideas:
  - 'Risk vs uncertainty: Bitcoin price is driven by crowds, not calculable odds — history is a guide, not a probability model'
  - 'Saylor''s "inoculate" language signals preparation for larger Bitcoin sales, marking a shift from "never sell" to "net buyer" rhetoric'
  - 'Issuing common stock below MNAV is dilutive on a Bitcoin-per-share basis — Glen compares it to the Fed printing dollars'
  - 'STRC is perpetual preferred equity, not "digital credit": unrated, no maturity, discretionary dividends, no claim on Bitcoin'
  - '83% of STRD investors are retail — electricians, plumbers, nurses, truck drivers — sold a "bank account" narrative that belies the risks'
  - 'In a GFC-like scenario, preferreds could trade at 20-30 cents on the dollar; dividend suspension would trigger retail panic selling'
  - 'Strategy''s four options — issue common (dilutive), issue prefs (costly), sell Bitcoin (panic), suspend dividend (retail crash) — are all bad'
