summary: |
  Caladan 创始人 John Gu 讲述如何从零开始为 crypto token 提供流动性——"冷启动问题"：一个新 token 上线时没有 order book、没有可比标的、没有需求曲线，做市商必须向虚空报价。对话覆盖了 200+ 次 token 发行的实战经验、Loan-Option 与 Retainer 两种结算模型、CEX 与 DeFi 双线作战的结构性差异，以及从 Andrew Lo 的 Adaptive Markets Hypothesis 到 FTX 后时代做市基础设施的重建。
core_ideas:
  - 冷启动问题：token 上线时完全没有 TradFi IPO 的"脚手架"，做市商必须从宽价差起步，用交易反馈逐步校准
  - 两种商业模式：Loan+Option（风险在做市商）vs Retainer（风险在项目方），激励机制完全不同
  - 分叉的市场结局：有些 token 发展成自维持的有机市场，有些变成只有做市商在场的"鬼城"
  - 相关性是流动性现象：BTC 与传统资产的相关性上升，因为持有者结构重叠——小 token 几乎全是 idiosyncratic risk
  - Crypto 在速通 TradFi 的百年课纲，但终局是高度分散的 FX/commodities 结构
  - 长期 token 价值取决于项目本身的真实收入和真实用途，而非开盘有多响
