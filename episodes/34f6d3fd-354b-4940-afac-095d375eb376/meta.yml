summary: |
  TBPN 在 2026 年 6 月 12 日 SpaceX IPO 当天的直播特别节目。主持人们全程跟踪史上最大 IPO 的首日表现——发行价 $135、收盘 $167、市值 $2.28 万亿。节目深入探讨了 Gwen Shotwell 从第 7 号员工到亿万富翁的 22 年掌舵故事、SpaceX 的"残余能力"战略如何从火箭到星链再到 AI 算力不断催生新帝国、2004 年 32 岁的 Elon Musk 在参议院听证会上宣称"人类航天处于黑暗时代"并在 22 年后用 IPO 作答、以及为什么 95 倍营收的估值在传统金融框架下完全无法解释却依然合理。
