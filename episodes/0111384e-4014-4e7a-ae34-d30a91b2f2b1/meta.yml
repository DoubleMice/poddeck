summary: |
  本期 TBPN 是 2026 年 Q2 的压轴大集——11 位嘉宾覆盖 AI 就业数据、太空产业垂直整合、AI 芯片架构变革、人机交互范式演进、国防科技主流化、税务合规 AI 化，以及 NBA 冠军转型科技投资人的精彩故事。Ramp 对 21,559 家美国企业的研究显示，高 AI 采用率公司就业增长 10%、入门岗位增长 12%，彻底打破 AI 消灭工作的叙事。从 Rocket Lab 以 80 亿美元收购 Iridium 成为"自发射太空超级大国"，到 Etched 推出低压推理和集群级内存重新定义推理硬件，到 Monogram 将 AI 输出从文字变成实时可视化界面，本期覆盖了科技产业正在经历的多层次变革。
core_ideas:
  - 'AI 正在创造而非消灭就业：Ramp 研究 21,559 家企业数据，高 AI 采用率公司就业 +10%，入门岗位 +12%，低采用率公司无显著变化'
  - '航天进入垂直整合时代：Rocket Lab 收购 Iridium（$80 亿），从发射、卫星制造到运营全栈覆盖，直接对标 SpaceX'
  - 'AI 芯片架构的根本性创新：Etched 推出低压推理（解决 GPU 50% 热限制）和集群级内存（统一 HBM 池），全明星投资阵容'
  - 'AI 界面从文本到可视化：Monogram 语音输入 → 1.5 秒生成交互式视觉界面，$4000 万种子轮'
  - '硬科技投资的"速度优先"哲学：Cantos 十年经验——迭代速度 > 技术深度，不招博士，一周内看不到进展就 pass'
