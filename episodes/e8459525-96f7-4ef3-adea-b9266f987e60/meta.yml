summary: |
  Bloomberg 研究数据组负责人 Angana Jacob 与 Corey Hoffstein 探讨量化研究的数据基础设施。
  当模型日趋商品化，数据质量、清洗管道和交付方式已成为真正的竞争护城河。
  对话涵盖了 Bloomberg 如何缩短客户的"time to alpha"、地理暴露数据的标准化、以及现代量化技术栈的演进。
core_ideas:
  - 模型已商品化，数据管道和基础设施才是真正的竞争壁垒
  - '数据的"正确做法"已从简单清洗演进为 point-in-time 正确性、元数据和语义层的系统工程'
  - 'Bloomberg 的北极星指标：缩短客户从 idea 到 live signal 的时间（time to alpha）'
  - 前后台数据一致性决定了策略从研究到实盘是否存在系统性偏差
  - 现代量化技术栈趋向集成化、ensemble-driven，信号被视为组件而非独立策略
  - 'AI 加速了数据需求，但更需要 context-aware、domain-specific 的高质量数据'
