summary: |
  Acquired 深入讲述劳力士——全球最知名但也最神秘的公司之一。从 Hans Wilsdorf 作为一个巴伐利亚孤儿成为 outsider 创始人开始，到 Oyster、Perpetual、Chronometer 三大支柱的建立，再到石英危机中转向奢侈品策略的惊天赌注，一直到今天占据瑞士钟表业 30% 收入的不可能地位。这是一个关于 outsider 精神、工程精度、品牌神话、以及一个被两次"功能性淘汰"后反而变得比以往任何时候都更强大的产业的深度叙事。
core_ideas:
  - Hans Wilsdorf：孤儿出身、德国人、在英国创业、公司迁往瑞士——终其一身的 outsider 身份定义了 Rolex 的全球视野
  - 三大核心产品创新（Oyster 防水、Perpetual 自动上链、Chronometer 精密认证）奠定了现代机械腕表的基础——但其中只有 Perpetual 是 Rolex 自己发明的
  - 从 Mercedes Gleitz 游英吉利海峡到 Eisenhower 手腕上的 Datejust，再到 James Bond 和 Federer——Rolex 是"品牌伙伴/Testimonee"策略的最早实践者和最极致执行者
  - '石英危机中，Rolex 看着 Omega 做了一切错事，看着 Blancpain 做了正确的事但规模很小，然后凭借 Hans Wilsdorf Foundation 的所有权结构、现金储备和品牌定位，做出了"All in 机械"的惊天赌注'
  - 2004 年收购合作 99 年的机芯厂 Aegler，将供应商从 27 家压缩到 4 家巨型工厂——Patrick Heiniger 的垂直整合彻底控制了产品品质的全球统一性
  - 今天 Rolex 年产 110-120 万只手表，均价 $13,000，年收入约 $110 亿，占据瑞士手表行业 30% 收入和约 40% 利润——瑞士 = 全球 2% 产量但 45% 收入
