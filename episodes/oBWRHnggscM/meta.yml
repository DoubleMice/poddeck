summary: |
  Latent Space 与 Moonlake 两位负责人 Chris Manning 与 Fan-yun Sun 的对谈。Moonlake
  押的是另一条 world model 路线: 不是更大的视频生成器, 而是 symbolic 推理 + 神经渲染。
  Chris 给出唯一的硬定义 — "you only actually have a world model if you can predict,
  given some action is taken, what is going to change" — 然后顺势公开和 Yann LeCun
  撕: "Yann has never appreciated the power of language." Sun 反驳"反 bitter lesson"
  的标签, 真正的问题是"what is the right abstraction level today"。Moonlake 内部其实是
  两个模型: 推理模型管 causality / persistency, 而 Rie 这个 diffusion model 负责
  photorealism — 他们已经把它当作 DLSS 的下一代来卖, "skins for worlds"。
core_ideas:
  - 'Action-conditioned 是 world model 的硬定义: 没有 action → consequence 的预测就不算'
  - 'Structure, not scale: 不反 bitter lesson, 反的是"今天最 bitter 的抽象层级是 pixel"'
  - '语言是 cognitive tool (Dennett): 数学 / 编程 也是, 都是把 chimp 抬升到人的关键'
  - "公开和 LeCun 撕: Yann 看不起 language, Chris 认为 transformer weights 本身就是 joint embedding"
  - "推理模型 + Rie diffusion 双模型架构: 一个管 causality, 一个管 pixel distribution"
  - 'Rie 要替换 DLSS: render 不再是 game state 的派生, 而是可以反向触发 state 的可编程层'
  - "Symbolic vs diffusion 的边界是流动的: 物理走 symbolic, 流体可能走 diffusion"
  - 'Theme parks are world models too: Walt Disney 是第一个 world modeler'
