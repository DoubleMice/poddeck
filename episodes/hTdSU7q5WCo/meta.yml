summary: |
  Naval 隔了几十年重新写代码. 用 Claude Opus 4.5 + Codex 做出 "personal app store",
  从中长出三条判断: vibe coding 比游戏更上瘾、pure software 现在不可投、
  Apple 主导的时代开始结束. 这是少见的 first-person 编码日记式 episode.
core_ideas:
  - 2025-12 Claude Opus 4.5 是 coding agent 的拐点——agent 真正能 stay on track 把 app build 完
  - agent 不只是 autocomplete, 而是接管 Unix shell 自己干, 因为训练语料和执行环境都是 Unix
  - personal app store 的体感: 两行话描述 → 30 秒后手机上多一个新 app, niche / 私人定制 use case 被掀掉
  - vibe coding 比游戏更上瘾的关键是 unbounded + 真 reward, 但前提是你要清楚自己想要什么
  - pure software is uninvestable, 因为客户能自己 hack + 一年内 agent 就能做 scalable architecture
  - 多 agent 互审是幻觉——同一模型互谈等于 "10 people with the same brain", 你需要的是 high-taste feedback loops
  - Apple giving up on AI 会是这个十年最大的战略错误, market cap 会从 Apple 滑到 Samsung/Lenovo 的水平
  - one-person, two-person software companies 能 scale 到 millions of users / billions of dollars
