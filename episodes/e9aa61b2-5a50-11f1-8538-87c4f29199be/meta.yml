summary: |
  DEX in the City hosts break down a packed regulatory week: a White House executive order opening Fed master accounts to fintechs and crypto companies, the GENIUS Act threatening banks' core advantages, Polymarket partnering with Nasdaq to give retail access to private market alpha, a scathing NYT investigation into the CFTC, and an AI executive order that vanished from the Oval Office after three phone calls. The episode explores what happens when fintech finally beats banks at their own game.
core_ideas:
  - 'Fed Master Account EO: White House directs the Fed to consider giving fintechs and crypto companies direct access to the core plumbing of the US dollar system'
  - 'GENIUS Act unbundling: banks are losing their two fundamental advantages — custody of customer funds and facilitating payments — to non-bank competitors'
  - 'Polymarket × Nasdaq Private Market gives retail investors access to private company alpha — IPO timing and valuations — a market long reserved for the wealthy'
  - 'NYT investigation into the CFTC raises serious allegations about staff firings and prediction market regulation — the central question: where was the Inspector General?'
  - 'AI EO vanished from the Oval Office after three phone calls; four camps inside the White House are knife-fighting over AI policy'
  - 'Crypto can teach AI a lesson: do not trust centralized entities — build a receipt and verification layer for accountability'
