summary: |
  Jason Cohen 用一小时给了一套"诊断增长停滞"的五问清单：logo churn、
  pricing、NRR、渠道饱和、"你真的需要增长吗"。顺序是关键——上一问没解决，
  下面都白搭。里面藏着一个真实的 8x 定价故事、"cancellations 会自动随
  规模指数上涨而 marketing 不会"的硬数学、以及一个 elephant curve 取代
  S-curve 的渠道模型。
core_ideas:
  - '硬天花板 = 月新客 / 月流失率  (100 / 5% = 2000 客户)'
  - '"too expensive" 是近因不是真因，是"呼吸停止"不是"糖尿病"'
  - '"What made you cancel?" 比 "Why did you cancel?" 可用回复率翻倍 (Groove)'
  - 'Pricing selects the market —— 需求曲线其实是一座 mesa，不是一条下坡线'
  - '同一个产品、换一句文案：Double Down 从 5k/月 涨到 40k/月 (8x)'
  - 'NRR 会撒点谎：-20% 之后要 +25% 才能回到原点，不是 +20%'
  - 'Elephant curve —— 渠道不是 S-curve，是 S 加一个下垂的屁股'
  - '"If you''re not growing, you''re dying" 对公司不一定成立，对人更多是真的'
  - 'AB testing 对绝大多数人不 work —— "If you don''t know who the psy is, it''s you."'
