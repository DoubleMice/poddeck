summary: |
  硅谷101邀请《哈萨比斯：谷歌AI之脑》中文译者周健工，深度解读DeepMind创始人德米斯·哈萨比斯的传奇人生。从四岁下棋的神童到AGI运动的发起者，从谷歌6.5亿美元的惊天收购到AlphaGo击败李世石、AlphaFold破解蛋白质折叠难题并斩获诺贝尔化学奖。节目沿着两条AI路线的学派之争（强化学习vs深度学习），梳理了DeepMind的崛起、与谷歌的博弈、苏莱曼的恩怨纠葛，以及ChatGPT冲击下DeepMind如何从落后到追赶。最终回到那个悬而未决的问题：一个想用AI理解宇宙的科学家，能否控制自己亲手创造的力量？
core_ideas:
  - 哈萨比斯11岁的两个顿悟时刻——弃局和发现计算机象棋编程书——将他从棋盘引向通用人工智能
  - DeepMind创立之初融资极度困难，投资人要么出于宗教信仰、要么出于逆向思维才愿意投
  - 强化学习（Sutton派）与深度学习（Hinton派）的三十年学派之争，深刻塑造了DeepMind的技术路线和ChatGPT时代的战略误判
  - 谷歌收购DeepMind是AI史上最划算的交易之一，6.5亿美元换来AlphaGo、AlphaFold、Gemini和一座诺贝尔奖
  - 苏莱曼从联合创始人到微软AI掌门人的轨迹，是DeepMind内部裂痕的最佳注脚
  - 哈萨比斯是科学家、竞争者与理想主义者的矛盾体——他想做好事，但能否在AI军备竞赛中守住初心仍是问号
