summary: |
  Alex Hormozi 在这期 TBPN 对谈中分享了他完整的商业操作系统：从写书的"思想表面积"方法论，到"产量消除运气"的媒体哲学，再到 AI 时代的工作流思维和分形定价模型。他坦诚地讲述了 acquisition.com 从家族办公室到品牌+资本+运营三位一体的进化路径，以及他两次失去一切后"只承诺不停下来"的恢复力哲学。
core_ideas:
  - '写书的三个法则：思想的表面积（surface area of thought）、趁湿画画（while it''s wet）、窄问题定义（narrow problem definition）'
  - '产量消除运气（Volume negates luck）——不只是媒体策略，是整个商业和人生的底层逻辑'
  - 'AI 的正确应用是工作流思维而非组织架构思维：用 AI 接管部分工作流，让同样的人产出 3-5 倍'
  - '客户是分形的：每个价格层级（$100 → $500 → $2,500 → $10,000+）都存在收入翻倍的机会'
  - '媒体杠铃策略：要么追求蒙娜丽莎级别的极致品质，要么追求最大产量——中间地带最危险'
  - '品牌+资本+运营三位一体：宁可少押几个注，但把每个做到极致，用品牌做分发、用资本做杠杆'
