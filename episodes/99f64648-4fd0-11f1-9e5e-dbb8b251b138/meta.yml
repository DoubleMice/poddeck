summary: |
  Alex Weslie from Artemis Analytics breaks down Coinbase acquiring USDH brand assets to become Hyperliquid's official USDC treasury deployer — a deal that shifts 90% of stablecoin yield to Hyperliquid, adding ~$150M in recurring annual revenue. The conversation expands to Coinbase's $300B agentic commerce thesis, the Circle-Coinbase competitive tension, and Hyperliquid's dominant 50% perps market share.
core_ideas:
  - 'USDH→USDC deal: Coinbase acquires Hyperliquid native stablecoin brand, becomes treasury deployer — 90% of yield flows to Hyperliquid assistance fund vs previous 50/50 split, adding ~$150M/year in recurring revenue on top of ~$600M trading revenue'
  - 'Stablecoin distribution economics: Circle pays Coinbase 100% of on-platform USDC yield and 50% off-platform — "it goes to show the power of distribution for stablecoins"; both firms sacrifice profits to make USDC the #1 stablecoin across on-chain finance'
  - 'Coinbase $300B thesis by 2031: McKinsey projects $5T agentic commerce by 2030-31, Bain projects $3T stablecoin supply; Coinbase positioned across x402 protocol (90%+ market share), Base settlement, USDC, and developer tools — targeting $4B+ in agentic revenue'
  - 'Agentic commerce competition: Stripe MPP launched March 2026, Google AP2 leverages Android distribution, Circle has Agent Stack — Coinbase early lead is real but "they can''t just have an early lead and hope to win off of that"'
  - 'Clarity Act stablecoin yield compromise: banks pushed to ban passive stablecoin yield; compromise allows activity-based rewards — benefits Coinbase One subscribers and active traders but hurts passive user acquisition vs Robinhood'
  - 'Circle-Coinbase "marriage" tension: competing on L2 (Arc vs Base), BTC products (Circle BTC vs cbBTC), agent stacks; USDC agreement renewal expected Aug/Sep but competitive dynamics may force divorce within 3 years'
  - 'Hyperliquid perp wars survivor: maintained 50% market share through EdgeX and Aster competition; growing ETH-denominated markets, RWA perps, and equity perps doing billions in daily volume; 24/7 markets like weekend oil trading unmatched by traditional exchanges'
