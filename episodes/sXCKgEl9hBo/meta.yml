summary: |
  Naval 和 Nivi 在散步中录的 52 分钟, 把过去一年关于 AI 的几条 tweet 一条一条拆开:
  vibe coding 是新 PM, 训练模型是新编程, 英语成为最热门的编程语言.
  落到智能的真正测试 (能不能从生活里得到你想要的) 和 AI 焦虑的解药 (动起来),
  最后用 "motorcycle for the mind" 收尾.
core_ideas:
  - Vibe coding 把 PM 角色吸进开发流程, 应用会海啸般爆炸成头部 + 长尾, 中间 5-20 人的 SaaS 公司被炸掉
  - 训练和调模型是新一代的 "编程", 这就是为什么 AI 研究员的薪水是 gargantuan
  - 软件工程没死——leaky abstractions 永远要有人懂底层, 分布外问题仍要手写
  - 没有对平庸的需求 —— 第一名拿 Cadillac, 第二名拿牛排刀, 第三名被开除
  - 别去学 prompt 奇技淫巧, AI adapts to us faster than we adapt to it
  - 智能的唯一真正测试是 "能不能从生活里得到你想要的", AI 直接挂——它根本没有 want
  - 早期采用者的 alpha 来自不均匀分布, "to invest in the future, you want to live in the future"
  - AI 是 motorcycle for the mind 不是 autopilot, 焦虑的解药永远是 action
