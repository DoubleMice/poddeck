summary: |
  The Chopping Block 四位常驻加密投资人——Haseeb（Dragonfly）、Tom、Tarun（Gauntlet）和 Robert（Superstate）——对话白宫政策主管 Patrick Witt，讨论了加密行业在 2026 年 7 月最关键的三件事。Tarun 宣布 Gauntlet 从日本 SBI Holdings 独立融资 1.25 亿美元，标志着加密公司从传统 VC 转向战略投资者融资的范式转移。Balaji Srinivasan 的网络学校在马来西亚 Forest City 因移民争议被吊销许可，现已签署 MOU 迁至哈萨克斯坦。CLARITY 法案进入终局谈判：白宫同意历史上首次对总统施加数字资产伦理限制，但民主党要求州检察长执法权引发了核心争议，8 月 7 日休会截止日迫在眉睫。
core_ideas:
  - '加密公司资本来源正在从 VC 辛迪加模式转向传统金融机构的战略投资——Gauntlet 从日本 SBI 获得 1.25 亿美元是标志性案例'
  - 'SBI Holdings 是 SoftBank 分拆的金融控股集团，拥有日本最大在线券商、三大加密交易所和多间银行——在美国金融体系找不到这种对标的控股结构'
  - 'Balaji 的网络国家实验从马来西亚迁至哈萨克斯坦，核心教训是：网络国家必须在政治适合的管辖区起步，并与政府预先建立正式 MOU 关系'
  - 'CLARITY 法案的伦理条款是美国建国 250 年来首次约束总统行为的伦理条款——目前没有任何伦理条款适用于美国总统'
  - '白宫版本由 DOJ 执法，民主党要求州检察长也获得执法权；Patrick Witt 指出目前没有任何伦理条款允许州检察长执行'
  - 'Patrick Witt 坦诚描述民主党的谈判策略是"从不提前同意任何事情"，法案会被谈判到最后一刻；他已经投入一整年的时间，不是为了做一场表演投票'
