summary: |
  Paul Rosolie 第三次做客 Lex Fridman 播客，讲述了他在亚马逊雨林保护工作的最新进展——包括历史性地首次拍摄与 Mashco-Piro 未接触部落的和平互动、毒品卡特尔渗透引发的生死追杀令、以及 Jungle Keepers 团队如何在 18 个月的窗口期内筹集 2000 万美元以保护最后的原始丛林走廊。Paul 还回忆了 Jane Goodall 如何改变了他的人生、爬上 160 英尺铁木树看到雾河的体验、以及与森蚺、金刚鹦鹉和蜘蛛猴的深刻互动。
core_ideas:
  - 2024年10月首次用专业相机记录与Mashco-Piro未接触部落的和平遭遇，影像资料具有人类学里程碑意义
  - Jungle Keepers 已保护 130,000 英亩亚马逊雨林，目标再保护 200,000 英亩以拯救包含未接触部落领地的完整流域
  - 毒品卡特尔渗透丛林深处，Paul 和 JJ 被下达追杀令，护林警察被枪杀，18个月窗口期正在关闭
  - Jane Goodall 的传奇不仅是保护成就——而是她如何对每一个普通人挥动魔杖、把点点烛火传遍世界
  - 一棵树龄 1200 年以上的铁木树是一个完整生态系统——砍倒它等于同时毁灭数百个物种
  - 在亚马逊上空流动的雾河——树冠之上的一条无形之河——'那一刻我仿佛看见了神'
