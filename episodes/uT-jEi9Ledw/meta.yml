summary: |
  Warp 创始人 Zach Lloyd 在 MLOps.community 解释为什么 2026 是 agents 搬家的一年——
  从笔记本搬到云端，从 solo sport 变成 team sport。Oz 是他们的编排平台，agent 不是云电脑、
  是云上的同事，meta-app 正在让 SaaS 入口收敛到一个"会做事的浏览器"。
core_ideas:
  - 2025 是 interactive agents 年，2026 必须把 agent 从笔记本搬到云端，否则没有累积、没有团队 visibility
  - 别把 agent 当 cloud computer——他们更像 lambda：每个有自己的 permissions 和 little workspace
  - 给 agent 用的 SaaS 不会长得像 Salesforce / Linear / Notion——它关心的是 schema 和 actions，不是 UI dials
  - meta-app = 一个"会做事的浏览器"——你只剩一个入口，spreadsheet / website / just-in-time app 都从这里 spawn
  - 新瓶颈不是模型，是人能不能讲清自己想要什么——communicate / write / express intent 比写代码更值钱
  - Warp 的策略：bring-your-own-harness，不跟 lab 在 token 价格上硬拼，做"上一层"的 ADE
  - Zach 押注 token 补贴是 temporary——Nvidia $25B 投开源权重，足够好的 coding 模型即将改变经济结构
  - GitHub at risk：人 review agent 的 code 不该再去 GitHub——code review 必须搬到 agent 工作的地方
  - 副作用诚实承认：context-switching brain juice 真累，工作产出更多但人也更耗
