summary: |
  Creo 三位创始人深度对谈：从 Prompt Engineering（2023）到 Context Engineering（2024）再到 Harness Engineering（2026），AI 工程能力的三次进化。25 人公司 99% 代码由 AI 生成、一天完成传统六周的迭代周期——这不是科幻，是正在发生的组织架构变革。核心讨论包括：为什么真正的 AI-first 不是"用 AI 工具"而是"围绕 AI 重构组织"，如何把信任从人转移到 AI 系统，以及产品经理、工程师、设计师等角色的未来形态。
core_ideas:
  - Harness Engineering 是 2026 年硅谷新概念：围绕大模型搭建一套能持续工作、自我修复、自我提升的系统，scope 远超 prompt/context engineering
  - '真正的 AI-first 不是"在现有流程上使用 AI 工具"，而是"围绕 AI 的能力重新构建工作流程和组织形态"——大多数公司的 AI-first 都是假的'
  - 组织架构核心变革：从信任人到信任 AI，需要 guardrails 和机制保障 AI 的决策可被信任
  - 开发速度远超市场速度：feature 多到卖不过来，marketing 从"等 roadmap"变成"从菜篮子里挑 feature"
  - Agent-driven CI/CD 让 bug 修复从一周变成 1-2 小时，50% 以上 issue 通过 auto-fixing 自动修复
  - 复合型人才在 AI 时代 thrive 得更好：工程师要有产品 sense，设计师要有 implementation 能力
