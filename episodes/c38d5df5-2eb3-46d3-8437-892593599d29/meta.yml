summary: |
  2026年4月伦敦马拉松，人类130年探索终于进入"破二"时代。这背后是一场持续60年的跑鞋技术战争——从EVA到超临界发泡，从碳板到碳环，从阿迪的Ultra Boost到耐克的Vaporfly再到阿迪达斯的Adios Pro Evo 3。前Nike、阿迪达斯产品经理盖德深度解析：中底为什么是跑鞋的灵魂、碳板专利暗战如何驱动技术分化、选材争夺为什么比技术更难、以及为什么最激烈的竞争在竞速跑鞋，但最赚钱的永远在大众市场。
core_ideas:
  - '人类首次正式马拉松破二（萨维 1:59:30），阿迪Adios Pro Evo 3助力，但荣誉属于所有铺路的前辈'
  - '跑鞋中底的核心地位源于跑步的独特性：42.195公里，同一个动作重复四万多次，冲击力持续累加'
  - '中底材料经历了四次跨越：EVA（化学发泡）→ TPU（超临界）→ PEBA/ZoomX（超临界+碳板）→ TPEE（极致轻量化）'
  - 'Nike Vaporfly的革命不在于碳板本身（80年代已有），而在于碳板+超级泡棉的组合，让业余跑者也能穿专业竞速鞋'
  - '碳板/碳柱/碳环的技术分歧，根源是Nike与阿迪的Flyknit/Primeknit专利官司——"一朝被蛇咬十年怕井绳"'
  - '选材暗战：基普图姆车祸去世让Nike丧失破二窗口，萨维差点去当老师——天才选手的发现概率极低'
  - 'Nike战略失误（DTC+按性别划分组织）导致北美货架被New Balance和HOKA填补'
  - 'Evo SL年销一千万双的启示：设计（竞速美学）> 跑步性能，大众时尚才是跑鞋的真正利润引擎'
  - '国产品牌差距在缩小但短板仍在：研发周期短、设计师不跑步、人才流动性高'
  - '马拉松市场增速放缓，品牌正在向越野跑、Hyrox等新品类寻找增量'
