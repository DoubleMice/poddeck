summary: |
  TBPN covers the seismic shift of YouTube creators breaking through to Hollywood box office dominance — Backrooms ($115M), Obsession ($104M), and Iron Lung ($51M) — proving that full-stack creators with real artistic vision outperform the old studio gatekeeper model. The episode also covers Bernie Sanders proposing a 50% AI stock tax to create a sovereign wealth fund, Salesforce crushing Q1 with $11.13B revenue and $1B+ Agent Force ARR, Anthropic's IPO filing, prediction market dynamics with New York Times journalist Adam Iscoe, Mike Schroepfer's $250M "atoms" thesis at Gigascale Capital, and three AI startups showing how the technology creates dignity of work rather than unemployment.
core_ideas:
  - 'YouTube creators are breaking through to Hollywood not because of audience size — 1.2M subscribers cannot mathematically account for $104M in ticket sales — but because YouTube serves as an "audition tape" that proves full-stack filmmaking talent'
  - 'Hollywood''s IP-based gatekeeper model (sequels, reboots, "shove supply through tubes") is being disrupted by a merit-based system where the algorithm surfaces what actually resonates'
  - 'Bernie Sanders proposes a 50% one-time stock tax on AI labs to fund a sovereign wealth fund — but the proposal contains contradictions, seeking to simultaneously ban AI data centers while also owning AI'
  - 'Salesforce proves SaaS is not dead: $11.13B revenue up 13% YoY, Agent Force crossed $1B ARR — and Marc Benioff is using coding agents to replace engineering hires while hiring more salespeople'
  - 'Prediction markets have reached a third of American voters, but the market is brutally efficient: a small group of "sharps" on $600 laptops out-trade Wall Street institutions like SIG'
  - 'Mike Schroepfer: the marginal cost of software went to zero — the next decade belongs to atoms (ocean data centers, micro nuclear, 100-day batteries, next-gen robotics)'
  - 'AI in the real economy is not replacing humans — it is eliminating the "data soup" between systems, shrinking backlogs, and giving workers their evenings back'
