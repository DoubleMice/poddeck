summary: |
  24岁的00后华人女孩洪乐潼创办了AI for Math公司Axiom，7个月内从0到16亿美元估值。在这期4小时的深度访谈中，她讲述了从广州奥数少年到MIT蛮力型选手，从斯坦佛法学院到硅谷创业者的独特轨迹。她分享了形式化证明（Lean）如何将数学变成可验证的代码，Axiom如何在普特南数学竞赛拿到满分，以及她为何认为超级智能应该是专用的（ASI）而非通用的（AGI）。
