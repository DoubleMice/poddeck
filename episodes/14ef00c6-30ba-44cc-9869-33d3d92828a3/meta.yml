summary: |
  Acquired 播客深入剖析 Costco 的商业模式：从 Sol Price 在 1950 年代发明折扣店、1976 年创立 Price Club，到 Jim Sinegal 在 1983 年创办 Costco，再到今天成为全球第三大零售商。Costco 的核心哲学是把规模经济分享给消费者——通过低 SKU 数、14% 毛利率上限、会员制、负现金转换周期和极致的企业文化，构建了一个竞争对手无法复制、连 Charlie Munger 都痴迷的商业飞轮。
core_ideas:
  - "规模经济共享：Costco 的护城河不在于赚更多钱，而在于把规模优势转化为更低价格回馈会员"
  - "低 SKU 策略（3,800 vs Walmart 的 100,000+）驱动了超高的单品采购量和极简的物流体系"
  - "14% 毛利率铁律与不涨价文化：Jim Sinegal 说涨价就像海洛因，尝一点就想要更多"
  - "两个生意一个屋顶：70% 利润来自会员费（接近 100% 毛利率），零售只是获客引擎"
  - "负现金转换周期：库存年周转 12.4 次，货卖掉后才需付供应商，供应商为 Costco 的库存融资"
  - "文化的力量：三位 CEO 都从 FedMart 起步，从未裁员，内部晋升，93% 会员续费率"
