summary: |
  紧身裤正在从商场消失——运动品牌下装中紧身裤占比从47%降至39%，而曾经被嫌"土到掉渣"的排骨羽绒服却成了年度爆款。淘宝服饰趋势小二齿牙与时尚品牌MARIS创始人老马深度拆解：经济周期、社会思潮和流行文化如何共同决定你每天穿什么，电商平台又如何从被动的销售渠道变成潮流的创造者和定义者。
core_ideas:
  - '裙摆指数在裤装中同样适用——经济上行穿紧身展示身材，经济不确定穿宽松追求实用'
  - 排骨羽绒服走红是五个要素的合力——暖冬气温、审美反转、KOL助推、成本驱动、设计迭代
  - '潮流权力已从纸媒时代的精英自上而下，转向电商时代的平台数据驱动、多维创造'
  - '电商平台扮演四重角色——创造趋势、解读趋势、指引商家、挖掘爆款'
  - '快时尚已接近快餐化，但反内卷趋势将推动回归个性和质感'
  - '女性在时尚里减速（从被审视到取悦自己），男性在时尚里加速（从实用主义到展现自己）'
  - 时尚轮回不是玄学——审美代沟、社会情绪共鸣、品牌开款逻辑共同驱动
  - '2026年修身版型正在回归，但以不牺牲舒适为前提——既有筋骨又有松弛感'
