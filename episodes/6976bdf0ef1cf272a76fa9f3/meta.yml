summary: |
  印奇在AI行业深耕15年后，从旷视科技联合创始人到同时出任千里科技与阶跃星辰董事长。这场深度对谈中，他复盘了AI 1.0时代的战略失误——"把把都上"的安防之战、上市作为目标的迷失，并提出做基模的商业模式排除法（to B和纯C端软件都不成立），明确"软硬结合+终端"的路线。他坦诚讨论了聪明人的ego陷阱、AI时代组织形态的挑战，以及用"想做×能做×可做"三要素交集做战略取舍的方法论。
core_ideas:
  - 大模型竞争是"有史以来最激烈的科技竞赛"，链条超长、速度极快、泡沫比例比想象高
  - 做基模必须排除to B和纯C端软件两种商业模式，唯一路径是软硬结合的C端场景
  - '"大脑只有一个"——垂类模型最终都会被基座模型吸进去，AI公司必须选择做还是不做'
  - 阶跃的bet：基模（保持世界一流）+ 终端（车+手持穿戴式），不做独立C端软件
  - 车是通往具身智能的最重要路径，打车这场仗不是为了打车，而是为了打具身智能
  - 战略取舍的核心框架——想做×能做×可做三要素的交集，这个交集不是一直出现的
