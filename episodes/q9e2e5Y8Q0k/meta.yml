summary: |
  MLOps.community 在 Lisbon 的现场圆桌：OLX 产品方 Pedro Chaves 与 Prosus AI 团队的
  Donné Stevenson 聊两个真实落地的项目（地产端"lifestyle agent"、汽车 dealer 的
  chat + shortcut 助手），再延伸到 Pedro 的大愿景——为 agent-to-agent 交易搭一个
  还不存在的"harness"。一个意外有料的 quick-take：trust ladder、Ctrl+Z for agents、
  GEO 取代 SEO，以及一句把整场拉到哲学高度的"It's not a simulation. It is a recommendation."
core_ideas:
  - 'Real estate disrupt: 把"找房"重定义为 lifestyle event——commute time、neighborhood safety、parks 都是 agent 该自己回填的字段'
  - 'Dealer chat 的反直觉发现: dealer 因为按钮标签暧昧而拒绝按下——"functionality doesn''t matter until your UX is solved"'
  - 'Trust ladder: show data → suggest action → ask before acting → autonomous，跳级会失去用户'
  - 'Ctrl+Z for agents: agent 时代缺少撤销键，这本身就是一个值得做的设计 affordance'
  - 'Generative UI 是中间态: 不是纯 chat、不是预定义 GUI，而是 agent 当场生成 widget 与你交互'
  - 'Build the harness, not the agent: 真正缺的是 agent-to-agent marketplace 的 rails——discovery、escrow、protocol bridge'
  - 'Middle layer = trust: agents 之间能交易，但不能互相验真——所以 marketplace 永远有它的位置'
  - 'GEO 取代 SEO: 让 ChatGPT / Claude / Gemini 在生成结果时自然带到你这里，是新的曝光机制'
