summary: |
  妙鸭相机创始人张月光创业两年后首次公开对话。他从京都鸭川边的彻夜思考讲起，回顾了从大厂到创业的觉醒历程，深度剖析了妙鸭为何不是AI Native产品、互联网设计与AI Native设计的范式差异。访谈覆盖了他对AI陪伴赛道、乙女游戏（星棉）、Agent产品（Doky）、新媒介新交互平台理论的系统思考，以及"90分等于0分"的单向门产品哲学。
core_ideas:
  - 妙鸭相机是互联网思维×AI能力的产物，定位是写真生意（新消费品牌），而非AI Native图像产品
  - 'AI Native产品设计的范式迁移：从流程/确定性体验到context/不确定性设计，从线性工程到"效果优先、流程后置"的两段式'
  - 单向门产品哲学：90分等于0分——必须迈过用户不需要二次编辑那条线，成本优势才能显现
  - Agent的两种价值取向：端到端替代人工（Manus路径）vs 帮你做到做不到的事（人机协作路径），张月光选择后者
  - '新媒介×新交互=新平台：二十年内容行业铁律，Sora不可能是新抖音，ChatGPT是新平台'
  - 'AI陪伴赛道的三个行业通病（用户门槛高/商业模式差/角色无法成长）与游戏化解法，以及IP跷跷板效应（大明星vs互动型IP）'
