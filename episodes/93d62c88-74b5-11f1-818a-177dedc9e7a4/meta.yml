summary: |
  EthLabs 联合创始人 Ansgar Dietrichs 深度解析以太坊生态的重大转型。
  五位前以太坊基金会研究员集体出走，成立 EthLabs 以填补 EF 缩小定位后留下的空白——推动以太坊"应该改变和进化"的部分。
  访谈覆盖了 ETH 资产的价值叙事缺失、L1 扩容路线图、L2 关系的真相、费用机制的设计缺陷，以及 DeFi 作为以太坊首要场景的战略定位。
