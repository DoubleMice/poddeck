summary: |
  2026 年 6 月 11 日的 TBPN 多嘉宾特辑，横跨 AI 制造、机器人、GPU 基础设施、旅行科技、消费数据、风险投资和创作者经济。Jeff Bezos 的 Prometheus 以 $410 亿估值完成 $120 亿 B 轮，瞄准"人工通用工程师"（AGE）——让 AI 设计制造喷气发动机。Neurobotics 拿下 $14 亿打造认知机器人"神经系统"，Bullfrog 反无人机系统以 100% 击杀率获美军采购通行证，TensorWave 押注 AMD 全栈挑战 CUDA 生态。Navan 在逆风中实现 40% 营收增长，30% AI 调用已走自有模型。Base10 以 $8.5 亿新基金继续押注实体经济自动化，Fundamental 用表格 AI 预测世界杯挑战博彩市场。
core_ideas:
  - Prometheus（Bezos 联合领投）$410 亿估值、$120 亿 B 轮，建"人工通用工程师"端到端设计制造喷气发动机，另谈判 $1000 亿制造业收购基金
  - Neurobotics $14 亿打造机器人"神经系统"（不只是大脑），Neuragym 全球训练场，欧洲 2030 年有 700 万劳动力缺口
  - Bullfrog $2 亿融资、$20 亿估值，100% 击杀 13 架红军无人机，90% COTS 组件可月产千台，获全军种采购通行证
  - TensorWave $3.5 亿 B 轮押注 AMD 全栈，Lisa Su founder mode 加速 ROCm，Greg Diamos（CUDA 早期工程师）称 CUDA 非护城河、生态才是
  - Navan Q2 营收 +40%、使用量 +50%，AI bot 自动打电话给酒店，自有模型承担 30% AI 调用，客户包括 OpenAI/Anthropic/Cursor
  - Fundamental $2.75 亿为表格数据带来 ChatGPT 时刻，世界杯预测挑战博彩市场（22 年已提前预测阿根廷夺冠），2026 年大幅倾向西班牙
  - 德州 2020-25 年吸引 184 家企业 HQ、创造全美 1/5 净新增就业，首个独立交易所今夏登场，能源 + 税收 + 政策优势驱动
  - Thrive 完成 $100 亿史上最大 VC 基金，SpaceX IPO 散户零售订单超 $1000 亿，152 家校友公司融资 $135 亿
