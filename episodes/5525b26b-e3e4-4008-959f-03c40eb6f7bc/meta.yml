summary: |
  本期 TBPN 特别节目汇集了四位重量级嘉宾，横跨 AI、半导体、风投、军工制造和游戏平台五大领域。
  Thinking Machines Lab 发布 Inkling 开源模型，掀起了中美 AI 开源格局的新一轮讨论；TSMC 以史上最大资本开支押注 AI 芯片未来；
  Benchmark 合伙人 Ev Randle 审视风投界的"赌场筹码"心态；Ramp 联合 CEO Eric Glyman 揭示企业 token 支出 4 个月暴增 21 倍的现实；
  Senra 用垂直整合方案重塑 $165B 线束制造市场；Roblox CEO David Baszucki 则展示了 AI 如何将 1.3 亿用户变成游戏创作者。
core_ideas:
  - 'TML Inkling 的发布标志着美国开源 AI 的追赶：975B MoE 架构，定位可微调基础模型，与 Tinker API 深度绑定'
  - '蒸馏是光谱而非二元概念：Inkling 使用了 Kimi K2.5 合成数据做初始 SFT，几乎所有开源模型都在某种程度依赖闭源模型'
  - 'AI 开源成为地缘政治博弈新前沿：Anthropic 每周关停数百万蒸馏账户，Beijing 拟限制中国模型出海'
  - 'TSMC 同时超预期盈利和上调资本开支，追加 $100B 美国投资——市场对过度扩张存在分歧'
  - '风投界面临 2021 年以来的最强"不可避免性"错觉：Anthropic/OpenAI IPO 预期让基金进入"赌场筹码"模式'
  - '企业 token 支出正从可控订阅变成失控黑洞：Ramp 自身单周最高 $1.5M，4 个月 21 倍增长——AI 支出管理成为新品类'
  - 'Senra 证明硬科技需要垂直整合：$165B 线束市场，当前用 Excel 和 PowerPoint 设计，99%+ 首件合格率是核心壁垒'
  - 'Roblox Build 让 AI 游戏生成进入手机端：自建基础设施带来 3 倍成本优势，照片级真实 4K 60Hz 是下一代目标'
