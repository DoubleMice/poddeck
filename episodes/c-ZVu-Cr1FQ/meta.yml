summary: |
  张小珺对星海图创始人高继扬的 3 小时访谈。92 年生人、清华电子系物理竞赛保送、
  USC PhD 三年半毕业、Waymo 两年、Momenta 两年作为"鲶鱼"轮换感知/定位/规控/NOA、
  23 年 5 月放弃 1000 万美金期权创业。访谈把具身智能创业的"反浪漫"逻辑讲透——
  从曾国藩式的"儒家清流到事功"自我重塑，到智能定义本体的轮式双臂选型，
  再到 200~250 元/小时的真实数据成本账、VLM+VLA 双系统、
  以及"传播周期决定壁垒"的大厂 vs 创业公司分析。访谈录制时正逢联合创始人许华哲离职。
core_ideas:
  - "极致的浪漫反面 —— 工程拆解 + 实用主义；机器人行业不允许技术浪漫主义存在"
  - "曾国藩式自我重塑 —— 从儒家清流到事功，能拉动多少资源是最重要的事"
  - "Waymo 的本质问题不是大公司病, 是没有 Founder —— 力量不集中比错更可怕"
  - "智能定义本体 —— 从智能需求倒推硬件, 双足解耦, 选轮式双臂聚焦操作"
  - "数据账 —— 1h 真实数据 = 200~250 元；10 万小时 = 2,500 万 ≈ 一个人 0~18 岁交互总时长"
  - "传播周期决定壁垒 —— 整机 12-18mo / 客户 6mo+ / 数据 6-12mo / 算法仅 2-3mo"
  - "VLM+VLA 双系统 —— 端侧算力放不下推理模型, VLM 在云、VLA 在端"
  - "务实创新 ≠ 独立的算法创新 —— 算法不能独立于公司基础设施存在"
  - "Carry · Pick · Pack · Fold · Operate 五动作覆盖大量岗位"
  - "100 亿估值, 30 倍涨幅, 200 多人, 但他说 '我现在主要是这个花瓶'"
