summary: |
  TBPN 在 Stripe Sessions 现场录制，五位 Stripe 生态核心人物同台：John 和 Patrick Collison 揭示 AI 驱动的商业创建大爆发（71% YoY 增长）、agentic commerce 的全面落地（Google/OpenAI/Microsoft/Meta 全部接入）、以及从 SaaS 到用量计费的商业模式迁移；Henri Stern 讨论稳定币监管博弈和 AI 安全攻防；Jeff Weinstein 分享 Atlas（26% 美国新 C-Corp）和 Treasury（160 国覆盖）的野心；Zach Abrams 解读稳定币作为下一个"信用卡+互联网"级平台迁移。
