summary: |
  Arthur Hayes 在这期 Unchained 节目中，将美伊战争、AI 泡沫与 Crypto 牛市三条主线拧在了一起。他的核心论点：战争和 AI 军备竞赛都是高度通胀的——各国央行最终必须印钱，而这正是 Crypto 牛市的燃料。同时，他认为 AI 的"红皇后效应"（持续 CapEx 投入才能留在游戏中）正在制造一个堪比 2008 年的泡沫，一旦破裂将引发银行危机——但这也将迫使央行再次印钱救市。Hayes 还深度讨论了 Hyperliquid、Zcash 和 Near 的投资逻辑，以及在"市场最大绝望点"进行 VC 部署的策略。
