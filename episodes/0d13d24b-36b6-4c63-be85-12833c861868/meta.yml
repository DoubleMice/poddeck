summary: |
  Condé Nast CEO Roger Lynch explains why the flood of AI-generated content actually benefits premium publishers, how he restructured a legacy media empire from competing fiefdoms into a unified global powerhouse, and why Vogue and The New Yorker keep growing every year while search-dependent media collapses.
core_ideas:
  - AI slop makes human journalism more valuable, not less — premium audiences explicitly reject AI-generated content
  - Media has a barbell structure: big authoritative brands and tiny niche publications thrive, everything in the middle gets squeezed
  - Condé Nast's family ownership (seven decades, zero interference) is an unexpected competitive moat in today's politicized media landscape
  - '"Assume there''s no search" — Lynch told teams to plan for zero search traffic, and the brands with direct audiences survived'
  - AI transforms the tech org (teams shrink from 12 to 4, move 3x faster) but never touches the journalism — human content is the whole strategy
