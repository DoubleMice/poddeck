summary: |
  Payward (Kraken) CEO Arjun Sethi 与 Bits + Bips 主持人深入探讨了 Kraken 通过 27.5 亿美元并购构建 24/7 全球资本市场操作系统的战略、SEC 创新豁免暂停背后的市场结构博弈、代币化股票的全球需求、以及教皇利奥通谕为去中心化提供的意想不到的道德背书。
core_ideas:
  - Payward 通过 5 笔以上并购（Bitnomial、REAP、NinjaTrader、xStocks 等）构建了完整的 24/7 全球资本市场操作系统，而非仅仅是"更大的加密交易所"
  - 代币化股票（xStocks）在 8 个月内达到 250 亿美元交易量，真正的需求来自新兴市场用户对全球股票敞口和杠杆的渴望
  - SEC 创新豁免的暂停本质上是公司管道问题和市场结构博弈——Citadel、SIFMA 和 JP Morgan 的抵制反映了既得利益对 PFOF 和 Reg NMS 体系的保护
  - Bund Future 的历史类比（LIFFE→Eurex）：电子化可以在一夜之间转移流动性，华尔街巨头恐惧成为下一个 LIFFE
  - 教皇利奥的通谕为去中心化基础设施提供了来自天主教社会训导传统的道德和神学背书，加密的辅助性原则与 2000 年哲学传统产生共鸣
  - 传统银行在多司法管辖区运营方面的能力真空是监管碎片化困境的真正根源
