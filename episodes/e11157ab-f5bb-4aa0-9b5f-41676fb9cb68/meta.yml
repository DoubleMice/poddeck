summary: |
  TBPN 3小时超级节目，覆盖 Cerebras 晶圆级芯片 IPO 当日（$488亿估值）、Kevin Warsh 史上最窄票差出任美联储主席、Netflix 广告业务总裁首次外部对谈、General Catalyst 与 a16z 的 VC 广告战、Raindrop 开源 Agent 可观测性工具发布。六位嘉宾轮番登场，信息密度极高。
core_ideas:
  - Cerebras 十年 IPO 故事折射出 AI 芯片从"没人关心"到市值 640 亿美元的速度革命
  - 用户愿为快速推理支付 6 倍溢价 —— 速度本身正在变成 AI 的核心价值维度
  - CUDA 锁定可能被高估：Gemini 3、Anthropic、Cerebras 三家公司全部零 CUDA 运行顶级模型
  - Warsh 以 54-45 票确认，面对 stagflation 和政治压力 —— 美联储独立性面临当代最大考验
  - Netflix 从"无广告"到自建广告技术栈的转型，揭示了流媒体商业模式的根本性转变
  - Agent 的 AGI 水平取决于"能连续跑多少轮循环而不灾难性失败"
