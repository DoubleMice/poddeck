summary: |
  俄亥俄州立大学教授、斯隆研究奖得主苏煜从技术史纵深复盘了 AI Agent 的演化——从 1950 年代的逻辑智能体到今天的 Language Agent。
  他深入剖析了 OpenClaw Moment 与 ChatGPT Moment 的类比、Coding 作为数字世界根基的洞见、以及 Agent 从通用到专精的关键瓶颈。
  苏煜还分享了他的创业公司 New Cognition 的愿景：让 Agent 通过持续学习构建"工作世界模型"，成为各个领域的专家。
core_ideas:
  - 'Agent 三要素定义：Entity（实体）+ Environment（环境）+ Goal-Directed Activities（有目的性的活动）'
  - 'Agent 核心技术史：Logical Agent（1950-1990）→ Neural Agent（2000-2020）→ Language Agent（2022-至今），分久必合'
  - 'Language Agent 的本质：语言作为 Perception、Reasoning、Action 的脚手架（Scaffold），实现了自适应推理'
  - 'OpenClaw Moment 与 ChatGPT Moment 的类比：底层技术已就绪，真正的突破是交互范式和人机关系的改变'
  - 'Agent 的核心瓶颈：Reliability、Speed、Cost——根源在于缺乏像人一样的 Continual Learning 和 World Model 构建能力'
  - 'GUI 不会消失但 Agent 不一定需要 GUI：CLI 全面替代 GUI 在经济账和人性上都不成立，pragmatic 方案是让 Agent 兼容 GUI'
