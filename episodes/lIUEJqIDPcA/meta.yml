summary: |
  Naval 和 Nivi 做了一期 19 分钟的短播客, 从 Impossible 的 hub-and-spoke
  组织谈到 AI 如何替代显式 intranet 和 dashboard, 抬眼看 AI 集中化、
  无人机和生物风险的结构性变化, 落到硬件复兴和 "optimism requires
  creativity" 的处方.
core_ideas:
  - 公司可以是 fully interconnected graph 而不是 hierarchical tree, 但前提是每个节点都足够聪明
  - AI 在组织内部最大的作用不是聊天, 而是替代显式 intranet, 把 dashboard 变成 reports on demand
  - AI 让职能之间互相能做 20%-30% 的工作, 接口成本下降, 自然成为 force multiplier
  - 暴力的逻辑从 rifle → nuclear → drone 持续下沉, 国家结构会被迫重写
  - 生物能力像 vibe coding 一样民主化, 真正的瓶颈是医疗监管而不是科学
  - 软件不再是硬件的瓶颈, China + Nvidia + hyperscaler 共同把 AI 模型推向开源, 因为这 commoditizes their complement
  - Optimism requires creativity——悲观可以外推, 乐观必须想象不存在的工作和制度
