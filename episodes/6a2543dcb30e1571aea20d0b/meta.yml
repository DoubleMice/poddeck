summary: |
  小群对安克创新创始人阳萌的4小时深度访谈。阳萌系统性地阐述了他用15年创业实践提炼出的一套消费电子公司理论体系：从消费者的"一三五七"分层、品类的"浅海与深海"、公司的三种类型，到CEO治理的"国王vs总统"模式。访谈深入讨论了安克从"五系品质公司"向"七系极致创新公司"的艰难转型，包括自研存算一体芯片的决策逻辑、三层护城河理论、AI中台日均1500亿Token的组织实验，以及"创造者拿七股东拿三"的分配哲学。
core_ideas:
  - 消费电子品类可分为"浅海"（中小品类，盲注几百万）和"深海"（超级品类，盲注5亿+），安克选择在浅海中做第三类公司
  - 公司从五系到七系的转型不仅是产品升级，更是整个组织从"确定性道路"走向"无人走过的路"的心智革命
  - 存算一体芯片的决策是价值观驱动的——"因为你的价值观变了，你的使命愿景变了之后，你就觉得这就是你应该做的事情"
  - 未来AI不会是单一超级大脑控制一切，而是分层部署：云端万亿级大脑、端侧百亿级小脑、感知器官百万级神经
  - '创造者拿七，股东拿三——消费电子"速生速死"，持续创新来自员工，价值分配必须尊重价值创造的规律'
  - 最深的护城河不是技术也不是品牌，而是一群持续保持"第一性、求极致、共成长"的人
