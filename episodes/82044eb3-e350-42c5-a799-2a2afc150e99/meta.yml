summary: |
  Acquired 深度解析 Formula 1 的商业帝国：从战后英国的废弃机场到全球价值 $70B 的体育生态系统。这期节目讲述了 Bernie Ecclestone 如何用 45 年时间将一堆各自为政的业余赛事捏合成商业帝国，以及 Liberty Media 如何用成本上限、Drive to Survive 和美国扩张将 F1 拖入现代媒体时代。这是一堂关于集权、杠杆和体育商业化的 masterclass。
core_ideas:
  - F1 是三个运动合一：世界顶级车手竞技、工程世界杯、办公室政治真人秀
  - Bernie Ecclestone 的集权飞轮——每次集中化一个环节就增加下一次谈判的筹码，45 年间同时担任多个利益冲突角色
  - "他卖了 F1 四次，从未买回来，却始终掌控着它，而且他从一开始就不拥有它"
  - Red Bull 代表一种全新参与模型：不靠车队盈利，而是将 F1 当作全球营销平台卖能量饮料
  - Brawn GP 的 £1 奇迹：从 Honda 弃子到双料冠军，再到 Mercedes 以 $200M 收购并打造为 $6B 的王朝
  - Liberty Media 完成了 Bernie 不可能完成的任务：成本上限、Drive to Survive、美国扩张，将车队从烧钱黑洞变成了真正的商业资产
  - 'F1 拥有 830M 粉丝但每位粉丝仅变现 $7/年 vs NFL 的 $127/年——增长空间巨大'
