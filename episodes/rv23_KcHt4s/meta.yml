summary: |
  Applied Intuition 给汽车 / 卡车 / 矿车 / 农机 / 防务平台卖"让物理机器变聪明"的技术栈,
  18/20 OEM 是它客户, 估值 $15B, 1000 名工程师, 现在在日本跑 L4 无人卡车. 这期把它的三个 bucket
  (仿真 + 操作系统 + 自动驾驶模型) 全部摊开讲, 还顺手把 "vehicles like pre-Android phones" 这条
  类比、neural sim = Gaussian splatting + diffusion、onboard 才是物理 AI 真正瓶颈
  这些反直觉点都串了起来.
core_ideas:
