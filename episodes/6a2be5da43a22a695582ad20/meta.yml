summary: |
  前SpaceX火箭首席制造工程师洪力德（Louis Hong）口述SpaceX开发史与马斯克管理内幕。
  七年内部视角讲述猎鹰9号从一年发射一次到年产百次的量产扩张、马斯克"可乐罐"式第一原理推问、"接受你辞呈"的冷酷管理、十倍级思维。
  深入星链的物理逻辑、SpaceX收购xAI与太空数据中心的底层原因、太空产业链Apple/Android双生态投资框架，以及为什么2026年是太空赛道的转折点。
core_ideas:
  - 'SpaceX早在十几年前就已规划好现在的一切：2012年成立火星小组，2015年启动星链——2026年的里程碑是长期蓝图的执行，不是突发奇想'
  - '第一原理思维贯穿SpaceX所有决策：星链因为真空信号传播比光纤快一倍；太空数据中心因为美国电网老化、电荒、审批地狱。一切从物理出发，不从类比出发'
  - '马斯克领导风格：极端内向但极端真实，没有等级意识，不问"做得不错"只问"你有没有看过可乐罐的生产"。不咆哮不拍桌子，但会淡定说出"那我接受你的辞呈"'
  - 'SpaceX人才哲学反常识：刻意从航天圈外招人（食品、汽车、消费电子），要通才不要传统专家。极扁平组织：一千人做一万人做的事，每个人负责一个部件且不可替代'
  - 'SpaceX三部曲：0→1 初创期（2002-2012）、1→1000 量产+回收（2012-2022）、平台化（2022→）。现在处在第三部曲，从火箭公司变成太空平台公司'
  - '太空产业链 = SpaceX链（苹果链）+ 独立链（安卓链）。核心创业者是出自SpaceX/Tesla的Elon Mafia——二十几岁、懂从零到一在美国造精尖硬件的新一代硬科技创业者'
