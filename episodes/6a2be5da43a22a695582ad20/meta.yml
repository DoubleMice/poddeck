summary: |
  SpaceX前火箭首席制造工程师洪力德（Louis Hung）口述SpaceX开发史。
  从2012年加入SpaceX到管理七个部门、3000多个火箭部位，七年内部视角讲述马斯克的领导风格、第一原理思维、火箭制造的十倍级要求。
  深入探讨星链的物理逻辑、SpaceX+xAI合并的底层原因、太空产业链的投资框架，以及为什么2026年是太空赛道的"ChatGPT时刻"。
core_ideas:
  - 'SpaceX十几年前就规划了现在的一切：2012年火星小组已成立，星链2015年启动——现在的里程碑是长期规划的执行，不是突发奇想'
  - '第一原理思维贯穿SpaceX一切决策：星链因为真空信号比光纤快一倍，太空数据中心因为美国电网缺电审批难。从物理出发，不是从类比出发'
  - '马斯克领导风格：极度真实、没有等级意识、不问"Good job"只问"可乐罐"。不咆哮不拍桌——但会说好的，我接受你的辞呈'
  - 'SpaceX人才哲学反常识：刻意从航天圈外招人（食品/汽车/消费电子），要通才不要专家。极扁平组织，一人负责一部位'
  - 'SpaceX三部曲：0→1（2002-2012）→1→1000（2012-2022）→平台（2022→）。现在处在第三部曲，打开了整个太空产业链'
  - '太空产业链 = 苹果链 + 安卓链。核心创业者是出自SpaceX/Tesla的Elon Mafia，二十几岁懂从零到一在美国造精尖硬件'
