summary: |
  TBPN 2026 年 7 月特别节目，汇聚六位嘉宾深度讨论 AI 产业的多条战线：GPT-5.6 Soul 的全面升级与 Arc AGI v3 突破；Meta Muse Spark 1.1 首次 API 收费及其广告 AI 飞轮的战略意义；1X 发布 Neo 仿生机器手，力量三倍于竞品；Ollama 完成 6500 万美元 B 轮融资，900 万开发者验证开源模型的企业渗透；播客产业从 4500 万增长至 92 亿美元的 12 年历程；以及 D2C 品牌如何用 AI 彻底改造库存预测和广告生产。
core_ideas:
  - 'GPT-5.6 Soul：Arc AGI v3 从 1.5% 跃升至 7.78%，首次实现多 Agent 协作 Ultra 模式，计算机使用速度三倍于前代'
  - 'Eric Seufert 提出 AI 经济牛市论：AI 投资将经济约束从生产转移到分发，长尾商业得以成立，"繁荣社会"是对反资本主义叙事的正面回应'
  - 'Meta 的图像模型垂直整合是 AI 叙事的最强武器：用独有的 Pixel/CAPI 转化数据训练，生成竞争对手无法复制的广告创意'
  - '1X Neo 仿生手：力重比与人类相当，市场现有三倍力量，2026 年内发货——机器人产业将遵循"慢启动、陡爆发"的指数曲线'
  - 'Ollama CEO Jeffrey Morgan：开放模型与前沿模型的差距总体在缩小，GLM 5.2 已替代其 80% 的编码工作，企业定制后常优于标准前沿模型'
  - 'Sean Frank：AI 已解决库存预测这个百年零售难题；静态广告实现 24×7 全自动工厂化生产，"超个性化"广告即将到来'
