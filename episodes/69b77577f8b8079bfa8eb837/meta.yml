summary: |
  NYU 助理教授谢赛宁（Saining Xie）在 7 小时的深度对谈中，完整回顾了从交大 ACM 班到 NYU、从表征学习研究到与杨立昆联合创立 Emi Labs 的历程。他系统阐述了何为世界模型、为什么 LLM 不是通往通用智能的地基，分享了两次拒绝 Ilya Sutskever 的底层逻辑，以及 DiT 如何从一篇被拒稿的论文变成 Sora 的骨架。
core_ideas:
  - '世界模型是一个目的而非技术路线——所有人都在通往它的路上，LLM、video generation、3D spatial 是不同方向'
  - '表征学习是 AI 唯一重要的事：当你有足够好的表征，语言、生成、action 都只是上层解码'
  - 'LLM 永远不会死但终将凋零——语言是交流工具而非思考工具，是强监督学习而非真正的自监督'
  - '两次拒绝 Ilya：2018 年选 FAIR 不选 OpenAI（为跟恺明做CV）；2024 年拒 SSI（视觉路线 vs 语言路线）'
  - 'DiT → Sora：在 FAIR 最后一个月做出、被 CVPR 拒稿、Bill Peebles 带入 OpenAI 成为 Sora 骨架'
  - 'Emi Labs = 反向 OpenAI：World model needs the world，通过全球联盟而非垄断来构建下一个 AI 范式'
