summary: |
  Acquired 播客花了 4.5 小时讲述华特·迪士尼公司的完整创立史——从华特在密苏里农场画马赚到第一个五分钱，到 Oswald 兔子的毁灭性失去，到米奇的诞生与同步声音革命，到 IP 飞轮商业模式的意外发明，到《白雪公主》的豪赌与胜利，到伯班克动画师乌托邦的兴建与崩解，到大罢工的创伤，到迪士尼宝库的七年周期，到灰姑娘的妥协复兴，到华特对模型火车的痴迷如何催生迪士尼乐园，到 ABC 电视交易的惊天大棋，到 EPCOT 未来城市的最终梦想，到 1966 年华特肺癌去世。这是一家伪装成娱乐公司的工程技术企业——在艺术、商业与工程的交汇处运营，发明了至今无人能完全复制的 IP 飞轮商业模式。
core_ideas:
  - '艺术 × 商业 × 工程：迪士尼的本质不是一家娱乐公司，而是在三者交汇处运营的独特物种——从同步声音到多层摄影机到音频动感机械，每一次突破都是技术驱动的艺术革命'
  - 'Oswald 创伤的永久影响：失去 Oswald 兔子 IP 的痛苦经历塑造了迪士尼的全部后续战略——永远不卖版权、永远自己控制分销、把"华特·迪士尼"这个名字变成动画界的 Life Savers'
  - 'IP 飞轮是意外发现而非预先设计：从米奇老鼠俱乐部到 Kay Kamen 的衍生品帝国到迪士尼宝库的七年重映周期，每个节点都是在绝境中被逼出来的创新'
  - '动画是永恒的复利引擎：米奇不会老、不会要加薪、永远有空上班——动画 IP 在时间尺度上的复利效应是任何真人 IP 无法企及的'
  - '迪士尼乐园诞生于华特的个人执念：模型火车 → WED Enterprises → 私人资金 → ABC 电视捆绑 → 366 天建成——这是一个创始人用自己信誉和身家押出来的产物，如果董事会说了算就永远不会存在'
  - '华特的一生是反复"赌上整个公司"的序列：同步声音、白雪公主、伯班克校区、迪士尼乐园、EPCOT——每一阶段都是把全部筹码推入一个新维度，每一次都在上一轮失败几乎杀死公司之后'
