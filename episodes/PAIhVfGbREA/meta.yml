summary: |
  Ada Palmer 把《Inventing the Renaissance》里的核心故事铺开: Petrarch 从黑死病
  里走出, 喊出 "this is an age of ash and shadow", 开启一个 200 年的代际接力——
  "as long as from Yuri Gagarin's space flight back to Napoleon". 沿途我们看到
  Florence 如何从 "extra scummy merchant scum" 靠艺术和希腊语**反向吓住法国大使**,
  看到 Leonardo 把发明写成镜像字、Brunelleschi 烧掉穹顶图纸——是 **saboteurs of
  human progress**, 不是科学家; 看到 Gutenberg 印完 300 本 Bible 卖掉 7 本
  破产, 直到 Venice 的港口和书展让印刷经济上跑起来. 最后落在一个非常克制的政治
  判断: **"even when resistance loses, resistance wins"**, 以及对 AI 时代的温柔
  反驳——"he did not create a world that went as he wanted but he created a
  world that went well."
core_ideas:
  - "Petrarch → Machiavelli → Bacon → Galileo 是一条 200 年的代际链, 不是一个瞬间"
  - 'Florence 干脆杀光贵族, 变成 "merchant scum republic"; 抽签选 9 人锁在塔里 2-3 月, 要 consensus 才能决策'
  - "go well ≠ go my way — Petrarch 想要的一样没发生, 但他做出的世界能治愈黑死病"
  - "Leonardo da Vinci was NOT a scientist — 镜像字、不分享, Brunelleschi 烧图纸. 是 saboteur, 不是仆人"
  - 'Bacon 的三种虫子: 蚂蚁堆蚁冢、蜘蛛吐丝结网、蜜蜂消化自然产出蜜——"只有蜜蜂是科学家"'
  - 'Gutenberg 破产不是技术问题, 是分销问题 — "Congratulations, Mr. Gutenberg. you have 293 Bibles"'
  - "Venice 是地中海的 hub port → 30 艘船 × 10 本 = 可行的印刷经济. Frankfurt 书展由此诞生"
  - '每个时代都在审错书 — 教廷烧 Jansenist 小册子而放过 Encyclopédie; Machiavelli 不在"大写 arch-heretics"名单里'
  - '"The Inquisition invented peer review" — Galileo 之后, 审查官白天查书晚上重做实验'
  - 'Italy 没有工业革命, 是因为它已经是 "big finance, big wool, and big oil" — 不需要'
