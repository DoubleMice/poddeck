summary: |
  TBPN Ultradome 本期涵盖六大话题：中国正在讨论 AI 模型出口管制，镜像美国对前沿模型的限制；Jeremy Giffon 提出"白领工作本质上是虚构的"这一挑衅性论点；Alex Hormozi 深度分享他从衣帽间 YouTube 到 Guinness 世界纪录的内容创业哲学；Josh Zoffer 在 Financial Times 发文警告——数据中心供应链不能重蹈稀土覆辙；Deena Shakir 披露 Lux Capital 在海湾地区的首次投资；Hussein Fazal 和 John Nay 分别分享了 Super.com（$1.2B）和 Norm AI（$1.2B）的融资和增长故事。
core_ideas:
  - 中国 AI 出口管制讨论标志着全球 AI 治理进入"镜像博弈"阶段——双方都在限制对方获取自己的前沿模型
  - 'Jeremy Giffon: 大多数白领工作并不直接服务于食物、住所、药品等基本需求——它们是被经济系统"发明"出来的，这意味着不存在"用完工作"的问题'
  - Alex Hormozi 的内容方法论核心：音量消灭运气（Volume negates luck）；媒体战略应采用杠铃策略（Mona Lisa 级制作 vs 批量价值密度）
  - Hormozi 对 AI 时代内容的判断：直播互动（Live Interactive）是最具防御力的格式——因为"stakes"（真实赌注）是 AI 无法伪造的
  - 'Josh Zoffer: 数据中心建设是 21 世纪的"工业大考"——如果因为监管阻力让供应链转移到海外，后果将与 1980 年代稀土离岸外包一样严重'
  - 海湾地区正在完成从"资金来源"到"客户市场"再到"人才中心"的三级跳——Lux Capital 25 年来首次投资总部设在海湾的公司
