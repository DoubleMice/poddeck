summary: |
  TBPN 圆桌讨论涵盖五个同时重塑世界的叙事线：Kimi K3 开源模型引发的中美 AI 冷战辩论、Tyler Cowen 对 AI 开源、AI Maniacs 和"消极情绪传染"的深度分析、Sunday Robotics 洗衣折叠 99.1% 成功率的突破、Kalshi 构建 GPU 计算力远期曲线市场，以及 Natural 的 $3000 万融资为 AI 代理建立支付基础设施。另有 Connor Love 对国防硬件的投资逻辑、iMATE 的爆发式增长，以及《奥德赛》揭示的"导演成为新 IP"趋势。
core_ideas:
  - 'Tyler Cowen：开源 AI 已经到来，试图用禁令或制裁来阻止它注定失败——当模型可以在端侧运行时，禁令毫无意义'
  - 'Kimi K3 代表了中美 AI 竞争的新阶段：2.8 万亿参数开源模型在多项基准测试中追平前沿闭源模型，需求 48 小时内超出算力供给'
  - 'Tyler Cowen 提出"AI Maniacs"概念：年轻人掌握 AI 将创造大量小团队高营收公司，并引发"大规模地位重新分配"'
  - 'Sunday Robotics：洗衣折叠 99.1% 零样本成功率，one-shot learning 能力从规模化预训练中涌现——个性化机器人即将到来'
  - 'Kalshi 正在构建 GPU 远期曲线：如果计算力成为地球上最大的商品，其衍生品市场将达到美国国债期货规模'
  - '代理人支付将在未来 12 个月内定局——Natural 定位为代理经济的 JPMorgan + Stripe + Visa'
