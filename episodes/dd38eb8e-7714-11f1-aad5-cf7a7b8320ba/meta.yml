summary: |
  SharpLink CEO Joseph Shalom 与 Laura Shin 深入讨论了以太坊 Institutional 和 Eth Labs 的相继成立。在以太坊基金会缩小角色后，这两个由 Joe Lubin、Tom Lee 和 SharpLink 支持的非营利组织分别承担技术开发和机构推广的职能——不是取代 EF，而是补充它。Joseph 提出了一个争议性论点：机构采用以太坊的最大障碍不是 Solana 或其他竞争链，而是大型金融机构的惯性和对换轨的恐惧。他从稳定币（50%+ 市场份额）、RWA 代币化（55%+）、DeFi 和以太坊从未宕机的记录出发，用 Uber 和 Amazon 类比阐述了"先赢市场、再优化经济模型"的战略逻辑，并解释了 ETH 原生收益如何让 SharpLink 的 DAT 模式区别于 MicroStrategy 的比特币财务工程。
core_ideas:
  - "以太坊双拳出击：Eth Labs（技术平台）和以太坊 Institutional（市场推广）互补 EF 的缩小角色，生态从集中走向分布式节点"
  - "Joseph 的核心论点：机构最大障碍不是竞争链，而是对改变现有金融轨道的恐惧——惯性和供应商锁定才是真正的对手"
  - "以太坊在所有关键指标上遥遥领先：50%+ 稳定币、55%+ RWA、100万+ 验证者、5-6 个独立客户端、从未宕机、攻击成本超 500 亿美元"
  - "Uber/Amazon 类比：先补贴、赢市场、再优化经济模型——以太坊把扩展性让渡给 L2 是有意的战略选择"
  - "ETH 价值正向飞轮：稳定币（货币层）→ RWA 代币化（资产层）→ DeFi（交易层）→ 交易量爆发 → EIP-1559 燃烧触发通缩"
  - "SharpLink 的 DAT 范式靠 ETH 2.5-3% 原生质押收益实现，避免了 BTC DAT 必须通过可转债和优先股金融化股票的困境"
