summary: |
  Takahi Capital 的两位创始人 Moritz Heiden 和 Moritz Seibert 回到 Flirting with Models，解释了他们为什么在业绩高峰关闭一只成功的基金、转向零管理费结构，以及如何系统化地在流动性稀薄的小众市场和多种价差类型上进行趋势跟踪。这期对谈深入探讨了容量上限作为一种优势、价差交易的生命周期管理，以及为什么分散化是趋势跟踪中唯一的免费午餐。
core_ideas:
  - 关闭一只表现优秀的基金不是失败，而是为了让策略结构与市场准入真正对齐
  - 零管理费+仅业绩报酬的结构将基金经理与投资人的利益完全对齐
  - 容量上限不是被迫的限制，而是主动的设计选择——为了在小众市场保持同等风险预算
  - 价差交易分为六种类型：日历价差、替代价差、地域价差、产品价差、加工价差、合成价差，每种在不同时间捕捉不同的趋势
  - 趋势跟踪的生存基础是受控下行风险+无限上行空间，而不是预测哪个市场会爆发
  - 多元化是唯一真正免费的东西——计算机不在乎多算一个标的，但分散化收益是实实在在的
