summary: |
  Macquarie Group 全球 QIS 结构化主管 Faheem Osman 与 Corey Hoffstein 深入探讨大宗商品 QIS 作为一个被低估的系统性回报来源。对话覆盖 Curve Carry（30 年无负收益）、Index Congestion（"下班高峰"策略）、商品波动率的独特性质、零 DTE 时代波动率溢价的变化，以及 QIS 二十年从利基实验到机构核心配置的演进历程。
core_ideas:
  - 大宗商品因锚定物理供应链而提供所有资产类别中"最丰富、最少被套利"的系统性策略机会集
  - Curve Carry 利用期货曲线 Contango 形状中的展期收益差，过去 30 年无负收益年份——因生产者和消费者的价格不敏感对冲行为持续补充溢价
  - Index Congestion 策略围绕 BCOM/GSCI 每月 5-9 日强制性展期窗口操作，"下班高峰"类比揭示了溢价来源，动态策略 20 年中 19 年为正
  - 商品波动率由物理冲击（天气、供应链中断、地缘政治）驱动，是偶发性、不对称的——尾部事件管理是关键，而天然对冲买家的价格不敏感创造了持续 VRP
  - 零 DTE 时代 ATM 波动率溢价被压缩，但 wingier delta 空间和动态期限/择时选择仍存在丰厚机会——"停止卖 vol 五天即可自动去杠杆"
  - QIS 已从利基配置进化为机构组合的核心工具箱，对冲基金从竞争者转为合作伙伴，银行从产品分销商转为方案提供商——但因子存在的底层逻辑始终未变
