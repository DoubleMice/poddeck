summary: |
  Maggie Konstanty 在 MLOps.community 谈 LLM agent 评估的真实战场——为什么团队总是先发布再补 eval、
  为什么 pre-prod 和 production 是"两种动物"、以及为什么所有 vendor 工具都让她最终选择自己造。
  整期访谈最反直觉的 takeaway：evals 本身不难，难的是让团队对齐"什么叫好"。
core_ideas:
  - Evals 应该从产品想法萌芽时就开始，而不是上线后才被想起
  - Pre-production 用模拟 persona，production 后必须 completely twist——同一套评估系统继续用必出事
  - 真用户基本不抱怨，他们用 drop off 投票——这是为什么需要侦探心态做错误分析
  - '"Accuracy 95%" 是个谎言指标，100% 更是警报；真正要找的是 vegetarian-pizza-with-pepperoni 这种 specific failure mode'
  - 改 prompt 像跳舞，eval 不能消除 trade-off 但能给你 choreography——没它就是闭眼跳
  - Eval 工具市场普遍卡在 0–1 分数、>1k traces 拖慢、multi-turn 差；mature 团队都自己造，因为 eval 本身没那么难
  - 最不可妥协的原则：自己标 label 不要外包——那是你了解 user 的最快方式
