summary: |
  Bits + Bips 圆桌讨论 AI 泡沫辩论、Circle 推出 Arc 区块链以及 Coinbase 裁员转型三大主题。嘉宾从 dot-com 亲历者的视角分析了当前 AI 投资周期的独特性，探讨了 CapEx 支付者与接收者的分化、私募市场 63 家零收入 AI 独角兽的泡沫风险，以及价值创造与价值归属的分离。Circle 作为首家上市公司进行代币预售，引发了 Token 与股权价值归属的核心辩论。Coinbase 裁员 14% 的重组则在 AI 叙事与周期性压力之间划出了耐人寻味的界线。
core_ideas:
  - AI 牛市的基本面支撑与 dot-com 泡沫有本质区别，主要出资方是全球最盈利的公司而非风投基金
  - 半导体现占 S&P 500 的 18%，泡沫风险更多集中在私募市场，63 家 AI 独角兽没有一分钱收入
  - Circle 通过 Arc 尝试建立机构金融的经济操作系统，$222M 代币预售吸引了 BlackRock 等传统金融巨头
  - 上市公司同时发行股票和代币带来的价值归属问题：市场通过分拆预期来解释两边同时上涨
  - Coinbase 从现货交易向衍生品+资金业务的转型是应对费用趋零的必然路径
