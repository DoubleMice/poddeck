summary: |
  2026 年 SpaceX 以 1.75 万亿美元估值 IPO，将火箭发射、星链和 xAI 打包上市。本期从第一性原理出发，逐项拆解马斯克的"1 GW 算力上太空"计划：发射成本、晨昏轨道、太空散热（∝T⁴ 的黑体辐射）、辐射防护、轨道碎片风险，以及推理与训练在太空中的分工。两位嘉宾的共识是物理上可行，经济上尚未成立——从两个月回本到两年的推演，每一个现实假设都在拉长账本。节目还讨论了月球 vs 火星的战略选择、SpaceX 垂直整合的护城河，以及太空数据中心创业公司的投资逻辑。
core_ideas:
  - 1 GW 太空数据中心 = 一万颗 100 kW 卫星占满一条晨昏轨道，需要 100 次星舰发射（路易斯赌 2029 年达成）
  - 发射成本从当前 $7,000/kg 降到 $10-20/kg 是可行路径，但功耗和制造成本才是真正的大头
  - 太空散热反常识：真空没有热对流，散热靠辐射且与温度四次方（T⁴）成正比——温度提升几度就能大幅缩小散热面积
  - 太空绝对只适合做推理（inference），不适合大规模训练——星间互联的带宽瓶颈限制了训练效率
  - 星链 12,000+ 颗卫星 99.85% 完好率、30 万次/年自动避碰，是太空数据中心的最佳前置验证
  - SpaceX 的垂直整合（发射 + 卫星 + 太阳能 + AI 星座管理）让其他创业公司成本至少是其 3 倍以上
  - 月球 vs 火星并非对立：月球是火星的 hopper，且月球低重力使其成为深空经济的最佳工业基地
  - 太空数据中心长期必然发生：地面散热的物理上限和电力审批瓶颈在算力规模扩大 100 倍后会成为硬约束
