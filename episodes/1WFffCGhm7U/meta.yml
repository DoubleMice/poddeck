summary: |
  Kashish (Uber ML infra, ex-Google YouTube Ads) walks Demetrios through a Sherlock-Holmes-grade
  Petastorm bug—GPU cluster stuck at 15-20% utilization, six debugging steps, two layers of
  bottleneck, and finally a "double bottleneck" reveal: PyArrow→NumPy translation was silently
  eating the headroom. Plus serving's latency-vs-utilization war, the reproducibility cost of
  parallelism, and a live diagnosis of a friend's slow DGX Spark.
core_ideas:
  - 永远不是模型的问题——scale 上去发现的瓶颈基本都在数据 IO，跟模型架构、量化无关
  - 6 步排错：RAM 实验定基线 → 拧旋钮无效 → tracing 发现 queue 空 → SSD 缓存仍无效 → 第二层瓶颈 PyArrow→NumPy 翻译
  - 修法是 cache transformed output（NumPy）而不是 raw Parquet，训练时间从一天缩到 1-2 小时
  - GPU 越快（B200）饿得越凶——以前看不出的 IO 问题现在变成头号问题
  - Serving 是 latency vs utilization 的零和战争；ads 选烧 GPU 换毫秒
  - 提高并行度会破坏 batch order 的确定性——AUC 漂移；Michelangelo 用 per-worker queue + 预分配修复
  - DGX Spark 慢不是模型大小的事，是 warm-start 没做——用 fake QPS 喂着 GPU 永远不睡
