summary: |
  3小时深度访谈，星海图创始人高继扬复盘了从清华物理竞赛到Waymo、Momenta再到创业的全路径。访谈核心覆盖：Waymo与Tesla两条自动驾驶路线的本质分歧（robotics-driven vs AI-native）、Momenta量产文化如何塑造"以客户为中心"的价值观、放弃千万美元期权创业的决策逻辑、具身智能为何必须全栈（整机+智能+数据闭环）、真实数据一小时仅200元的成本账、从开发者市场到生产力市场的"跨越鸿沟"战略、以及许华哲离开背后的价值观取舍。高继扬用"拆解+测量"的工程师思维贯穿全程，展现了一个在"链条极长、毫无浪漫"的机器人行业中步步为营的创始人画像。
core_ideas:
  - '工程师思维 = 拆解 + 测量：从物理竞赛归纳题型，到博士三年半毕业的论文套路，再到Waymo通读整个codebase——这套方法论贯穿高继扬的一切'
  - 'Waymo vs Tesla的本质分歧不在"科学vs工程"，而在对待AI的态度——Waymo的顶层架构十年没变，Tesla是AI native地从零设计'
  - 'Momenta两年最大的收获是学会了"以客户为中心"——不是客户说什么做什么，而是站在客户角度挖掘真正的需求'
  - '真实数据成本仅200-250元/小时，但数据质量差会让训练成本5-10倍放大——这不是"贵不贵"的问题，而是综合ROI必须算的账'
  - '具身智能的价值链条长到惊人：整机→供应链→数据→AI Infra→算法→模型→分销→客户。传播周期最长的（整机12-18月）才是真正的壁垒，算法创新虽然投入最大但被抄袭最快（2-3月）'
  - '许华哲的离开不是算法vs硬件之争，而是"务实创新"与"超前研究"的平衡——价值观的底层是取舍，面对取舍时怎么选、利益分配时分给谁'
