summary: |
  Kane Warwick, Taylor Monahan, and Luca Netz discuss Polymarket's oracle problem after a poorly-worded MicroStrategy market, Solana's third inflation reduction proposal, Circle's court-order-driven USDC freeze of the Zama privacy protocol, Hyperliquid's 11-person team being "bigger than Nasdaq," and apps fleeing MegaETH for Monad grants in a brutal bear market.
core_ideas:
  - 'Polymarket oracle problem: poorly-worded markets erode trust when resolution depends on disclosure timing rather than the event itself — "you''re never just betting on the event, you''re betting on who scores it"'
  - 'Solana tokenomics: the third inflation-reduction proposal aims to cut SOL inflation from ~8% to ~3%, with the burn model being more sustainable than Ethereum''s EIP 1559 because it comes from massive transaction volume, not expensive single transactions'
  - 'Circle''s court-order USDC freeze policy is fundamentally broken — by delegating all responsibility to judges, Circle loses the ability to say no to bad freezes, unlike Tether which retains final discretion'
  - 'The "Friday afternoon attack" vector — adversarial actors can obtain ex parte TROs to freeze commingled DeFi pools, creating exploitable windows that judges do not understand'
  - 'Chain ecosystems as cities — Luca Netz''s boardwalk analogy: a chain''s real job is providing distribution (foot traffic), not grants; teams that switch chains for grants are just surviving, not improving product-market fit'
  - 'Bear market survival — "Bear markets are hard. People run out of cash really quickly." Luca went 18 months without salary building Pudgy Penguins; the lesson is that chains do not save your business, founders save their businesses'
