summary: |
  TBPN 多嘉宾特别节目，涵盖 AR 硬件战争（Snap Specs、Raven Prism）、代理式编程基础设施（Cursor/SpaceX 收购、Origin）、AI 时代 VC 的策略演变（M13 的 150 倍 SpaceX 回报）、苹果 WWDC 2026 后 Siri AI 的实际表现与硬件路线图、以及品味能否被编码的激烈辩论。嘉宾包括 Eric Newcomer、Merrill Lutsky、Carter Reum、Swami Sivasubramanian、Thomas Suarez、Mark Gurman、Ryan Daniels 和 Isaiah Granet。
core_ideas:
  - AR 眼镜的关键不在"杀手应用"而在"替代日常行为"——Specs 的问题在于功能先于形态，没有明确的被替代品
  - 'Cursor/SpaceX 交易揭示了一个趋势：整个软件开发工具链正在从"为人设计"转向"为 Agent 设计"（Origin）'
  - VC 行业正在经历代际更替——创始人更想跟基金的创始人合作，而不是继承人；两种 VC 游戏（光环 vs 现金回报）正在分化
  - '苹果 AI 策略：预装 Siri AI 对 95% 用户"够用"，ChatGPT/Claude 是 Pro 用户的选择——类比 iMovie vs Final Cut Pro'
  - '品味悖论：AI 让设计民主化，但 SquareSpace 效应意味着"一旦品味被复制，就不再是品味"'
  - 语音 AI 和法律 AI 正在进入"搞砸了会死人"的高风险领域——Bland 的 911 野心、Crosby 的谈判基准测试揭示了专业判断的 AI 化趋势
