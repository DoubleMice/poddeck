summary: |
  蚂蚁灵波首席科学家沈宇军与小君深度对谈，分享了灵波从创立到发布第二代具身基础模型的完整历程。
  沈宇军坚持"具身原生"路线——从物理世界需求出发，完全重新训练机器人基础模型，而非在数字世界模型上嫁接。
  他认为机器人的GPT-1时刻尚未到来，核心瓶颈在于具身数据的scale up，目标是从6万小时迈向百万小时级别。
