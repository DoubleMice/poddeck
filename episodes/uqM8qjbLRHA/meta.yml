summary: |
  Latent Space 与 Noetik 创始人 Ron Alfa、Daniel Bear 的对谈。Ron 的核心
  论点：95% 的癌症临床试验会失败,但许多"失败"的药其实有效——只是没匹配
  到对的病人。Noetik 用近两年时间只在收数据 (thousands of human tumors,
  hundreds of millions of images), 训练一个自监督的 "virtual cell" 模型,
  并发布 TARIO-2——一个 autoregressive transformer, 从每个病人都已经有的
  H&E 切片预测 ~19,000 个基因的空间表达。GSK 已经签了 $50M 软件授权:
  不是买药, 是买平台。
core_ideas:
  - 'Matching problem reframe — 不是缺药, 是没把对的药用在对的病人身上'
  - '95% 失败率 vs $20-30B/年支出 — 行业的"漏桶"在 cohort selection 这一步'
  - 'TARIO-2 把昂贵的 whole-plex 空间转录组"蒸馏"到每个病人都有的 H&E 切片'
  - "approximately ~0% of cancer patients ever get one — TARIO-2 把这个 0% 变成 100%"
  - 'Real human tumors > frankenstein mouse models / immortal cell lines'
  - "Scaling laws 第一次在湿实验肿瘤数据上看到 'no limit'"
  - 'Drug repurposing — 把 safe but not effective 的药通过模型重新匹配到 cohort'
  - "GSK $50M software licensing deal — Pharma 第一次大规模为 AI 平台付钱而不是做药"
  - "tools companies usually become drug companies — Noetik 的反向赌注"
