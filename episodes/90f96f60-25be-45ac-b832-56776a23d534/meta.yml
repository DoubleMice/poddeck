summary: |
  刘诚博士从哲学层面解析 CAR-T 疗法——为什么说它是"解铃仍需系铃人"。节目系统讲解了体外到体内 CAR-T 的技术演进、体内 CAR-T 的两大挑战、血液瘤 90% 有效率与实体瘤攻克难题，以及中国在 CAR-T 领域的弯道超车路径。刘诚博士预估 20 年内癌症将从绝症变成可管理的慢性病。
core_ideas:
  - 'CAR-T 的哲学内核：用患者自身免疫系统治疗自身癌症，而非依赖外部化学因子'
  - '体内 CAR-T 的商业革命：成本降 10 倍、时间从 28 天缩至 1 小时、可规模化生产'
  - '血液瘤 90% 有效率的背后：中位 PFS 仅 6 个月，但 50% 患者获得长期治愈的长尾效应'
  - '实体瘤的三重障碍：浸润难、肿瘤微环境免疫抑制、2亿 vs 300亿的兵力悬殊'
  - 'CAR-T 设计缺陷：识别与激活焊接——"油门和方向盘焊死"导致细胞因子风暴'
  - '中国优势：起步同步、临床反馈快、患者资源集中、监管双轨制促进创新'
