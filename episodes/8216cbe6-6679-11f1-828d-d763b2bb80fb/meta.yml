summary: |
  Delphi Ventures founding partner Tommy Shaughnessy explains why frontier AI lab subscriptions are subsidized 40× relative to API pricing, creating a ticking time bomb as enterprises transition to API models. Open source inference providers offer 80-90% of the quality at 1% of the cost, while crypto infrastructure provides capital formation, censorship resistance, and decentralized data pipelines that could solve the emerging AI business model crisis.
core_ideas:
  - 'AI subscriptions (ChatGPT, Anthropic) are subsidized ~40× vs API equivalent — $200/month buys $8,000 in API compute'
  - 'Enterprises transitioning from subscription to API models are hitting budget walls, with Uber and Microsoft already cutting spend'
  - 'Open source inference providers (OpenRouter, Venice, Together AI) offer close substitutes at 1/10 to 1/100 the cost'
  - 'Chinese open source models may go closed source; if they do and remain behind US frontier labs, it helps OpenAI and Anthropic'
  - 'OpenAI price cuts are a two-pronged strategy: respond to enterprise leakage and damage Anthropic growth ahead of its likely IPO'
  - 'Crypto and AI overlap in four areas: capital formation, censorship-resistant access, decentralized data, and open-source app layers'
