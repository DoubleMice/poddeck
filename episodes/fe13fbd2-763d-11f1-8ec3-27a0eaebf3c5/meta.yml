summary: |
  本期 DEX in the City 深入讨论了五个对加密行业至关重要的话题：SEC 与 CFTC 联合推进投资组合保证金改革、稳定币冻结机制可被 front-run 的学术发现、AI 出口管制扩展到"访问控制"层的影响、第四修正案与第三方原则在 AI 时代的隐私边界，以及 CLARITY 法案的僵局与 MiCA 过渡期结束的对比。三位主持人从法律与政策视角指出：加密行业需要跳出自己的小世界，关注那些看似"不够加密"但实际影响深远的交叉领域问题。
core_ideas:
  - 'SEC 与 CFTC 联手推进投资组合保证金 harmonization，统一证券与商品的跨市场净额结算，加密衍生品和代币化资产将直接受益'
  - '论文《Ordering Power is Sanctioning Power》揭示稳定币冻结本质上是链上交易，可被制裁对象通过高 Gas 抢先转移资金——八年来仅 9 次成功中途冻结'
  - 'Legion 起诉美国政府案表明 AI 出口管制已从控制代码发布转向控制"登录使用"，加密行业的 RPC 端点、桥、钱包等访问层面临同样风险'
  - '第四修正案的第三方原则使 AI 聊天内容无隐私保护——用户自愿分享给 ChatGPT 的信息可被执法机构无搜查令获取'
  - 'CLARITY 法案在参议院搁浅，新增障碍是总统因投票法案问题拒绝签署包含 CBDC 禁令的住房法案，拖累两党在加密立法上的合作'
  - 'MiCA 过渡期结束，欧盟用单一牌照框架替代 27 国碎片化监管——可预测的规则胜过完美的规则，这为美国提供了参照'
