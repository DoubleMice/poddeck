summary: |
  TBPN 的一期全景式多嘉宾对谈，涵盖六大主题：Microsoft Build 发布自有 MAI 模型、OpenClaw 驱动的 Scout agent、Project Solara agent 原生硬件；
  Suno 宣布 $4 亿融资，留存率半年涨 50%；YouTube 创作者 Backrooms 电影首月 $1.48 亿，标志好莱坞与互联网创作融合；
  Bullish CEO Tom Farley 判断加密十年暖场结束，$270T 全球证券市场将迁移到区块链；Palo Alto Networks CEO Nikesh Arora
  宣告 SaaS Eclipse 在网络安全领域破产，AI 六周找到五到七年的漏洞；Alex Good 深度解析 AI Psychosis 与市场结构变化。
core_ideas:
  - Microsoft MAI 模型对标 Meta 而非 OpenAI/Anthropic，以清洁数据和零蒸馏为差异化，面向企业合规市场
  - Suno 的信念：人人都有创造力，关键在于降低门槛。音乐没有标准答案，RL 技巧对音乐 AI 无效
  - Gen Z IP 是互联网协作创造的——Backrooms 从 4chan 图片变成 $148M 电影，证明了新 IP 范式的商业价值
  - Tom Farley 判断 crypto 过去十年只是 warm up act，$270T 全球证券的代币化才是正片；稳定币 $0→$300B 已证明 PMF
  - 'Nikesh Arora: AI 不会取代网络安全公司——unaided AI 误报率 25%，在必须 100% 正确的安全领域不可接受'
  - 'AI Psychosis 的三阶段循环：恐慌→实际使用→出路。Alex Good: "the only way out is through"——自动化自己，识别 AI 解锁的新能力'
