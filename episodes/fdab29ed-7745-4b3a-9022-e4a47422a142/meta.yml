summary: |
  一期跨越五个世界的超长对谈：从白宫草坪上的 UFC 格斗之夜到 Anthropic 的 Fable 5 被突然掐断，再到 SpaceX 完美上市、Fox 以 250 亿美元收购 Roku、AppLovin 的 1800 亿美元广告帝国。嘉宾包括 UFC 选手 Bo Nickal、Atreides Management CIO Gavin Baker、Public CEO Leif Abraham、Hydra Host CEO Aaron Ginn 和 AppLovin 的 Rafael Vivas。节目深入讨论了 AI 安全与出口管制的碰撞、主权 AI 的崛起、代币工厂的长期价值，以及流媒体平台的重新整合。
core_ideas:
  - Anthropic Fable 5 从发布到被商务部暂停仅 5 天——AI 安全与政府管制的正面碰撞
  - Gavin Baker：SpaceX 的真正短期驱动是地面算力部署速度——每吉瓦变现 500 亿美元，而非火星殖民
  - 代币工厂在未来 5-10 年就足够了，不需要复制 AWS——轨道算力（$300 亿/GW）可能比地面（$600 亿/GW）更经济
  - 主权 AI 重塑全球云格局：Aaron Ginn 断言"公有云已死"，Hydra Host 已进入 20 国、60 个数据中心
  - Fox 收购 Roku：25% 智能电视市场份额 + 40% 观看时长 = 被严重低估的广告平台
  - AppLovin 市占不到 0.1%，年增 70%，互动式广告是核心增长引擎
