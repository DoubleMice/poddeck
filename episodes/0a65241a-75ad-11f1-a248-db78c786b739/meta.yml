summary: |
  本期 Chopping Block 围绕三个大事件展开：MicroStrategy 的 Stretch 优先股遭遇信任危机，Saylor 被迫推出"数字信用资本框架"自救；140 家公司（包括 Visa、Mastercard、BlackRock、Google）联手推出 OUSD 稳定币联盟，直接挑战 Circle 和 Tether 的双寡头格局；ENS DAO 一人否决风波引发对 DAO 治理模式的反思。四位嘉宾从市场结构、激励机制和治理设计的角度进行了深入讨论。
core_ideas:
  - MicroStrategy 的 Stretch 优先股从 $100 跌至 $71，mNAV 跌破 1，Saylor 通过$2.5B 现金缓冲和可能出售 2.5% 比特币来稳定局面
  - Tarun 称 Stretch 为"穿西装的 Luna"，核心风险是自反性——卖比特币导致 Stretch 脱锚，脱锚又导致需要卖更多比特币
  - Jordi 反驳：比特币不能像 Luna 那样无限增发，$2.5B 现金缓冲给了 Saylor 18 个月的时间窗口
  - OUSD 是 140 家公司组成的稳定币联盟，零铸币赎回费用，收益归铸币者，CEO 为 Bridge 联合创始人 Zach Abrams
  - Haseeb 认为联盟不适合开拓新市场——"你不需要一个联盟去开拓新大陆，你需要一个风投支持的探险家"
  - ENS DAO 风波揭示了代币治理的根本困境：人们期待民主，但代码实现的是财阀制
