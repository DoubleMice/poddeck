summary: |
  Nikhyl Singhal 在 Lenny's Podcast 上讲了一件很不舒服的事: 约一半的 PM —— 那些
  以"frame 和搬运信息"为核心技能的人 —— 正在被 AI 淘汰; 而另一半 "builders"
  正迎来 comp 史上最高、机会最多的时刻。他对未来 12-24 个月的预测很直白:
  "shed 30,000 and hire 8,000", 8,000 人都是 AI-first。给听众的唯一行动项是
  "cross the threshold" —— 找到第一次因自己动手构建而产生 joy 的瞬间。
core_ideas:
  - "information mover = 恐龙: 占一半 PM 人群的信息搬运工正在出局, 'builders' 在狂欢"
  - "judgment 成为第一 KPI: 当 test 成本 10-100 倍下降, 稀缺的是判断力而非产出"
  - "shadow superpower: 越是精通旧游戏的人越难转型, 因为他的成功没让他有动力改变"
  - "power years 的 disappointment algorithm: 30 岁 PM 手里 6-12 小时应对 20 小时需求"
  - "cross the threshold: 找到第一次 joy moment — joy 是 burnout 的最大解药"
  - "logo 贬值: 大厂履历不如 'how modern you are', 面试问的是 '你现在怎么工作'"
  - "dandelion PMs: PM 会像蒲公英种子飘向所有行业, 成为 change agents"
