summary: |
  TRM Talks 主持人 Ari Redbord 对话 DEX in the City 的三位联合主持人——V Lee（前 SEC 执法部）、Kathryn Kirkpatrick Boss（前律所合伙人、多家 CFTC 注册实体 CLO）和 Jesse Brooks（前 DOJ 检察官）。四位加密律师深度讨论 SEC 从执法到清晰的 180 度转向、CFTC 在 DCM、预测市场和永续合约领域的崛起、DeFi 安全从智能合约层到操作安全层的演进、朝鲜黑客构成的真实国家安全威胁，以及为什么隐私是链上市场规模化不可或缺的商业条件。节目还揭示了三位女性律师创立 DEX in the City 的初衷——在充斥男性声音的加密播客生态中提供有质量的实时法律分析。
core_ideas:
  - '加密法律领域迫使从业者回到第一性原理思考：什么是中介？什么是托管？什么是信任？——这是 V Lee 离开 SEC 后留在加密的核心原因'
  - 'SEC 从以执法代替规则转向提供清晰路线，但将传统证券法定制适配到链上版本将是一项被行业低估的庞大工程'
  - 'CFTC 作为原则导向监管者正在推动永续合约和预测市场等产品回到美国在岸受监管市场，但其走向取决于主席和委员'
  - '近年 DeFi 黑客事件大多不是智能合约漏洞，而是操作安全层面的人为问题——多重签名的日常治理和安全流程被忽视'
  - '朝鲜黑客攻击加密协议以资助核武器计划，Jesse Brooks 主张必须将非法金融威胁具体化并动用国家安全工具反击（不只是防守）'
  - '隐私作为商业必需品是链上市场走向机构级规模的前提条件；ZK 群组、观看密钥和可审计性等技术可以实现隐私与合规兼得'
