summary: |
  TBPN 在 AIPCon 10 现场专访 Palantir CEO Alex Karp、AIG CEO Peter Zaffino、Palantir 前向部署架构师 Chad Wahlquist、以及 USDA 的 Sam Berry。Karp 直言不讳地批评 Token Maxing 文化、警告 AI 行业国有化风险、并阐述了 Palantir 的"品味+资本"公式。Zaffino 分享了 AIG 如何用本体论在 4 天内完成 $20 亿收购组合的建模。Wahlquist 揭示了前向部署哲学和"杀死所有仪表盘"的主张。Berry 则展示了 USDA 远超出"给牛奶评级"的真实规模与地缘政治意义。
core_ideas:
  - 'Karp: "It''s taste plus money" — AI 可以无限规模化，但无法规模化"什么商业问题值得解决"的品味'
  - 'Karp: Token Maxing 是企业的"手淫问题"——花着公司的钱自我满足，无实际产出'
  - 'Karp 警告 AI 行业正在梦游进入国有化：前沿公司对投资人 charismatic，对企业客户和普通人"超级不 charismatic"'
  - 'Zaffino: Palantir 本体论让 AIG 在 4 天内完成对 Everest $20 亿保费组合的建模——此前需要数月'
  - 'Wahlquist: "我想杀死所有仪表盘"——KPI 应该是运营应用的副产品，而非目标本身'
  - 'Berry: USDA 远不止农业——SNAP $1000 亿/年、林业局、农村发展、60 万联邦雇员工资系统'
