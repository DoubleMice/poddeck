summary: |
  Dr. Becky Kennedy 把一整套育儿方法论搬到工作场景：从 repair、connect-before-correct、
  MGI (most generous interpretation)、good-inside (把 identity 和 behavior 分开)，
  到 sturdy leader 的三种"机长广播"、boundary 的精确定义（"你要做的事，对方不用做任何事"）、
  resilient rebels 的控制欲，以及一句 magic 话术 "I believe you" + "I believe in you"。
  中间穿插一个自伤少女的故事——她对父母说 "Can you believe they let me make that decision?"
core_ideas:
  - "all humans need the same things 1 到 85 岁——行为出问题是需求没被满足"
  - "repair > perfect：secure attachment 的定义不是不出错，而是有人回头修补"
  - "MGI (most generous interpretation)：睡前用哪套词描述别人，决定第二天你是什么样的 leader"
  - "behavior ≠ identity：不做这个切分，对话就变成 '我是不是一个好人' 的无意识辩论"
  - "bad behavior = feelings overpower skills—— 没人被骂着学会游泳"
  - "sturdy leader 的三种机长广播：斥责 / 过度纠正 / '这吓到你，但没吓到我'"
  - "boundary 是你要做的事，对方不需要做任何事——tantrum 是 boundary 成功的信号"
  - "resilience over happiness：optimizing for happiness in childhood builds anxiety in adulthood"
  - "I believe you + I believe in you：一只脚在洞里陪你，一只脚在洞外看得见更有能力的你"
  - "'If I could do one thing different this week to be a better parent / manager to you, what would it be?'"
