summary: |
  Jeff Kaplan 的完整弧线: 一个 NYU 创意写作硕士, 一年收到 170 封退稿信, 把
  所有手稿扔进 dumpster; 靠 EverQuest 272 played days 逃避, 在公会里当了
  uber guild leader "Tigole", 结果公会里的 Ariel 原来是 Rob Pardo, Barfa
  是 Allen Adham —— 在 Irvine 一次午餐上他"felt like myself for the first
  time". $35K/年入职 Blizzard, 重写了 MMO 升级逻辑 ("overload experience
  into the quests"), 做了 Wrath of the Lich King; 和 140 人的 Titan 一起
  烧掉 $83M, 然后在六周里把 Titan 的 Jumper 蒸馏成 Tracer, 用 "Monetized
  Shooter" 的灰色 7 页 PPT 救活了团队 —— 这就是 Overwatch. 最后被 CFO
  一句 "$X 否则 1000 人丢工作, 算你头上" 击垮, 19 年生涯结束. 现在在
  Kintsugiyama 用金漆补碎瓷做 The Legend of California —— optimize for
  control, not money.
core_ideas:
  - "272 played days in 3 years —— EverQuest 是一个人生崩溃时的救援艇, 他在里面找到 career 和 family"
  - "WoW 的关键翻转: overload XP into quests, 让 path of least resistance 自己把玩家拉过整个世界"
  - "three types of fun —— player / designer / computer. ant farm designer 是踩在第二种陷阱里 (e.g. Green Hills of Stranglethorn)"
  - "Titan 失败: $83M, triple failure on art/engineering/design. 编辑器每周 40h 只有 20h 能用 —— fighter pilots we don't let fly"
  - "Overwatch 的出生: Jeff Goodman 一句 '50 classes, 1-2 abilities each', Titan Jumper 被蒸馏, Arnold Tsang 问 what if she's British —— Tracer 不是职业, 是人"
  - "crawl-walk-run 是 Titan 的诊断(we just tried to run), 但那个 slide 上的日期 'just all bullshit' 后来被当合同来追"
  - "Overwatch League 本意是给 esports 建立底线, 实际变成 'selling the Brooklyn Bridge' —— 承诺超过 NFL 的回报"
  - "CFO 摊牌 $X 营收 or 1000 人裁员 —— Jeff 19 年生涯结束; 他称为 'the biggest fuck you moment I had in my career'"
  - "You are the golden goose. Keep your eggs —— 对整个行业的结束白"
  - "Kintsugi: 不掩盖裂痕, 用金漆让它们更美 —— 新公司的名字和它对 Blizzard 经历的态度"
