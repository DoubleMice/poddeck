summary: |
  Acquired 讲述 Vanguard 创始人 Jack Bogle 的故事：他如何从一个 Depression-era 的孤儿成长为共同基金行业的革新者，
  在被自己公司解雇后，利用一个法律漏洞创立了客户共同所有的 Vanguard，并推出了第一支面向个人投资者的指数基金。
  Bogle 的"零利润、低成本"模型为投资者省下了超过一万亿美元的费用，而他自己去世时遗产仅 8000 万美元——不及 Fidelity Johnson 家族财富的千分之一。
core_ideas:
  - Bogle 1951 年 Princeton 毕业论文已预见：费用是基金回报的最大拖累，"降低成本"是提高回报最可靠的途径
  - Vanguard 独特的客户共同所有结构消除了利润层，使"规模经济共享"成为可能——与 Costco 类似但更极致
  - Bogle 并非被动投资激进派，而是"低成本激进派"——Vanguard 至今仍有 $2T 主动管理资产
  - ETFs 是 Bogle 最大的盲点：他拒绝了这个后来改变行业的发明，最终在 1999 年因此被逐出董事会
  - 2008 年金融危机是 Vanguard 的决定性时刻：主动管理未能兑现保护承诺，而 Vanguard 的"不赚你钱"承诺在此刻最有力量
  - 没有任何竞争对手能在不自杀的情况下复制 Vanguard 的结构——这是有史以来最极端的"反定位"案例
