summary: |
  Risky Business Media 的纪录片系列第二期，聚焦 1990 年代黑客文化的形成。从 Jeff Moss 创办 DEF CON 的偶然起源，到 L0pht 在国会作证的里程碑时刻，再到一名前黑客从物理入侵电话公司大楼、被 FBI 以间谍法追捕、潜逃期间操纵电台比赛赢取保时捷，最终转型为华尔街日报记者的完整弧光——这一期捕捉了黑客文化从边缘好奇到全球化现象的十年。
core_ideas:
  - 'Jeff Moss 描述 90 年代初为黑客的"黄金时代"——个体可以理解整个互联网，几个人在一个房间里就能成为"互联网的领主"'
  - 'DEF CON 1993 年起步于拉斯维加斯，从未被计划成为世界上最大的黑客会议之一'
  - '早期 hacker 社群既包容边缘人群也存在自负与冲突——Chris Wysopal: "Weirdos were welcome" 但也"it wasn''t all kumbaya rosy"'
  - 'Kevin 的故事是本期锚点：从 phone phreaking 到物理入侵电话局大楼，被 FBI 怀疑为克格勃间谍，潜逃期间通过电台比赛赢下保时捷'
  - 'Kevin 被判违反《间谍法》，私人侦探的关键证据挽回了局面，间谍指控最终被撤销'
  - '黑客与调查记者共享同一种驱动力：纯粹的好奇心加上肾上腺素的冲动——Kevin 后来成为《华尔街日报》记者'
  - '电话网络的独特魅力在于其异构性——部分设备已运营上百年，与相对现代的计算机并排工作，这种"非互联网"的非同质性是 90 年代黑客的终极游乐场'
