summary: |
  TBPN 多嘉宾期，涵盖三条主线：GLM 5.2 开源模型打破闭源领先叙事并登上《华尔街日报》头版；Google 因产能不足限制 Meta 的 Gemini 用量，揭示 AI 算力瓶颈；Micron 记忆芯片价格飙升（DRAM +60%，NAND +80%），AI 产业链利润向芯片制造商大规模转移。同时八位嘉宾深度访谈：National Design Studio 的 15MB 浏览器 PII 模型、Sigletree 的量子加速 AI 服务器、General Intuition 的万亿动作 token AGI、Tracer 的地下防御无人机、Engram 的持续学习 AI、Sail Research 的极致推理效率、Cadence 的临床 AI 慢性病治疗、Despicuous Ventures 的 El Segundo 硬科技生态。
core_ideas:
  - 'GLM 5.2 是首个在安全漏洞发现能力上匹配美国前沿模型的中国开源模型 — 改变了“开源落后于闭源”的叙事'
  - 'Google 无法满足 Meta 的 Gemini 容量需求——即便年投 2000 亿美元 CapEx，算力仍是科技行业最稀缺的商品'
  - 'AI 产业链的利润大转移：DRAM 价格单季涨 60%，Micron 客户多付 180 亿美元 ——“记忆芯片公司之于 AI 就像石油生产商之于航空公司”'
  - 'Chad Rigetti: 量子加速 AI 服务器的目标是几个数量级的训练速度提升，当人们不再需要说“那是一台量子计算机”时，量子就真正成为了主流'
  - 'Pim de Witte: 万亿动作 token 训练的模型将让供应链向游戏手柄输入收敛——“智能才是瓶颈”'
  - 'Chris Altchek: AI 正在治疗 10 万心衰患者，每周拦截约 20 次中风——在患者察觉之前'
