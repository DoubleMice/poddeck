summary: |
  Keith Rabois 用一个多小时把他 25 年的组织管理学铺开: 从 Venode Kosla 的
  "团队就是公司"、David Sacks 的 1+1≥3 leverage 公式、barrels vs ammunition
  框架、"我找到了一个 barrel" 的奶昔故事, 到 AI 时代 CMO 成为第一 token
  消耗者、PM 这个角色"makes no sense"、criticize in public、以及 7 年只缺练
  7 天的 no-days-off 人生。贯穿全片的是一个 contrarian 的选股算法: 找还没被
  blackbox 处理过的 undiscovered talent。
core_ideas:
  - Barrels × Ammunition —— 产出不是人数函数, 是 "能独立把事从 inception 推到 success 的人" 的函数
  - 先承认自己在陌生人身上识人不准 —— 从熟人 network 和 ruthless reference (DoorDash Tony 的 20 次 reference) 起步
  - '"If you were CEO, what would you have done differently?" —— 面试 senior hire 的一把钝刀'
  - AI 时代的 alpha 岗位是 "既 technical 又有 commercial instincts" —— 不是 PM / designer / engineer 三选一
  - 不要和 consumer / SMB 客户聊天, 他们的回答是 subconscious decision 的 conscious 版 —— 除非是 enterprise 的 must-win accounts
  - 最早能看出赢家的信号是 tempo —— 一次 board meeting 识别问题, 下次 board meeting 已经 ship 并测量完毕
  - 想要 high-performance org, 就别把 psychological safety 当 core tenet —— 但要给 ambitious shots on goal 留空间
  - No days off —— 7 年缺练 7 天, "no days off is a proxy for I don't believe in excuses"
