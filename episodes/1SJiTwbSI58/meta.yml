summary: |
  Rick Beato 用两个半小时把他的音乐观铺开: 从第一支 "Hey Joe" 独奏、父亲
  送的 Joe Pass《Virtuoso》、儿子 Dylan 的完美音感实验 (native music
  fluency), 到 Miles Davis 从不彩排、David Gilmour 的 Zoom 9030、Beatles
  365 天三张专辑的 "perfect storm"、Metallica 1991 年莫斯科 160 万人现场,
  再到对 AI 音乐的一个冷静结论: "fundamentally boring".
core_ideas:
  - "完美音感 = native music fluency, 关键窗口在出生前 15 周到 9 个月"
  - "高信息量音乐 (Bach / bebop) 喂进婴儿耳朵, 比事后教音名更有效"
  - "Thought is the enemy of flow —— Miles Davis 的录音室从不彩排"
  - "Gilmour 的 tone = 同一套踏板 + 同一个 tech Phil + 一个 Zoom 9030 modeler"
  - "Beatles 1965-66 的奇迹年: PA 烂得不能巡演, 于是变成纯录音室乐队"
  - "fluid vs crystallized: 30 岁前即兴, 30 岁后才能写出晚期四重奏"
  - "AI 音乐的真正问题不是像不像, 是 fundamentally boring"
  - "55 岁才开始做频道, 方法论是追 craft 不追 fame + never waste a friendship"
