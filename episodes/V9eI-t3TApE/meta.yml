summary: |
  小米大模型负责人罗福莉的 3.5 小时深度对谈：从春节凌晨 2 点 OpenClaw 觉醒，到 MiMo V2 系列 (Pro / Omni / TTS)
  的"悄无声息伏击"，再到 Agent 时代后训练算力 1:1、组织扁平化、AGI 两年内可期。
  当下范式已从 Chat 切到 Agent —— 1T 基座 + 后训练敏捷性是新的入场券。
core_ideas:
  - OpenClaw 是划时代的 Agent 框架；不只是壳，而是"框架本身可以自迭代"
  - Agent 范式很吃后训练；Pre/Post Train 算力比从 5:1 走到 1:1，研究/Pre/Post 卡分配 3:1:1
  - 1T 以上基座是对标 Claude Opus 4.6 的入场券；中美代差仅 2-3 个月
  - MiMo V2 Pro 用 Hybrid Attention 7:1 + MTP，专为 long-context efficient 设计；MLA 不再适配 Agent 时代
  - 100 人团队、没有组、没有职级、没有 deadline；"环境反而比经验更重要"，靠热爱驱动
  - AGI 路径：当下 20%、今年底 60-70%、两年内可达；"上一个时代的成功并不意味着下一个时代的领先"
