summary: |
  Jeff Dorman (Arca CIO) 解析 Strategy（前 MicroStrategy）的资本结构困局。$15B 优先股带来的 $1.7B 年息义务，叠加 $2B 现金缓冲被挪用于回购远期债务，让 Saylor 六年建立的信心飞轮正在瓦解。Dorman 提出了一个逆向建议：不该卖 $2.5M 试探市场，而应一次卖 $2B 撕掉创可贴。
core_ideas:
  - Strategy 的 $15B 优先股（年息 10-12%）带来每年 $1.7B 现金压力，让一家不赚钱的公司必须持续出售资产或稀释股权
  - 用募集来付股息的 $2B 现金中的 $1.4B 回购了三年后才到期的零息债——12 个月缓冲变 4 个月
  - 四个利益方（BTC 持有者、MSTR 股东、优先股持有者、债权人）无法同时被满足，总有人会输
  - Dorman 的反直觉建议：一次性卖 $2B BTC 比零碎试探 $2.5M 更能安抚市场，因为明确性消除不确定性
  - Polymarket 合约争议暴露了预测市场治理的漏洞——有确凿证据却判"否"
  - Saylor 历史上多次从帽子里掏出兔子，但不能排除这次不同
