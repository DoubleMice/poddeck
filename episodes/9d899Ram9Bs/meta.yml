summary: |
  Alex Lupsasca 是 2024 年 New Horizons in Fundamental Physics Breakthrough Prize（被称为
  "Oscar for physics"）的得主, 一位黑洞理论物理学家。他追踪 LLM 在科学前沿的能力已经
  一年半。GPT-5 发布时 Twitter 反响 "lukewarm" — 但在他的领域, 模型在 30 分钟内复现
  了他自己花了很长时间才做出来的好论文。Mark Chen 教了他一个 "priming" 技巧
  (先解一道 textbook warmup), GPT-5 就能解决一篇 training-cutoff 之后才发布的论文。
  之后, 他和 PhD 导师 Strominger 把一个 32 项之和、卡了一年的 single-minus gluon
  tree amplitude 问题给了 ChatGPT — 模型在 Strominger 的飞机降落之前就解决了, 还用
  作者们都不知道的技巧给出了证明。第二个实验把题目换成 graviton, 模型在一天内吐出
  110 页全新的量子引力, 团队用三周验证。这就是 "vibe physics"。
core_ideas:
  - 'Jagged Frontier: 写邮件的人觉得 GPT-5 提升不大, 但科学前沿 "the limits just moved outwards"'
  - 'Priming 技巧: 先让模型解一道 textbook warmup, 再问真问题, 把它 "thinking along the right lines"'
  - '11 分钟 / 30 分钟 / 一周: 时间-到-结果在 o3 → GPT-5 → GPT-5.2 上一阶一阶塌缩'
  - 'half-collinear regime: 模型自己找到极限情形让 32 项之和的公式 collapse 成简单形式'
  - "用作者们都不知道的技巧证明: ChatGPT 不是在重组训练数据 — 它在做选择和翻译"
  - 'Vibe Physics ≠ Vibe Coding: 前者真的在 "extending the frontier of human knowledge"'
  - '人类的工作没消失只是移位了: 模型 3 天产出, 人类 3 周验证, "taste" 仍在人这边'
  - "理论家的 scope a lot, lot bigger: 瓶颈从'算得动'变成'想得到 + 验得动'"
