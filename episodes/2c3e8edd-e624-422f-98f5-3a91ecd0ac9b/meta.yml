summary: |
  TBPN 2026 年 7 月 13 日期，四大主题贯穿全场。Apple 起诉 OpenAI 窃取商业机密，Mark Gurman 深度解读这场"热核战争"的背后逻辑：Tang Tan 和 Johnny Ive 的前 Apple 核心团队如何在 OpenAI 打造"反 iPhone"，以及诉讼本身如何成为阻止人才流失的武器。Alexis Ohanian 阐述体育作为"终极反 AI 赌注"的投资逻辑，从现场活动爆发到交易卡牌的文化资产化。Morgan Housel 解读美国家庭财富从房产到股票的历史性转移，以及社交媒体如何扭曲了我们对财富和成功的期望。Excel 世界冠军 Michael Jarman 与 AI 代理 Shortcut 的人机对决，揭示了 AI 在可验证任务与需判断任务之间的根本差异。
core_ideas:
  - Apple 起诉 OpenAI 窃取商业机密，指控前 iPhone 设计负责人 Tang Tan 系统性挖角和窃取机密。Mark Gurman 分析指出，诉讼的核心目的是阻止 Apple 人才流向 OpenAI，而不一定是法律上的完胜
  - Alexis Ohanian 三年前在 Cannes Lions 提出体育是"终极反 AI 赌注"——当 AI 能生成一切数字内容时，真正发生过的人类瞬间反而变得无可替代。现场活动 UFC、F1、世界杯的收入爆发印证了这一判断
  - Morgan Housel 指出美国家庭资产中股票占比首次超过房地产，但大多数人没有为市场 30-50% 下跌做好心理准备。房地产的"账面财富"在同一个市场中买卖时是虚幻的
  - Nico Christie 使用 Shortcut AI 代理与 Excel 世界冠军 Michael Jarman 展开人机对决，揭示了 AI 在可验证任务上接近完美的能力，以及在需判断的商业任务中仍存在的根本局限
  - 200 多位 AI 研究者签署联名信，警告 AI 可能在未来十年引发比工业革命更剧烈的经济转型。值得注意的是，CEO 级别的领袖（Sam Altman、Dario Amodei）均未签名，由副手代签以避免头条风险
