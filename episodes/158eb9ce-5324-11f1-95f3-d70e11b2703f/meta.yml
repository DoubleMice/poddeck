summary: |
  一场关于 DeFi 衍生品交易所 Hyperliquid 如何应对美国监管压力的三方对谈。
  CME 与 ICE 联合要求 CFTC 对 Hyperliquid 施加监管，引发了一个根本性问题：
  一个去中心化的永续合约交易所能否在保持其创新特质的同时进入美国受监管市场？
  FIA 主席 Walt Lukin 与前全球最大 FCM 之一的负责人 Chris Perkins 从三个可能路径出发，
  深入讨论了 24/7 交易、风险瀑布与 ADL、原则导向监管的潜力，以及 DeFi 时代"谁来负责"的哲学难题。
core_ideas:
  - Hyperliquid 面临三条路径——维持离岸、获取三张美国牌照（DCM+DCO+FCM）全面上岸、或坚持"只是代码和技术"的彻底去中心化路线
  - 2008 年雷曼危机后 G20 强制衍生品中央清算——当时没有区块链，别无选择；现在去中心化技术可以用不同方式达成同样的原则目标
  - 24/7 交易已成为生存底线——但传统金融的支付轨道、银行系统和清算基础设施尚未就绪；稳定币可能填补这一鸿沟
  - 传统监管依赖可追责的中间人（FCM/DCO/DCM），DeFi 消除了这一层——"谁来负责"成为 CFTC 需要回应的根本问题
  - CFTC 的原则导向监管结构（thou shall not manipulate markets, steal from customers, uphold financial integrity）被认为最适合容纳 DeFi 创新
  - "'you can't regulate tech'——Chris Perkins 主张监管使用技术的人和行为，而非技术本身；Walt Lukin 强调上岸会带来信誉和公平竞争环境"
