summary: |
  TBPN 本期深度覆盖了 IBM 创 115 年最大单日跌幅的背后逻辑——AI 资本支出正从传统 IT 基础设施向外迁移；DeepMind CEO Demis Hassabis 提出了迄今为止最详细的美国 AI 监管框架，包含 30 天发布前测试和覆盖开源模型的要求；Dylan Byers 从 Puck 带来 Paramount-WBD 合并案的深度分析，指出在 Netflix、YouTube 和 TikTok 面前，加州 AG 的反垄断诉讼用"影院发行市场份额"来定义垄断已经过时。此外还包括六家 AI 创业公司的融资动态：TerraFirma（建筑机器人）、Greylock 18 亿美元新基金、Reflection AI（10 亿美元算力合同）、Chai Discovery（AI 药物发现）、State Affairs（政策情报）、Cipher Digital（AI 数据中心）。
core_ideas:
  - 'IBM 暴跌 25% 不是一家公司的故事——它是企业 IT 支出结构性转移的信号：客户正在将资本支出从大型机转向 GPU、网络和超大规模云计算'
  - 'Demis Hassabis 的监管提案比之前的泛泛呼吁更具体（30 天预测试、覆盖开源模型、国家标准机构），但"如何执行"仍是核心难题——如何在开源和闭源之间建立公平竞争环境？'
  - 'Dylan Byers 对 Paramount-WBD 反垄断案的拆解：在 Netflix、YouTube、TikTok 和 AI 生成内容面前，用"影院发行"定义相关市场已经荒谬——一切只是"眼睛在屏幕上的时间"'
  - '纽约暂停 AI 数据中心建设可能成为第三次战略错误——继核能和制造业之后——项目正在永久性地流向德州和弗吉尼亚'
  - 'Greylock 的"地图重新变空白"论点：AI 正在重置整个创业版图，但矛盾的是——资本效率提升的同时，AI 公司实际上在花更多的钱、以更快的速度融资'
  - 'TerraFirma 的 75% 自治经济学：建筑机器人不需要 100% 自治——自治成本指数增长和自动化价值递减的两条曲线在约 75% 处交叉。Waymo 花了约 300 亿美元才达到 99.9% 自动驾驶'
  - 'Chai Discovery 在 2025 年让 AI 药物发现成功率从 0.1% 飙升到 16%——一位制药科学家看到结果后说"我花了五年时间研究那个靶点"'
  - 'Cipher Digital 的 4.2GW 开发组合与"铁路时刻"类比：现代资本市场因铁路才被创造出来——没有足够的银行贷款，所以发明了股权融资。AI 数据中心的建设热潮正在重演这段历史'
