summary: |
  Zevi Arnovitz 是 Meta 的 PM, 一年前在日本看了一个 YouTube 视频, 然后
  从 zero 技术背景一路走到 Cursor + Claude Code, 用一套可复用的 slash-command
  工作流 (create-issue → explore → plan → execute → review → peer-review →
  update-docs) 独自维护一个副业 app Studymate。他把不同模型拟人化 (Claude
  当 CTO, Codex 是小黑屋的 hoodie coder, Gemini 是吓人但出活的 crazy scientist,
  Composer 是冲锋队), 让它们互相 code review "fight it out"。一句反复出现的
  口号: "you'll be replaced by someone who's better at using AI than you."
