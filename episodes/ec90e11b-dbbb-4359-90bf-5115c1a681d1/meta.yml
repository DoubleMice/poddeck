summary: |
  TBPN 2026年7月圆桌特辑，6位嘉宾覆盖13个热门话题。Valor Atomics 成为首个发电的核能创业公司；OpenAI 与特朗普政府讨论5%股权转让引发国家化争议；SpaceX 在 IPO 路演中展示 AI 手机原型；Together AI 完成 $800M B 轮，开源模型加速追赶；Rob Toews 发布2030五大预测；Base Ten $1.5B 推理云押注。从 AI 监管、能源基础设施到上市故事，全面捕捉科技与资本的交汇点。
core_ideas:
  - 'Dean Ball 深度解析 OpenAI 5% 股权提议的两种路径：分发给家庭 vs 政府直接持股。前者象征意义大于经济价值，后者可能导致 AI 公司滑向"公共事业"——政府持股→政府控制→合法论据称 AI 公司为"政府工具"→宪法义务全面降临'
  - 'Isaiah Taylor 宣布 Valor Atomics 成为历史上第一家发电的核能创业公司。从行政令签署到发电仅14个月，从一片草地到为 NVIDIA Spark 供电。他将当前阶段比作 SpaceX 的 Falcon 1 时刻——"火箭刚发射，现在去造更好的、开始规模化"'
  - 'WSJ 披露 SpaceX 在 IPO 路演中展示 AI 手机原型：比 iPhone 更薄、xAI 驱动、Snapdragon 芯片、自研 OS。App Store 护城河正被 AI 侵蚀——超级 App 吞噬功能、AI 聊天替代长尾 App、分发渠道失效'
  - 'Together AI 从 $100M 预订量增长到 $1.2B，完成 $800M B 轮。开源模型在长程智能体工作流上逼近闭源水平。Vipul 分析中美开源市场的结构博弈：中国天然"模型公开发布"，美国正在追赶'
  - 'Rob Toews 2030 五大预测：Anthropic 将成为最大生命科学公司之一、TSMC/ASML 垄断被打破、心灵感应成为主流沟通方式、AI 能效提升数百万倍、AI 法律权利成为主流辩论'
  - 'Flexjet 机队从350扩展至400架，跨大西洋飞行量同比增长60%。Andrew Collins 提出"体验经济 vs 物品经济"的转型框架。私人航空因 COVID 爆炸式增长并展现出惊人的客户黏性——"他们不会回去的"'
