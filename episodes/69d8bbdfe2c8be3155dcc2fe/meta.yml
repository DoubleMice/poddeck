summary: |
  自然选择创始人 Tristan 张小帆深度阐述 AI 社交产品 Elys（极乐世界）的底层范式：从低维标签到高维 Context 的转变，Context 飞轮的设计逻辑，以及"做自己、构建主体性"这一 AI 时代的核心命题。同时分享了他从音频平台窄播到恋爱游戏再到 AI 创业的三段经历，以及面对 ChatGPT 等巨头的竞争策略。
core_ideas:
  - 'AI 社交的核心公式：传统互联网 = 低维标签 + 人类做工 → 低效连接；AI 社交 = 高维 Context + AI 代理做工 → 高效连接'
  - '在 AI 时代唯一重要的事情是做自己、构建主体性：将来智能是平权的，但 Context 不平权'
  - 'Context 飞轮：用户输入 Context → 分身更懂你 → 获得真实连接的正反馈 → 用户愿意输入更多 Context'
  - '分身综合症：AI 分身的"更 real 更直白"会反过来辐射到真人的社交行为'
  - 'Elys 不是低垂果实：模型即产品不适用于社交网络，社交需要被构建——设计交互、规则、协议'
  - 'Proactive 是 AI 时代最大的交互范式变化：上一代是响应式，这一代是主动式'
