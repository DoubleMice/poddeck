summary: |
  Sam Lesson (Slow Ventures, ex-Facebook VP Product) 把一本硅谷缺席的礼仪手册
  拆给 Lenny 听: 整期的 thesis 是 etiquette = a skill for how to show up in a room
  with a low heart rate. 从 Kleiner Perkins holiday party 的 Energizer Bunny 反面
  教材, 到 "let it hang" 的 name-recovery 技巧; 从 tuxedo Tuesdays 到 "B for bread,
  D for drinks"; 从 Calendarly 讨伐战到 CC/BCC 的暗语 - 一条一条具体到可以照着做.
  最后在 Contrarian Corner 丢了一枚: seed VC 投 "AI 公司" 会亏掉一笔 impossibly
  large 的钱, 因为 OpenAI 即使到 $500B 市值, seed return 也只有 25x - middling at best.
core_ideas:
  - "Etiquette is a skill for how to show up in a room with a low heart rate —— 整期的 thesis statement"
  - "Abundance mindset: this is part of the story, not the entire story. Energizer Bunny 会把人吓跑"
  - "软件被商品化之后, trust 反而变硬通货 —— 这是 2026 年礼仪比以前更重要的原因"
  - "Let it hang: 忘记对方名字时, 转向 partner 说 'Jessica, I want to introduce you...' 然后停一拍, 对方会主动报名字"
  - "Great to see you 比 nice to meet you 万能 —— 见没见过都 work, 说错不会社会性死亡"
  - "Conversations = ping-pong, 不是 monologue, 也不是 inquisition. Questions 是工具, 不是武器"
  - "Fit is everything: well-fitting $20 shirt > misfitting $500 shirt. Startup founder 不要戴 Rolex, 很 classless"
  - "Dress one level up —— 不是两级三级, 多了可以脱 jacket 调低, 少了救不回来"
  - "Tuxedo Tuesdays: Bain 的 minimum-not-maximum dress code hack —— know the rules to break them"
  - "Tip a lot (20% minimum, 30% sometimes). 目标是 tip 不要 memorable"
  - "Don't order first, don't order the most expensive. Always offer to pay (除非 $10k 酒单)"
  - "B for bread D for drinks —— 双手比 OK, 左 b 右 d. Napkin in lap, knife blade points in"
  - "The CC language: TO 顺序 signal 谁重要 (CEO 不能放第四位); CC = 不期待回复; BCC = 绝不 reply-all"
  - "Calendarly 是 busyness hierarchy 的 signal —— less senior/less busy 的一方应该 make it work on your end"
  - "Respect EAs and PAs: the #1 way to look classless. 但 over-flowers 就 transactional 了"
  - "Camera on, close your closet, clean up after yourself —— Kevin Colleran 对 LP 会议的 maniacal rule"
  - "Small talk = TCP IP ACK handshake / 14.4K modem crash —— 不是浪费, 是同步频率"
  - "Irish goodbye 常常是最好的 goodbye. Thank-you note 成本低复利长"
  - "Contrarian Corner: 带 AI 标签的 seed 投资会亏 impossibly large 的钱. OpenAI 到 $500B 时 seed 回报才 25x, 这是 middling at best 的 seed return"
  - "Sam 真正投的: businesses that USE AI (Sublime Security, Outtake, June Date), 不是 AI businesses"
  - "AI Corner: lettermeme.com —— 把订阅 newsletter 喂进去, 每天产出一页 cartoon 头版"
  - "Carthage must burn —— Facebook Plus hackathon 的海报, 至今挂在他家健身房"
