summary: |
  速通科技CEO韩铮深度解读机器人行业的技术路线之争：端到端模仿学习 vs 上下分层架构。
  从ImageNet到ShapeNet的3D数据传承，到Sim-to-Real路线在开放世界零样本操作上的突破（240次抓取，98%成功率），
  再到对Physical Intelligence、Skild AI、Figure、Tesla、DeepMind+波士顿动力等全球主要玩家的逐一分析。
  韩铮提出了一个"暴论"：2026下半年，分层架构将重回机器人行业的主流。
core_ideas:
  - 机器人物体操作比运动控制难两到三个数量级，核心在于需要对物理世界有结构化理解
  - Sim-to-Real是机器人冷启动阶段绕不开的路线——无法像自动驾驶一样靠数百万辆车上路收集数据
  - 端到端模仿学习在物体泛化性和环境泛化性上存在天花板，分层架构将在2026下半年回归主流
  - 速通在CVPR/ICRA现场接受随机物体测试，实现240次抓取98%单次成功率、100%闭环成功率——学术界前所未有
  - DeepMind加波士顿动力可能是未来两到三年机器人操作领域最大的竞争对手
  - 速通的商业模式定位为"机器人版iPhone+iOS"——提供硬件加底层操作模型，让开发者在上面构建垂直应用
