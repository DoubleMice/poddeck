summary: |
  鼎泰丰店均年营收高达 2740 万美元，位列全美所有连锁餐厅之首；
  贡茶在中国销声匿迹，却在美国开出近 300 家门店，茶饮品类特许经营第一。
  本期邀请吃货小分队三位嘉宾，深聊餐饮茶饮出海的品类选择、选址游戏、
  文化输出、本地化边界与资本杠杆——以及最重要的忠告：避免自嗨，做时间的朋友。
core_ideas:
  - '鼎泰丰成功四要素：品质极致（18褶）、品类选择（小笼包=饺子+lava cake）、克制扩张（13年仅4店）、本地化微创新（巧克力小笼包）'
  - '贡茶资本路线：韩国主妇引入→PE接盘→加盟扩张→$288M收购→总部迁伦敦→寻求$2B出售'
  - '美国选址本质是地产游戏：房东强势、租约10-15年、排他条款、先发者锁定稀缺点位'
  - '文化输出差距：韩国用K-Pop卖饺子（必品阁42%市占），日本用动漫卖拉面（50年渗透），中餐缺少可以借力的文化产品'
  - '菜单策略：A+B保留品牌记忆点并拓宽带宽，而不是A→B自废武功'
  - '核心忠告：避免自嗨、尊重当地消费者、做时间的朋友、躬身入局'
