core_ideas:
  - Ilya Sutskever 在联邦法庭上说出"没钱就没大电脑"——刻画出 AI 研发的根本性资本约束
  - Doomberg 揭示油价之谜：霍尔木兹封锁下油价不涨，因石油已降至全球能源的30%且AI由煤与天然气驱动
  - 美国页岩革命的"共生产经济学"使天然气沦为免费副产品——正在成为AI数据中心的无形补贴
  - Sam Blond 提出"forward deployed AE"概念——AI销售工具的真正壁垒不是技术，而是客户成功的人肉缓冲层
  - Roger Lynch 的"假设没有搜索"法则——面对AI Overview吞噬流量，媒体需以零搜索为前提重建商业模式
  - Condé Nast的杠铃策略：Vogue/The New Yorker每年增长创新高，中间品牌受冲击——"不要夹在中间"
