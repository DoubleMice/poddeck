summary: |
  Unchained 十周年特辑中，创始人 Laura Shin 与 Dragonfly 管理合伙人 Haseeb Qureshi 进行了一场自由对谈。从 Necker Island 上的首集录制到成为唯一存活至今的 Forbes 播客，从为写作卖掉加密货币到被建制媒体拒之门外后重新买回，Laura 回顾了十年的高光与低谷。对谈覆盖了 SBF/FTX 的震撼、有效利他主义的哲学辩论、独立媒体对传统新闻的替代，以及 Laura 如何因健康危机从建制自由派彻底转变为一个倾向自由主义的独立声音。
core_ideas:
  - Laura 从 Forbes 第 13 个播客起步，在 Forbes 砍掉播客业务后独自求生，成为唯一活下来的那一个
  - '为"能在《纽约时报》等名刊写作"而卖掉加密货币——但最终被 Wired 以"接受加密赞助"为由拒绝撰稿'
  - FTX 崩溃后 Laura 最想问 SBF 的问题是"冷钱包怎么设置的"——一个所有机构都没问的核心问题
  - Laura 批评有效利他主义为"扮演上帝的执照"，Haseeb 辩护说 SBF 的行为是个人权力妄想而非 EA 哲学
  - 健康危机让 Laura 意识到建制渠道无法提供答案，真正有效的帮助来自最边缘、最被蔑视的角落
  - 'Laura 正在重新思考自己的采访身份——是否继续做"中立记者"，还是转向更有个人观点的表达'
