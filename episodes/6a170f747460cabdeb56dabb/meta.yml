summary: |
  何小鹏返场深度访谈。他详细解释了小鹏汽车去年叫停"小几十个亿"旧智驾体系、全面转向AI原生路线的巨大赌注，
  提出了"缝合怪"概念来批判软件工程+AI工具的传统路径。机器人方面，他分享了Iron人形机器人的诞生、那场"是不是
  真人"的舆论风暴、以及通用人形机器人"两成胜率"的冷静判断。此外还谈及GX旗舰SUV的技术融合、L4自动驾驶18-24个月
  的时间预判、"30年五家车企"的产业终局，以及技术剧变下CEO从逻辑论到公理层的焦虑与信念重构。
