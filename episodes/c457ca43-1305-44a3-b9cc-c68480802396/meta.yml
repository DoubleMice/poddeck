summary: |
  深度解析中国动力电池产业如何从买不起日本设备、靠人工加夹具的"手工作坊"起步，跃升为全球唯一全产业链闭环。三位一线亲历者——TDK Ventures投资人何倩然博士、《电池之心》作者杨璐和张从志——从政策拐点、制造壁垒、产业集群到下一代技术路线，全景还原这场制造业史诗。
core_ideas:
  - '2009年"十城千辆"用补贴创造需求，2015年"白名单"约400美元/kWh补贴排除日韩电池厂，连续多年的政策支持是中国电池产业崛起的决定性推动力'
  - 电池制造的核心难点在极片涂布——TDK从磁带涂布技术跨界赋能ATL，这套"极致稳定"的制造能力后来成为CATL的起点
  - 中国是"全球唯一能够在所有关键环节做到规模化、商业化、持续迭代的国家"——正极70%、负极90%+、隔膜83%、电解液86%+、设备国产化90%+
  - 固态电池过去五十年一直在瓶颈中，行业共识2030年前后才可能规模化推广；钠离子电池五年内供应链就将成熟，有望取代30%+铁锂市场份额
  - '曾毓群评价Northvolt失败："You use the wrong design, use the wrong process, and then you use the wrong equipment"——电池制造不是买设备就能搞定的事'
  - 中国的工程师文化——几十家上百家公司同时反复打磨同一个工程问题，这种"集体工程优化"的密度和效率在欧美难以复制
