summary: |
  三位名校大学生（清华法学院、NYU 应用心理学、NYU/哥大数据科学）讲述作为"人类历史上第一批和生成式 AI 一起成长的学生"，AI 如何重塑了他们的学习方式、对大学价值的认知、以及对未来的焦虑。从 Jack 的"99% 的作业都有 AI 参与"、到 Clanto 的"大学就是社交"和"文凭是社会信号"、再到 Alfred 从法学转 AI 的跨界路径，这期对谈揭示了 AI 时代大学教育的根本性挑战：当对外价值（专业技能）被 AI 击穿，大学如何帮助学生找到对内价值（批判性思维、价值判断、自我认知）？
core_ideas:
  - '"99%" — Jack 从 2022 年底 AI 参与作业比例从 30% 涨到近乎 100%'
  - '"大学就是社交" — Clanto 把这句话写进了 NYU 申请文书；文凭从知识证明变为社会信号'
  - '"打不过就加入" — Alfred 从法学跨界 AI 的路径：30% 来自课程，70% 来自 AI 对话+项目实践'
  - '"施天涛的寄生虫" — 把教授著作喂给 AI，纯文科生靠 AI 拿了 4.0 满绩'
  - '"Deciding vs Choosing" — MIT 教授 Weizenbaum 的分野：AI 能做决策，不能做选择'
  - '"资深悖论" — METR 实验：用 AI 的专家实际慢 19%，但自我感觉快 20%'
  - '"你不是被 AI 替代的，是被更会用 AI 的人替代的" — 就业市场的核心焦虑'
  - '"AI 比短视频更上瘾" — Clanto 的 Claude 额度用完后"不知道干什么"'
