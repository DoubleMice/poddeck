summary: |
  张小珺《商业访谈录》第 134 期：和光轮智能 CEO 谢晨把 AI 的"数据"这架马车
  做成一次产业综述。从数据 = 教育的第一性类比，到朱玉可提出的数据金字塔
  （真机 / 仿真 / 人类第一人称视频），再到为什么特斯拉模式在具身不成立、
  BEHAVIOR Challenge 的 26%、为什么"先失败再成功的数据最贵"，一直到终局：
  一家 AI 教育公司，提供环境让模型自己修炼内功。
core_ideas:
  - 数据约等于教育 —— 从 ImageNet 的填鸭式，到 Scale 的量贩式，到 Surge/Mercor 的私教式，再到环境驱动的自学
  - 数据金字塔三层：真机（最稀缺）/ 仿真（可规模化）/ 互联网+人类第一人称视频（本体无关、规模最大）
  - 特斯拉数据闭环在具身不成立 —— 最多的数据不是本体来的；Optimus 的大脑安排给 xAI 就是佐证
  - 四角色生态：大模型商 / 数据商 / 本体商 / 场景商相互协作，不再是一家通吃
  - 具身当前最核心的瓶颈是"评测的规模化"—— 自动驾驶和 LLM 有免费的影子模式，具身只能靠仿真
  - BEHAVIOR Challenge 一百道题，现阶段最高分 26%；如果满分是一百万台机器人，今天"零点六分都不到"
  - 好数据的反直觉：失败再成功的数据最贵；先完美做好披萨不如中间掉了菜再捡起来
  - 终局：Data Factory 会消失，留下的是一个环境 + 不断更新的成功标准，让 AI 自我学习
