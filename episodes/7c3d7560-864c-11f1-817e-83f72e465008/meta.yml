summary: |
  本期 DEX in the City 法律圆桌聚焦预测市场 Kalshi 经历的三重挑战：密歇根州法院签发 TRO 要求清算体育赛事合约，CFTC 随即动用 1980 年以来首次紧急权力干预，将商业纠纷升级为联邦主义原则之争。节目同时讨论了日本加密监管的突破性升级（税率从55%降至20%）、DTCC 将真实证券权益代币化上链的里程碑进展，以及美国加密立法在国会窗口临近关闭前的三重拉锯。
core_ideas:
  - Kalshi 与密歇根州的法律冲突触发 CFTC 自 1980 年以来首次动用紧急权力，将纠纷升级为联邦主义争论
  - 如果 CFTC 的联邦优先权主张获胜，体育博彩行业可能彻底转向联邦 DCM 框架，绕开州级监管
  - Kalshi 的航班取消合约因道德风险争议被迫取消，FlightAware 同时封锁了数据使用——揭示了预测市场面临的多维压力
  - '日本新《金融商品交易法》将加密税率从 55% 降至 20%，并创建了全新的金融工具类别，亚马逊配送已宣布用日元稳定币支付司机薪酬'
  - DTCC 代币化的是真实的 DTC 账簿权益而非 Wrapper，这与其他"代币化股票"有本质区别
  - 预测市场的内幕交易风险已被实际案例证实，但被发现的可能只是冰山一角
