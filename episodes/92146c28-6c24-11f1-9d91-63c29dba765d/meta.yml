summary: |
  Kalshi 加密货币负责人 John Wang 接受 Unchained 主持人 Laura Shin 专访，解读 Kalshi 如何成为首个获 CFTC 批准在美国推出加密永续合约的交易所。对话涵盖永续合约的本质定义、$90 万亿离岸市场的合规化迁移、多层风险管理体系、对 CME 集团批评的回应、资产上线逻辑、竞争格局以及 Kalshi 打造"全球最大交易所"的终极愿景。
core_ideas:
  - '永续合约（Perps）是"最纯粹的交易工具"：无到期日、双向交易、杠杆灵活，解决了传统衍生品三大痛点'
  - 'Kalshi 将 $90 万亿离岸永续合约市场以 CFTC 监管框架首次带入美国，建立多层风险防护体系（逐仓保证金/健康因子/清算机制/保障基金）'
  - '回应 CME CEO 的批评：Kalshi 的风险模型基于行业先例，且杠杆远低于 CME 和 CBOE 的现有期货产品'
  - '资产选择逻辑：用户需求 + 监管先例 + 自我认证能力；每新增资产类别需完成 40.3 备案'
  - 'Kalshi 的差异化：美国合规 + 机构基础设施（FCM、大宗经纪商和交易终端集成），与离岸交易所"在不同赛道上"'
  - '终极愿景：从预测市场起步，通过永续合约扩展到更多资产类别，打造全球最大交易所'
