summary: |
  Dropzone 创始人 Edward Wu 与 Patrick Gray 深度对谈 AI 时代的检测与响应。从漏洞末日（Vompocalypse）下 D&R 的新角色、Dropzone 从单 Agent 到 7-Agent 的进化、AI Coding 作为 SOC 水晶球的类比、Vibe-Code 的真实成本冰山、20/80 模型选择策略，到未来人类在 SOC 中的新角色——Field General 或 Special Forces。
core_ideas:
  - 漏洞末日让攻击者更容易获得初始立足点，D&R 成为"企业免疫系统"的前线
  - Dropzone 从单一告警分类 Agent 发展到 7 个协作 Agent，覆盖检测与响应的完整生命周期
  - AI Coding 在 AI 采纳上领先 SOC 2-3 年——它的演进轨迹就是 SOC 的明天
  - 'Vibe-Code 的真实成本在水下：持续测试、评估和维护远比构建本身昂贵'
  - '每 100+ 次 LLM 调用中只有 20% 需要 Premium Model——Planning 和 Conclusion 是关键决策点'
  - 未来人类在 SOC 中的角色两级分化：Field General（定义策略）或 Special Forces（处理最棘手的任务）
