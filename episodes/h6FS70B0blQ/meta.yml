summary: |
  Acquired 深度剖析了印度超级板球联赛（IPL）——一个仅用 17 年就成长为 $16B 估值的体育联盟，其每场比赛的媒体版权收入已位居全球第二。本期讲述了创始人 Lalit Modi 如何从被 ESPN 踢出后，以复仇为动力，接管 BCCI、商业化印度板球、并从零开始设计了"人类史上最完美的体育娱乐产品"——融合 NFL 的竞争平衡、宝莱坞的明星效应、以及 T20 三小时快节奏格式。故事涵盖迪士尼、Murdoch、Reliance、黑帮暗杀威胁、最高法院清洗——以及一个核心赌注：20 年后，IPL 会超过 NFL 成为全球最大的体育联盟吗？
core_ideas:
  - Lalit Modi 从被 ESPN-Star 合资企业踢出后，以个人复仇为动机，通过渗透 BCCI 并商业化印度板球，最终创造了 IPL
  - IPL 从零开始设计，融合了 NFL 的集中化收入分配和硬工资帽的精髓，但用球员拍卖替代了工资帽——这被认为是更优雅的竞争平衡机制
  - 为了突破广告预算已被国际板球吸干的瓶颈，IPL 被刻意设计成与肥皂剧竞争的家庭娱乐产品——引入宝莱坞明星、吸引女性观众，最终实现 50/50 性别均等收视
  - Modi 的商业天才在于设计"零风险交易"——通过操纵支付时间和创造竞争性投标，让所有参与方在 Year 1 都处于盈亏平衡或盈利
  - 2010 年 Modi 因 22 项指控被 BCCI 停职并流亡伦敦，随后 2013 年假球丑闻触发最高法院清洗——这反而成为 IPL 走向 Institutional-grade 投资资产的转折点
  - 印度中产阶级从 2M 增至 550M、电视渗透率 40%→74%、智能手机 30M→800M——这三重浪潮与 IPL 的增长完美共振，Bull case 认为 20 年后 IPL 可能与 NFL 规模相当
