summary: |
  本期 Bits + Bips 围绕 Hyperliquid 与 Circle/Coinbase 的三方交易展开，深入讨论了净利息收入（NII）在加密交易所商业模式中的核心地位。
  Circle 首席经济学家 Gordon Liao 从经济学视角分析了稳定币在支付和抵押品移动中的多重角色，以及 Agent 经济中货币市场基金与稳定币的竞争关系。
  节目还涵盖 OpenAI 诉 Musk 案的判决影响、AI 价值在模型层与分发层之间的分配、《数字资产市场清晰法案》的推进进展，
  以及 Warsh 确认后债券市场期限溢价的回归——稳定币作为国债边际买家可能在久期维度上缓和长端利率压力。
core_ideas:
  - Hyperliquid 与 Circle/Coinbase 的交易标志着链上交易所开始系统性捕获净利息收入（NII），90% 储备收益回流平台
  - USDC 正在从支付工具演变为链上经济的核心抵押资产——Circle Q1 2026 链上结算量达 21 万亿美元
  - AI 价值正在从模型层向分发层迁移；LLM 实验室烧掉数百亿美元，但价值最终流向拥有客户关系的分发平台
  - Agent 经济中，货币市场基金（有收益）和稳定币（支付便捷）将共存——胜出者是能在两者之间无缝切换的整合平台
  - '《清晰法案》的 Tillis-Brooks 收益折中方案区分了"活动型奖励"和"被动型收益"，为新型金融中介搭建法律框架'
  - 30 年期美债收益率突破 5% 主要由期限溢价驱动（~80bps），反映了市场对财政可持续性和通胀可信度的担忧
