summary: |
  Fermilab particle physicist Don Lincoln takes Lex on a tour of the biggest unsolved mysteries in physics — from the history of unification (Newton, Maxwell, Einstein, electroweak) to the Higgs boson discovery he helped make, the bizarre economics of antimatter production, the matter-antimatter asymmetry that created our universe, dark energy's "worst prediction in physics," the elusive nature of dark matter, and a pragmatic experimentalist's skeptical take on string theory and the theory of everything.
core_ideas:
  - 'Physics history is a history of unifications: Newton unified terrestrial and celestial gravity, Maxwell unified electricity and magnetism, Einstein unified space-time and gravity-as-geometry, and the Standard Model unified electromagnetism with the weak force'
  - 'The Higgs boson discovery (July 4, 2012) was the culmination of a 50-year search and validated the last piece of the Standard Model — but Don was cautious: "we found a particle consistent with Higgs," not proof of a single Higgs'
  - 'Antimatter is real, producible, and staggeringly expensive — a nanogram per year at $62 trillion per gram, and the mystery is why the early universe produced a one-in-a-billion asymmetry that left us with a matter-dominated cosmos'
  - 'Dark energy is the "worst prediction in physics" — quantum field theory overestimates vacuum energy by 10^120, and we have no idea why the real value is so tiny yet non-zero'
  - 'Dark matter is five times more prevalent than ordinary matter, with strong evidence from galaxy rotation curves, the Bullet Cluster, and Dragonfly galaxies — yet 30 years of direct searches have found nothing'
  - 'Don Lincoln argues that practical progress toward a theory of everything should come from solving the measurable mysteries we already have, not from extrapolating a quadrillion times beyond our experimental reach'
