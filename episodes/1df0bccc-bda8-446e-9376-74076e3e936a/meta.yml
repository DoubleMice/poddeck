summary: |
  本期 TBPN 是一个超级 IPO 大集——Lime 和 Bending Spoons 同日上市，Mark Pincus 推出创业方法论新书。Meta 被曝进军云计算（MetaCloud），引发市场对 AI CapEx 和 NeoCloud 的全面重估。Luca Ferrari 带 500 人敲钟，90% 以上代码由 AI 书写，人均营收 $400 万。Wayne Ting 讲述 Lime 从毛利率 -300% 到盈利上市的逆袭——每天每车只赚 $7.50，靠一寸一寸的运营效率成为微出行最后赢家。USV 合伙人 Nick Grossman 提出「Rebel Alliance」投资论纲：Agent 正从"数字员工"变成"云基础设施"，整个互联网正在被 Agentic Stack 重写。前 Audi/Lamborghini/Apple 设计师 Julian Hoenig 的 Amble 电动高尔夫球车发布三天即获千单预订。
core_ideas:
  - 'MetaCloud 战略两难：Meta 被曝出售过剩算力做云业务——是"元宇宙式支线任务"还是务实为千亿 CapEx 找出口？市场争议核心是算力分配问题而非算力过剩'
  - 'Mark Pincus 创始人心法：正确的直觉绑在错误的想法上 = 大多数创始人失败的原因，B+ 想法是 A 级创始人的敌人，IPO 对大多数公司并无益处'
  - 'Lime 从 -300% 毛利率到上市的逆袭：每天每车赚 $7.50，50%+ 毛利率，不到一年回本，300,000+ 辆车覆盖 230 城——"一寸一寸赢"的微出行最后赢家'
  - 'Bending Spoons 的 AI 驱动收购模型：收购 15-16 年老牌软件，注入自研 AI 工具链，人均营收从 $100 万飙至 $400 万，IPO 为获取债务融资而非股权'
  - 'USV Rebel Alliance：AI 机会远大于任何一家公司，Agent 从"员工"变为"基础设施"——模型路由、编排、身份、支付构成新的中间件层投资机会'
  - 'Amble 设计哲学：不要屏幕、Bring Your Own Device、3× 动力、F1 工程团队、纸笔素描起步——从酒店体验切入的电动高尔夫球车，三天 1000+ 预订'
