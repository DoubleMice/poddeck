summary: |
  Coinbase 首席政策官 Faryar Shirzad 在 Unchained 对谈中，详细解析了 Clarity 法案的立法进程与核心博弈。对谈聚焦于银行业对稳定币收益条款的全面游说攻势、参议员 Tillis 和 Ossoff 促成的"基于活动才能获得奖励"妥协方案、以及法案在 7 月 4 日独立日前能否顺利通过。Faryar 还讨论了伦理条款、SEC 豁免救济权、Section 1960 等尚未解决的问题，以及即使立法受阻，SEC 和 CFTC 的行政规则制定路径也能为 5000 万美国加密持有者提供法律框架。
core_ideas:
  - '银行业动用五大行业协会（ABA、BPI、CBA、FSF、ICBA）联合游说，试图在 Clarity 法案中推翻 Genius 法案已确立的稳定币收益条款，核心论点是稳定币会导致"存款外逃"。'
  - 'Tillis 和 Ossoff 参议员达成的妥协方案核心为：禁止仅因持有稳定币而支付利息或收益，但允许基于交易、质押、托管等"有效商业活动"的奖励机制，奖励可根据余额和持有时间计算。'
  - 'Clarity 法案远超稳定币范畴，覆盖代币分类（证券/商品判定）、SEC 与 CFTC 监管分工、区块链开发者的法律确定性、以及 DeFi 应用的监管边界——Faryar 称其为"第二代互联网的基础法律框架"。'
  - 'Faryar 用"15 回合重量级拳击冠军赛"比喻银行与加密行业的持续博弈，并指出一旦总统和行政当局全面介入，银行公开对抗政府核心政策目标的难度将急剧上升。'
  - '即便 Clarity 法案未能在夏季通过，SEC、CFTC 和银行监管机构正在快速推进的规则制定提供了另一条路径，但立法相对于行政规则的独特价值在于其"耐久性"——不会被下一任总统轻易推翻。'
  - '自 Genius 法案签署以来，约有 150-200 个稳定币项目被宣布，市场采用已在加速。Faryar 认为，当消费者采用形成规模后，试图阻止稳定币就像试图阻止互联网普及一样不可行。'
