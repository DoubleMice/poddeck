summary: |
  Unchained 主持人 Laura Shin 与 Polygon 创始人 Dio Casares 深入探讨链上 pre-IPO 永续合约市场的爆发式增长。Hyperliquid 交易量从 $3M 飙升至 $44M，SpaceX 的 pre-IPO perp 上线仅距 IPO 三周。Dio 揭示为什么 Anthropic 和 OpenAI 公开否认二级交易是双重策略——控制资金流向一级市场并隔离法律责任。他还分析了衍生品相对于通证化现货的监管优势、SPV 多层结构的"法律烫手山芋"风险、以及即将到来的历史级 IPO 浪潮如何为 pre-IPO perps 创造完美时机。
core_ideas:
  - 'Hyperliquid pre-IPO perps 交易量 3 个月内从 $3M 飙升至 $44M，Cerebras 已成功结算，SpaceX 正进行验证'
  - AI 公司是 "cash incinerators"——每年烧掉数十亿美元，因此在竞争性 IPO 前夜全力阻挠二级市场将资金导入一级融资
  - 衍生品（perps）在监管和风险维度上远优于通证化现货——衍生品避开了美国 6 个月持有期规定和"key man risk"
  - 'SPV 多层结构形成"legal hot potato"——瀑布式分账、银行合规关卡、最坏情况下资金无法取出'
  - 'FTX 破产持有的 Anthropic 股份获得特殊法律地位——"probably the safest" 因为法院无动力限制破产资产价值'
  - SpaceX、Anthropic、OpenAI 同时瞄准万亿美元估值 IPO——"never happened before"，为 pre-IPO perps 创造完美时机
