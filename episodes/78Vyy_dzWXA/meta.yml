summary: |
  张小珺对 24 岁 Axiom 创始人洪乐潼的 4 小时长访谈。00 后华人女孩、MIT 摩根奖得主、
  斯坦福数学博士辍学、A 轮 16 亿美元。访谈把 AI for Math 的来龙去脉讲透——从 1960s
  ATP 到 2024 年 DeepMind AlphaProof，再到 2025/12 Axiom 拿下 Putnam 满分 98.93%；
  也讲透了洪乐潼的创业心智：蛮力型选手、对苦难上瘾、bet system not model、
  把自己定义成 "research scientist intern" 而非 CEO。
core_ideas:
  - "math is code, code is math —— Curry-Howard 对应让 Lean 既是数学又是程序"
  - "AI for Math 四支柱: prover · conjecturer · knowledge base · auto-formalization"
  - "Draft-Sketch-Prove: LLM 列提纲 → 翻成 Lean 带 sorry → 把 sorry 全填掉"
  - "语言是猜想家（制造幻觉突破边界），Lean 是约束（编译失败就是错）"
  - "ASI 不是 Artificial Super Intelligent，是 Specialized Super Intelligent —— 扇形打法而非撑大圆圈"
  - "Recursive self-improvement: 猜想家 × 证明家互为 reward，今天证明过的 = 明天的训练数据"
  - "Math poor → math rich: 数学供给的量级跃升，数学家变成 GPU 分配者"
  - "她的信念: bet system, not model；垄断导致创新，竞争导致平庸"
