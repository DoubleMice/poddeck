summary: |
  The Chopping Block 的四位常驻主持人讨论了本周加密世界的四个重大事件：Strategy（原 MicroStrategy）的优先股 STRC 从 $100 跌至 $82 引发的"穿西装的 Luna"辩论；以太坊基金会裁员 20% 与 ETHLabs 成立带来的治理权力转移；CME 起诉 CFTC 试图扼杀美国永续合约市场；以及 Meta 被曝正在开发预测市场产品 Arena。贯穿四个故事的主线是加密行业从"车库叛逆少年"走向"需要负责任的成年人"的转型阵痛。
core_ideas:
  - 'Strategy 的 Stretch 优先股危机揭示了中心化加密资本结构的脆弱性——"Luna for suits"的核心洞察是两者都通过稀释一方来维持另一方的目标价格，但关键区别在于 Saylor 可以选择不付分红，而 Luna 的智能合约没有逃生舱'
  - '以太坊基金会的裁员和 ETHLabs 的成立标志着以太坊治理的"天主教会时刻"——EF 退守"修道院"角色守护核心价值观，ETHLabs 接管"教会生意"推动采用和市场'
  - 'CME 起诉 CFTC 是保护主义而非合理监管争议——前主席起诉现任、为"不竞争的权利"而战，但 Crypto 的"打地鼠"式适应能力使任何单一法律胜利都不足以消灭创新'
  - '预测市场本质上是"伪装成交易平台的媒体公司"——绝大多数用户是来阅读信息而非交易，Meta 的真正兴趣不在交易费而在眼球经济，这可能加速而非消灭 Polymarket 等原生平台'
  - '四个故事共同指向加密行业的拐点：资本结构、组织治理、监管分类和商业模式——这些"无聊的成年人问题"正在定义下一个十年的赢家'
