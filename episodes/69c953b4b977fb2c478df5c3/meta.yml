summary: |
  光轮智能创始人兼CEO谢晨（Steve）以跨越物理、量化金融、自动驾驶、具身智能的独特视角，完成了一期关于AI数据产业的深度综述。从数据≈教育的第一性框架，到数据金字塔的构成与定价，到"先失败再成功"的数据质量新标准，再到五家大模型团队角逐机器人大脑的版图——这期节目试图用一集讲清楚驱动AI的三驾马车之一：数据。
core_ideas:
  - "数据对智能的关系 ≈ 教育对人的关系——从ImageNet的静态填鸭到评测驱动的因材施教，数据产业正在经历从工厂到学校的范式转换"
  - "数据金字塔三层结构：真机遥操作（最准确最难规模化）→ 仿真合成数据（规模化的枢纽）→ 互联网+人类第一视角（完全不依赖本体），以仿真为中心的闭环"
  - "大语言模型数据≈60分，具身智能<0.6分——机器人数据收集比LLM结构性难几个数量级；仿真从加速器升维为必备条件"
  - "最有效的数据是先失败再成功的数据——完美演示不如纠错轨迹，这更像人的学习过程"
  - "五家角逐机器人大脑：字节/阿里/OpenAI/DeepMind/英伟达——中美分化：美国大脑领先，中国本体领先；终局是大脑+数据+本体+场景的四方生态"
  - "数据终局：到AI能自我学习时，数据工厂消失，但仿真环境永远需要——像爱因斯坦的思考实验"
