summary: |
  Acquired 用近 4 小时深度讲述法拉利从 Enzo 在 Modena 的马厩到纽交所 RACE 代码的完整故事。这不是一家汽车公司——它是全球认知度最高、保有量最低的奢侈品牌，每辆车的平均利润超过 17 万美元。这里有一半世纪的死亡与速度、Ford vs. Ferrari 的传奇博弈、Luca di Montezemolo 的奢侈化转型、以及一个奢侈品牌与体育豪门合二为一的独特商业模型。
core_ideas:
  - "法拉利是人类历史上认知度/保有量比最高的消费品公司 — 超 10 亿人知道，仅 18 万人拥有"
