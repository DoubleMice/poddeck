summary: |
  谷歌前TPU工程师Henry首次公开揭秘，从硬件架构、XLA编译器生态、供应链瓶颈到Anthropic百万订单背后的故事，深度解析谷歌TPU能否撼动英伟达GPU垄断地位。核心结论：GPU与TPU必然共存，未来芯片市场将百花齐放。
core_ideas:
  - 'TPU是专为矩阵计算定制的ASIC：GPU像独立大厨并行做菜，TPU像流水线接力——硬件变蠢，软件处理复杂度'
  - 'XLA编译器是TPU的秘密武器也是最大门槛：静态编译器做全局系统级优化，但黑盒难debug，第三方开发者门槛极高'
  - 'TPU的核心优势在TCO：芯片间铜线直连（ICI）省去NVLink交换机税，大规模部署下推理成本仅为GPU的几分之一'
  - '供应链三重瓶颈：HBM被三巨头垄断且英伟达优先、CoWoS产能由TSMC按订单分配、博通议价权挤压Google利润'
  - 'Anthropic是唯一直接采购TPU机架的客户，Apple和Meta走谷歌云；不懂XLA的客户只能跑出50-60%性能'
  - 'Grok本质上是一家compiler公司而非芯片公司：主打低延迟推理，精准踩中inference→ASIC→Agent三轮红利'
