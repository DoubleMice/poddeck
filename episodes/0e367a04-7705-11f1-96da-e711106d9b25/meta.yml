summary: |
  ENS Labs 创始人 Nick Johnson 和 ENS 联合创始人 Alex Van de Sande 与 Uneasy Money 主持人对谈，围绕一次引爆加密 Twitter 的安全委员会投票，深入讨论 DAO 治理的结构性危机。议题包括投票参与率从 80% 降至 7%、金库管理的激励错位、Namechain 的取消为何在事后看来更合理，以及 Nick 提出将 ENS DAO、基金会和 Labs 分离关注点的改革方案。
core_ideas:
  - 'Nick Johnson 以 3.26M ENS 代币投票否决安全委员会续任，约占有效投票总量的 50%，但仅占代币总供应量的 3.2%——核心问题在于 DAO 参与率极低，而非个人权力过大。'
  - 'DAO 代币投票的参与率从启动时的 ~80% 降至约 7%，根源在于卖出代币的财务激励远大于参与治理的激励。'
  - 'ENS DAO 面临三重分离：产品构建（Labs 负责）、协议治理（代币投票）、资金分配（基金会管理），三者被塞进同一个 DAO 结构中导致了当前危机。'
  - 'ENS 金库实际可支配资金约 $130M（ETH + 稳定币），另有 ~$350M ENS 代币（如被出售将归零）；保守投资策略年化仅 2-3%，Nick 承认"如果当初投入 Vanguard 指数基金会更好"。'
  - 'Nick 和 Alex 提出新治理模型：DAO 专注于任命基金会董事和协议参数，基金会负责预算编制和金库管理，Labs 负责产品决策和时间线——各部分专注自己最擅长的领域。'
  - 'ENS 不是一家公司，它的核心价值在于可信中立性：没有人能拿走你的 .eth 名字，所有代码开源，金库链上透明，即使有人控制了全部金库也无法篡改域名所有权。'
