summary: |
  Former SDNY prosecutor Sam Enzer breaks down two historic DOJ prosecutions against prediction market traders — one involving classified military intelligence, the other Google's internal search data. The conversation unpacks what "insider trading" really means legally (it's not a legal term), the three legitimate ways to trade on non-public information, the George Santos prediction market controversy, the CFTC vs state gambling law showdown heading to the Supreme Court, and the risks every prediction market participant should understand.
core_ideas:
  - '"insider trading" is a colloquial term — the actual charges are commodities fraud and wire fraud'
  - 'the legal test: material non-public information + duty of trust and confidence to the source = potential crime'
  - 'three legal ways to trade on non-public information: bar overhearing, farmer hedging, better algorithm'
  - 'George Santos case may not be insider trading but could be scalping/pump-and-dump or market manipulation'
  - 'CFTC preemption vs state gambling laws is heading to a circuit split resolved by the Supreme Court'
  - 'prediction markets are most valuable as an information signal, not as a betting venue'
