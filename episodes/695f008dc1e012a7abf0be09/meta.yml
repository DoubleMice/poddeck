summary: |
  张小俊在智谱IPO上市当天与CEO张鹏进行了一场三小时深度长谈。从清华实验室到港交所，从"第一个吃螃蟹"的科技成果转化到全球大模型第一股，张鹏完整回顾了智谱六年半的创业历程：技术路线的选择（GLM架构）、ChatGPT前后的融资冰火两重天、百模大战的焦虑、Scaling Law的不迷信、To B与To C的路径抉择、DeepSeek冲击后的反思，以及始终不变的AGI信仰。
core_ideas:
  - 智谱是清华第一家走通科技成果转化路径的企业（2018政策出台→2019年6月注册），张鹏称之为"第一个吃螃蟹的人"
  - GLM算法综合了BERT双向填空和GPT单向续写的优势，在2022年训练出GLM-130B千亿模型，训练成本仅为GPT-3的十四分之一
  - ChatGPT爆火前融资极其困难——投资人"听不懂"并要求"估值降一半"；爆火后"十年无人知，一朝天下晓"
  - 智谱将AGI之路划分为L1-L5五个阶梯（预训练→对齐推理→自学习→自我认知→意识），当前处于L2向L3过渡阶段
  - 张鹏不迷信"暴力美学"式的Scaling Law——"它只是一个现象描述，并没有科学的依据"，降成本是智谱贯穿始终的主线
  - DeepSeek在2025年初从研究、工程、市场三个层面冲击了智谱，促成了春节后的全员反思和RL方向加速
  - 坚持To B为主——中国市场C端付费意愿差，SaaS订阅习惯缺失，"to B虽然不性感但更确定"
  - 开源是智谱"刻在基因里的事"——从GLM-130B到ChatGLM-6B，累计60+开源项目、6000+万次下载
  - 张鹏对IPO的定位是"马拉松补给站"而非终点——六年前就规划了公司增长模型
  - 被问"AGI公司还是高利润公司"二选一，果断回答"当然实现AGI的公司"
