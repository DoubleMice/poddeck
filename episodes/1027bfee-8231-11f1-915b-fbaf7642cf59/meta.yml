summary: |
  Cap 联合创始人 Benjamin 和 Waiso 深入剖析了 StableDrop 从承诺 1100 万美元到最终只能给出 400 万美元的全过程，反思了 DeFi 积分计划的根本矛盾。本期还讨论了 Robinhood Chain 引发的 L2 结算争议、Barnbridge 治理攻击和 Alchemy 私钥泄露事件，以及 Crypto Twitter 算法翻转后社区生态的变化。
core_ideas:
  - 'StableDrop 的创新在于用稳定币替代代币空投，但市场波动让预算从 1100 万缩水到 400 万——Cap 选择了"让所有人回本"的务实路线'
  - '积分计划是没有上限的营销——TVL 是临时的，Farmers 永不满足，最终项目方要么破产要么违约'
  - 'Cap 当前 98% 的 TVL 来自机构客户，协议本身安全可靠，争议纯粹是激励机制和沟通问题'
  - 'L2 结算争议的核心：以太坊是否在贱卖自己的结算层？熊市是撕掉创可贴的最佳时机'
  - 'Barnbridge 和 Alchemy 的事件再次证明：安全最佳实践不是秘密，但行业拒绝执行——"我们知道得了什么病，知道该吃什么药，只是拒绝服药"'
  - 'Ostium 团队从 2021 年坚持到 2026 年，五年的努力被一个错误归零——在 DeFi 中建设极其痛苦，必须出于信念'
