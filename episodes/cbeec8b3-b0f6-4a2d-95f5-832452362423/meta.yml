  硅谷101主持人洪君对话阿里云千问大模型业务总经理徐栋、影石科技CEO刘靖康与360研究院总监齐露、语义科技CEO吕总，从模型技术进化与商业化的两条线索出发，探讨了视频生成模型从娱乐走向生产化管线的突破、语言模型在数据精耕与稀疏化上的持续进化、Agent从Chatbot向自主运行的跨越、端云结合的新范式、开源生态的飞轮效应，以及中国企业在AI商业化中的真实实践与思考。
