summary: |
  A dense 3-hour TBPN roundtable covering the Musk vs OpenAI trial verdict, Leopold Aschenbrenner's 13F filing and AI semiconductor thesis, the growing bipartisan backlash against AI data centers, Ben Thompson's proposal to pay residents directly for hosting data centers, Redis CEO Rowan Trollope on agent infrastructure and the end of coding as the bottleneck, Descartes' Dean Leitersdorf on video world models and the chip supply crunch through 2028, Shein's $100M acquisition of Everlane, and Joanna Stern on her book I Am Not a Robot.
core_ideas:
  - Musk vs OpenAI trial ends in 90 minutes on statute of limitations — a victory on a technicality that gives OpenAI breathing room amid IPO, Anthropic, and Google pressure
  - Leopold's 13F reveals $2B semiconductor puts and long NVIDIA — but positions are stale, options are reported notionally, and copy-trading 13Fs is a good way to burn money
  - 7 in 10 Americans oppose local AI data centers, creating a rare cross-partisan issue from job displacement fears to surveillance concerns
  - Ben Thompson proposes paying data center neighbors $10K/year directly — at just 3.8% of a 1.6 GW facility's revenue, it would likely flip public opinion
  - Rowan Trollope: coding is no longer the bottleneck; a developer with 10 agents is now more like a dev manager, and the SDLC must be reinvented around this new reality
  - Dean Leitersdorf: chip supply is sold out through 2028, making inference optimization (DOS 2.0: 500+ tok/s, 100fps HD video) the only path to AI revenue growth
