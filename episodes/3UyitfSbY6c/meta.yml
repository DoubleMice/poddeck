summary: |
  Brian Halligan — HubSpot 联合创始人、Sequoia 驻场 CEO 教练、Red Sox 股东 — 在
  Lenny's Podcast 把他 15 年 CEO 生涯的教训铺开: Sequoia 的 "kids table / adults table"
  为什么以 100 人为界; 招聘的 "hire slow / fire fast" 和为什么 blind references 比
  面试重要; Parker Conrad 的 NDA hack; 2004 Red Sox 式的混合团队; 他评估 CEO 的
  LOCK(S) 算法; 为什么 sales 是 AI 最晚取代的岗位, 以及 avatar 如何颠倒 go-to-market
  漏斗; 一系列 hagganisms — "别一口一口吃三明治"、"两个人浇的花必死"、"没有银弹只有
  铅弹" — 以及一次摔下 Vermont 悬崖之后他做出的 "I'm out" 决定.
core_ideas:
  - "Kids table (< 100 人) 谈 perspiration; Adults table (> 100 人) 谈 exec team, 一半时间在招聘面人"
  - "18 个月内 50%+ C-level 会离开, MongoDB Dev 的统计是每年 2 个 C-level turnover"
  - "面试被 overrate, blind reference 被 underrate. 关键问题: 'Would you enthusiastically rehire this person?'"
  - "HubSpot 学到的: 选 spiky 候选人 (4×4 + 4×2) 胜过 all-threes. 面试组从 8 人砍到 4 人"
  - "Mackenzie / Apple / Amazon cohort 的招法 never works — conservatism 和 founder skepticism 本质冲突"
  - "Build like 2004 Red Sox: homegrown farm system 底盘 + 几个 free agent (Ortiz / Martinez / Schilling)"
  - "LOCK(S) = Lovable / Obsession / Chip on shoulder / Knowledgeable / Student — 最后一个 Halligan 后加的"
  - "5-tool CEO (Brett Taylor 式: code + taste + vision + sell + convince) 是新物种, Jobs/Bezos 都不算"
  - "Sales will be the very very very last job AI replaces — enterprise sales 跑在 1990s 的流程上"
  - "New GTM: buyer 带 avatar (deli clone), 卖家主页是 avatar, 人只在 trust 上场"
  - "Planning cycles 从 1 年缩到 3 个月 — 'massive tax in optionality when you can move this fast'"
  - "Hagganism: 吃三明治别 nibble / 绝不浪费 crisis (overcorrect) / 两个人浇的花必死 (DRI) / 没有银弹只有铅弹"
  - "EV > TV > ME, 后来加 CV 在前 — HubSpot 从 employee-centric 主动转 customer-centric"
  - "Dharmesh 联合创始 20 年, 零 direct report — 'it's a free month to really think and be creative'"
  - "startup: 90% perspiration / 10% inspiration → scale-up: 反过来. trust issue 是 Halligan 自己的 scaling limit"
  - "雪地车摔下悬崖, 33 根螺丝打进身体, 崖底做出决定: 不想再做 8000 人公司的 CEO. 把位置给了 Yam"
