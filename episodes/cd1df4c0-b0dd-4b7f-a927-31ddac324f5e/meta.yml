summary: |
  TBPN YC Demo Day 特辑——13 位嘉宾接力出场，涵盖 SpaceX 突破 $3 万亿市值的市场冲击、7 位 YC 创始人的硬科技路演（AI 智能体、机器人、防御无人机、移动 MRI、太空制造、数据中心冷却）、YC 合伙人深度对话（Agentic coding 加速创业到 3 个月内零至七位数营收、CS 学位崩盘与物理/数学崛起）、Garry Tan 的"煮沸海洋"宣言、Threads 突破 5 亿月活的差异化策略、Luke Burgis 论 AI 时代的社会传染与身份认同、Notch ACE 为人类和智能体重建网站体验。
core_ideas:
  - SpaceX 以 $3 万亿市值超越 Amazon，Cursor 并购展示了用 IPO 股票收购真实企业的战略财务操作
  - Agentic coding 正在根本性地改变创业速度——公司可在 3 个月内从零到七位数营收
  - 'YC 新框架: 从"创造人们想要的东西"到"创造智能体想要的东西"——大实验室不会去做的无聊但有价值的基础设施'
  - 国防科技创业潮——YC 本批次国防公司数超过去年全年总和，Cost-Plus 采购模式的失败为初创打开了大门
  - Threads 以"安静应用"定位差异化增长，500M MAU 背后是市场聚焦策略而非全球撒网
  - 'Luke Burgis: AI 可能正在制造一种看不见的社会传染——感觉个性化、实际却是标准化'
  - 'Anda Gansca: 网站已死，知识站永生——ACE 让同一知识库同时服务于人类和 AI 智能体'
