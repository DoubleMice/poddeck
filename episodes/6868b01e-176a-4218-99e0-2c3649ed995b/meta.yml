summary: >
  TBPN UltraDome 特别节目，3 小时 42 分钟的超级对话。David Holes 发布 Midjourney Medical 全身超声波扫描仪，从 Leap Motion 到 AI
  图像生成再到医疗设备的传奇创业路径。Noam Shazeer 从 Google DeepMind 跳槽 OpenAI，AI 人才大战升级。Derek Thompson 深度剖析自我优化文化与"生物计量资本主义"。Arm CEO Rene
  Haas 分享 AI 时代的"控制塔"视角、芯片自研战略与 Scaling Law。Rob Reid 警示合成生物学的指数级风险及几乎零成本的防线。David Senra 与 Jake Paul 探讨品味、动机、拳击帝国与互联网哲学。
core_ideas:
  - Midjourney Medical 358,000 传感器环形超声波扫描仪：0.5mm 分辨率，目标 50,000 台覆盖全球
  - AI 人才大战："Transformer 论文合著者 Noam Shazeer 离开 Google 加入 OpenAI"——最重大的人才流动
  - Rene Haas 论 AI："一个可以吃掉无限量内存、存储和算力的怪物"，Scaling Law 未被推翻
  - Arm 从 IP 授权进化为自研芯片，"控制塔"视角看到整个产业的 2030-2032 年方向
  - Rob Reid 的生物安全框架：强制 DNA 合成筛查 + 机场废水监控 = 成本几乎为零的第一道防线
  - Derek Thompson 的"生物计量资本主义"：Oura Ring 让你成为自己的 CEO——但指标 ≠ 目的
